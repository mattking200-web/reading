  W: [
    { title:"Complexity and Emergence", text:"One of the most striking phenomena in nature is emergence: the appearance of properties or behaviors at the level of a system that cannot be predicted from the properties of the system's individual components. The wetness of water cannot be derived from the properties of a single water molecule. The consciousness of a human brain cannot be explained by the behavior of a single neuron. The organized colony behavior of ants cannot be found in any individual ant. Emergence challenges reductionist approaches to science, which hold that understanding a system's parts is sufficient to understand the system itself." },
    { title:"The Ethics of Memory", text:"Philosopher Paul Ricoeur argued that communities, like individuals, have a responsibility toward the past, but that this responsibility involves a delicate balance. Too much remembrance, he suggested, can become a form of resentment that prevents the work of reconciliation and forward movement. Too little is a form of dishonesty that falsifies the historical conditions that shaped the present. The question of how societies should remember atrocity, trauma, and injustice has no universal answer. What Ricoeur insisted upon was that the question must be taken seriously: that forgetting, when it is chosen rather than inevitable, is a moral act with moral consequences." },
    { title:"The Wilderness Essay", text:"When Robert MacFarlane set out to document the experience of wild places, he found himself revising his initial assumptions about what wildness means. He had begun with a romantic notion of wilderness as remote, untouched, and inhuman. What he discovered was something more subtle: that wildness is not a quality of places but of encounters, that it exists as much in a wren's nest in a city hedge as in a mountain summit above the Arctic Circle. The most profound experiences of wildness he recorded were often the most intimate: a light on moss, the behavior of a river in flood, the sensation of being cold enough that the body begins to recalculate its priorities." },
    { title:"Cognitive Load", text:"Cognitive load theory, developed by educational psychologist John Sweller in the 1980s, posits that working memory, the mental space in which we actively process information, has a strictly limited capacity. When the demands of a task exceed this capacity, learning degrades rapidly. The theory has significant implications for educational design. Complex material should be broken into components and taught sequentially rather than simultaneously. Worked examples reduce extraneous cognitive load by allowing students to observe expert performance rather than simultaneously solving problems and learning the concepts required to solve them." },
    { title:"The Interview", text:"In the summer I turned twenty two, I traveled to interview a woman who had been a resistance courier in occupied France during the Second World War. She was ninety one and lived in a small apartment outside Lyon, and she gave me three hours of her time without apparent reservation. She described events I had read about only in books with the kind of factual precision that belongs to lived experience. But what I had not expected was her reluctance to call what she had done heroism. She said she had been frightened every single day for four years, and that fear was the honest description of her experience, not courage." },
  ],
  X: [
    { title:"The Problem of Consciousness", text:"David Chalmers distinguished between what he called the easy problems and the hard problem of consciousness. The easy problems, despite being extraordinarily complex scientifically, are in principle solvable: how does the brain process perceptual information, integrate data from multiple senses, control behavior, and report mental states? These are questions about the mechanisms of cognition. The hard problem is different in kind. It asks why any of this processing is accompanied by subjective experience at all. Why is there something it feels like to see red, to hear music, to be in pain? The hard problem has resisted every attempt at solution and some philosophers believe it always will." },
    { title:"The Historiography of Silence", text:"Historians have increasingly attended to what archives do not contain, to the structured absences that reveal as much about a society's power relations as the documents that survive. The lives of enslaved people in the antebellum American South appear in archives primarily as property records, transaction receipts, and occasional newspaper accounts. These documents were created by and for the people who held power. The inner lives, relationships, forms of resistance, cultural practices, and economic strategies of the enslaved themselves exist in the archive only in fragments and traces, recoverable through techniques of reading against the grain that treat the gap itself as evidence." },
    { title:"What We Owe the Future", text:"The philosopher William MacAskill has argued that future people, who will vastly outnumber all humans who have ever lived if civilization continues for millennia, should count in our moral calculations at least as much as people alive today. This view, which he calls longtermism, implies that decisions and policies affecting the long run trajectory of civilization are of moral importance that dwarfs most of what currently occupies political attention. Critics argue that the uncertainty involved in predicting long run consequences is so great as to render systematic longtermist reasoning unreliable, and that focusing on speculative future populations risks neglecting urgent needs of actual present people." },
    { title:"On Attention and Silence", text:"The monk Thomas Merton spent twenty seven years in a Trappist monastery in Kentucky before emerging as one of the twentieth century's most widely read spiritual writers. He wrote extensively about contemplation not as the withdrawal from the world but as a form of deeper engagement with it. For Merton, silence was not the absence of sound but a quality of inner attention, a willingness to be present to experience without immediately packaging it into language and judgment. He believed that the activist's urgency and the contemplative's stillness were not opposites but complements, that action without a center of silence becomes reactive and violent." },
    { title:"The Return of the Wolves", text:"When gray wolves were reintroduced to Yellowstone National Park in 1995 after a seventy year absence, ecologists expected the predator to affect elk populations. What they did not fully anticipate was a cascade of changes that restructured the entire ecosystem. With wolves present, elk became more wary and stopped overgrazing riverbanks and valleys. Vegetation recovered along rivers, reducing erosion and stabilizing stream banks. The recovery of riparian plants attracted beavers, whose dams created wetlands. The wetlands attracted birds and amphibians. The rivers themselves changed course as their banks became more stable. This phenomenon is called a trophic cascade." },
  ],
  Y: [
    { title:"On Moral Luck", text:"The philosopher Thomas Nagel drew attention to the uncomfortable role of luck in our moral judgments. We praise and blame people on the basis of their character and choices. Yet the person we become, including our character, our choices, and even our moral commitments, is profoundly shaped by circumstances outside our control: where and when we were born, who raised us, what experiences formed us, which risks we happened to be exposed to. Nagel asked whether it makes sense to hold someone fully responsible for actions that flow from a character shaped by factors they did not choose. Our legal and moral systems presuppose a kind of freedom that may be partly illusory." },
    { title:"The Cartography of Loss", text:"There is a practice in Japanese culture called kintsugi, the repair of broken ceramics with lacquer mixed with gold or silver powder, making the repaired object more beautiful for having been broken, the fractures themselves becoming a design. The practice embodies a philosophy: that breakage and repair are part of the object's history rather than conditions to be concealed. It is a philosophy that stands in direct contrast to the dominant Western aesthetic of concealment, in which damage is either repaired invisibly or rendered the object worthless. I return to kintsugi often when I think about the relationship between loss and identity." },
    { title:"Information Ecosystems", text:"Media theorist Neil Postman argued in the 1980s that every communications technology creates a different kind of epistemic environment: a different set of conditions governing what kinds of knowledge are possible, what counts as evidence, what kinds of argument are persuasive, and what kinds of personality are culturally admired. The printing press created one kind of mind. Television created another. He was writing before the Internet. The digital information ecosystem we inhabit now privileges speed over accuracy, provocation over nuance, consensus over verification, and affiliation over argument." },
    { title:"The Long Apprenticeship", text:"The philosopher Michael Oakeshott argued that knowledge of how to do something, which he called practical knowledge, cannot be fully transmitted through explicit instruction or rules. It is acquired through practice in the company of someone who already possesses it. The jazz musician learns not only from the teacher's explanations but from playing alongside the teacher, absorbing patterns and responses that no lesson plan could fully articulate. The surgeon develops judgment that transcends the protocols she was taught through years of operating under supervision. Oakeshott believed that the modern world's enthusiasm for codifying all knowledge in explicit rules neglects something essential about how human skill actually develops." },
    { title:"Continental Philosophy and the Everyday", text:"One of the defining concerns of twentieth century European philosophy was the phenomenological investigation of ordinary experience. Edmund Husserl argued that philosophy had to return to the structures of lived experience prior to the theoretical abstractions of natural science. His student Martin Heidegger extended this project into an investigation of how the world appears to beings who are not detached observers but engaged participants, always already embedded in practical concerns, social relations, and historical traditions. Maurice Merleau-Ponty brought the body to the center of this analysis, arguing that perception and cognition are rooted in bodily engagement with the environment." },
  ],
  Z: [
    { title:"The Extended Mind", text:"Philosophers Andy Clark and David Chalmers proposed in 1998 that the mind does not stop at the boundary of the skull. When cognitive processes are reliably offloaded onto external structures, those structures become constitutive parts of the cognitive system rather than mere tools. A notebook used by a person with memory impairment to record important information functions, on this view, as a genuine component of that person's memory, not merely as a prosthetic substitute. The smartphone has extended and transformed cognitive processes for billions of people in ways that alter what is meant by remembering, calculating, navigating, and communicating." },
    { title:"The Structure of Scientific Revolutions", text:"Thomas Kuhn's 1962 book transformed how philosophers, historians, and scientists think about the development of science. Kuhn argued that science does not progress through the gradual accumulation of knowledge but through episodes of revolutionary change he called paradigm shifts. Normal science operates within a paradigm, a shared framework of assumptions, methods, and standards that defines what counts as a legitimate problem and a valid solution. Anomalies that cannot be explained within the paradigm accumulate until a crisis produces a revolutionary restructuring of the entire framework. Kuhn's work raised uncomfortable questions about the objectivity of science and the rationality of theory change." },
    { title:"A Theory of Justice", text:"John Rawls published A Theory of Justice in 1971 and permanently altered the landscape of Anglo American political philosophy. Rawls argued for a conception of justice based on what principles rational people would choose from behind a veil of ignorance, not knowing their place in society, their class position, their fortune in the distribution of natural assets, their intelligence or strength, their conception of the good, or the generation they belong to. He believed that from this original position, rational agents would choose principles that protect basic liberties for all and permit inequalities only when they benefit the least advantaged members of society." },
    { title:"The Grammar of Uncertainty", text:"There is a grammatical distinction in some languages between statements about things you have witnessed directly and statements about things you have learned from others or inferred. In Turkish, the suffix used determines whether the speaker is asserting direct knowledge or reported information. Languages with this feature, called evidentiality, require speakers to make explicit the epistemic status of every claim they make. English has no such grammatical requirement. We can assert hearsay and observation in identical syntactic form. The question, unresolved, points toward something important about the relationship between the structures of language and the habits of epistemically responsible thinking." },
    { title:"After the Archive", text:"The historian Arlette Farge, writing about her work in the archives of eighteenth century France, described the experience of encountering historical documents not as the neutral extraction of information but as a kind of haunting. The voices in the documents are vivid and particular in ways that resist absorption into historical generalization. They insist on their singularity. Farge wrote about the ethical responsibility this creates for the historian: the obligation not to dissolve individual lives into categories and patterns, to hold the tension between the general analysis that makes the past intelligible and the particular life that resists every generalization." },
  ],
};

// ════════════════════════════════════════════════════════
//  READING TIPS per level band
// ════════════════════════════════════════════════════════
const TIPS = {
  early:  { title:"📌 Reading Tip", text:"Point to each word as you read. Take your time — every word matters!" },
  mid:    { title:"📌 Reading Tip", text:"Read the whole sentence first, then go back if a word is tricky." },
  fluent: { title:"📌 Reading Tip", text:"Try to read smoothly without stopping. Use expression in your voice!" },
  adv:    { title:"📌 Reading Tip", text:"Focus on phrasing and punctuation — let commas and periods guide your pace." },
};

function getTip(lvlId) {
  const early  = ['AA','A','B','C','D','E'];
  const mid    = ['F','G','H','I','J','K','L'];
  const fluent = ['M','N','O','P','Q','R'];
  if (early.includes(lvlId))  return TIPS.early;
  if (mid.includes(lvlId))    return TIPS.mid;
  if (fluent.includes(lvlId)) return TIPS.fluent;
  return TIPS.adv;
}

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
const STREAK_UP   = 2;
const STREAK_DOWN = 2;
const ACCURACY_OK   = 0.90;
const ACCURACY_FAIL = 0.85;

let levelIdx       = 0;
let successStreak  = 0;
let failStreak     = 0;
let storyIdx       = 0;
let currentBook    = null;
let capturedTranscript   = '';
let prevTranscript       = '';
let latestTranscript     = '';
let isManuallyStopping   = false;
let recognition          = null;

// ════════════════════════════════════════════════════════
//  LEVEL PICKER
// ════════════════════════════════════════════════════════
function buildLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const btn = document.createElement('button');
    btn.className = 'lvl-btn' + (i === levelIdx ? ' active' : '');
    btn.textContent = lv.label;
    btn.title = lv.desc;
    btn.onclick = () => selectLevel(i);
    grid.appendChild(btn);
  });
}

function selectLevel(i) {
  levelIdx = i;
  successStreak = 0;
  failStreak = 0;
  storyIdx = 0;
  buildLevelGrid();
  updateHeader();
  document.getElementById('level-picker').style.display = 'none';
  document.getElementById('story-panel').style.display = 'block';
  document.getElementById('results-area').style.display = 'none';
  loadStory();
}

function showLevelPicker() {
  buildLevelGrid();
  document.getElementById('level-picker').style.display = 'block';
  document.getElementById('story-panel').style.display = 'none';
  document.getElementById('results-area').style.display = 'none';
}

// ════════════════════════════════════════════════════════
//  HEADER
// ════════════════════════════════════════════════════════
function updateHeader() {
  const lv = LEVELS[levelIdx];
  document.getElementById('hdr-level').textContent = lv.label;
  document.getElementById('hdr-desc').textContent  = lv.desc;
  const bar = document.getElementById('streak-bar');
  bar.innerHTML = '';
  for (let i = 0; i < STREAK_UP; i++) {
    const d = document.createElement('div');
    d.className = 's-dot' + (i < successStreak ? ' on' : '');
    bar.appendChild(d);
  }
  if (failStreak > 0) {
    const d = document.createElement('div');
    d.className = 's-dot warn';
    bar.appendChild(d);
  }
  const pct = (successStreak / STREAK_UP) * 100;
  const fill = document.getElementById('prog-fill');
  if (fill) fill.style.width = pct + '%';
  const prog = document.getElementById('prog-count');
  if (prog) prog.textContent = successStreak + ' / ' + STREAK_UP + ' reads to advance';
  const lbl = document.getElementById('prog-label');
  if (lbl) lbl.textContent = 'Level ' + lv.label + ' Progress';
  const lp = document.getElementById('story-level-pill');
  if (lp) lp.textContent = 'Level ' + lv.label + ' · ' + lv.desc;
}

// ════════════════════════════════════════════════════════
//  STORY LOADING
// ════════════════════════════════════════════════════════
function loadStory() {
  const lv = LEVELS[levelIdx];
  const pool = STORIES[lv.id];
  storyIdx = storyIdx % pool.length;
  currentBook = pool[storyIdx];
  storyIdx++;

  const np = document.getElementById('story-num-pill');
  if (np) np.textContent = 'Story ' + storyIdx + ' of ' + pool.length;

  updateHeader();
  renderStory();
  document.getElementById('results-area').style.display = 'none';
}

function renderStory() {
  const lv  = LEVELS[levelIdx];
  const tip = getTip(lv.id);
  document.getElementById('story-area').innerHTML = `
    <div class="tip-box slide-up">
      <div class="tip-title">${tip.title}</div>
      ${tip.text}
    </div>
    <div class="story-box slide-up">
      <div class="story-title">${esc(currentBook.title)}</div>
      <p class="story-text">${esc(currentBook.text)}</p>
      <div id="transcript-live" style="display:none;" class="live-hint"></div>
    </div>`;
  document.getElementById('mic-controls').style.display = 'block';
  resetMic();
}

// ════════════════════════════════════════════════════════
//  SPEECH RECOGNITION
// ════════════════════════════════════════════════════════
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('mic-controls').innerHTML =
      '<p style="color:#f43f5e;font-weight:700;text-align:center;padding:12px;">⚠️ Speech recognition requires Chrome or Edge browser.</p>';
    return;
  }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    let session = '';
    for (let i = 0; i < e.results.length; i++) session += e.results[i][0].transcript;
    const full = (prevTranscript + ' ' + session).trim();
    capturedTranscript = full;
    latestTranscript = full;
    const el = document.getElementById('transcript-live');
    if (el) { el.style.display = 'block'; el.textContent = '"' + full.slice(-140) + '…"'; }
  };

  recognition.onend = () => {
    if (!isManuallyStopping) {
      prevTranscript = latestTranscript;
      try { recognition.start(); } catch(e) {}
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') {
      alert('Microphone permission denied. Please allow microphone access in your browser and try again.');
      resetMic();
    }
  };
}

function startListening() {
  if (!currentBook) return;
  if (!recognition) { initSpeech(); if (!recognition) return; }
  isManuallyStopping = false;
  prevTranscript = ''; latestTranscript = ''; capturedTranscript = '';

  let count = 3;
  const mc = document.getElementById('mic-controls');
  mc.innerHTML = `<div class="countdown-disp">${count}</div>`;
  const timer = setInterval(() => {
    count--;
    if (count === 1) { try { recognition.start(); } catch(e) {} }
    if (count === 0) {
      clearInterval(timer);
      mc.innerHTML = `<button class="btn btn-red btn-lg" onclick="stopAndScore()">🎙️ I'M DONE!</button>`;
    } else {
      const cd = mc.querySelector('.countdown-disp');
      if (cd) cd.textContent = count;
    }
  }, 1000);
}

function stopAndScore() {
  if (!recognition) return;
  isManuallyStopping = true;
  try { recognition.stop(); } catch(e) {}
  resetMic();
  setTimeout(() => processReading(capturedTranscript), 400);
}

function resetMic() {
  const mc = document.getElementById('mic-controls');
  if (mc) mc.innerHTML = `<button class="btn btn-green btn-lg" onclick="startListening()">🎤 START READING</button>`;
}

// ════════════════════════════════════════════════════════
//  SCORING
// ════════════════════════════════════════════════════════
function normalize(text) {
  if (!text) return [];
  return text.toLowerCase()
    .replace(/[^a-z0-9'\s]/g, ' ')
    .replace(/\s+/g, ' ').trim()
    .split(' ').filter(w => w.length > 0);
}

function processReading(transcript) {
  if (!currentBook || !transcript) {
    renderResults({ accuracy: 0, isSuccess: false, feedback: [], advanced: false, regressed: false });
    return;
  }
  const expected = normalize(currentBook.text);
  const actual   = normalize(transcript);
  let correct = 0;
  const feedback = expected.map(word => {
    const ok = actual.includes(word);
    if (ok) correct++;
    return { word, ok };
  });
  const accuracy   = expected.length > 0 ? correct / expected.length : 0;
  const isSuccess  = accuracy >= ACCURACY_OK;
  const isBad      = accuracy < ACCURACY_FAIL;

  let newLvl  = levelIdx;
  let newSucc = isSuccess ? successStreak + 1 : 0;
  let newFail = isBad    ? failStreak + 1     : 0;
  let advanced = false, regressed = false;

  if (isSuccess && newSucc >= STREAK_UP) {
    newLvl   = Math.min(levelIdx + 1, LEVELS.length - 1);
    newSucc  = 0; newFail = 0; advanced = true; storyIdx = 0;
  } else if (newFail >= STREAK_DOWN) {
    newLvl   = Math.max(0, levelIdx - 1);
    newSucc  = 0; newFail = 0; regressed = true; storyIdx = 0;
  }

  levelIdx = newLvl; successStreak = newSucc; failStreak = newFail;
  updateHeader();
  renderResults({ accuracy, isSuccess, feedback, advanced, regressed });
}

// ════════════════════════════════════════════════════════
//  RESULTS + QUIZ
// ════════════════════════════════════════════════════════
function renderResults({ accuracy, isSuccess, feedback, advanced, regressed }) {
  const pct  = Math.round(accuracy * 100);
  const area = document.getElementById('results-area');
  area.style.display = 'block';

  const chips = feedback.length > 0
    ? feedback.map(f =>
        `<span class="wchip ${f.ok ? 'ok' : 'bad'}">${esc(f.word)}</span>`
      ).join(' ')
    : '<span style="color:#94a3b8;font-weight:700;">No speech detected — try again!</span>';

  let feedbackMsg = '';
  if (pct === 100) feedbackMsg = '🏆 Perfect reading! Every word was spot on!';
  else if (pct >= 95) feedbackMsg = '⭐ Nearly perfect! Just a couple of words to work on.';
  else if (pct >= 90) feedbackMsg = '✅ Great reading! You\'re ready to level up soon.';
  else if (pct >= 80) feedbackMsg = '👍 Good effort! Try reading a little more slowly and clearly.';
  else if (pct >= 70) feedbackMsg = '📖 Keep practicing! Try pointing to each word as you read.';
  else feedbackMsg = '💡 Let\'s try again. Read slowly and say every word you see.';

  let banner = '';
  if (advanced) banner = `<div class="banner up">🎉 LEVEL UP! Moving to Level ${LEVELS[levelIdx].label} — ${LEVELS[levelIdx].desc}</div>`;
  if (regressed) banner = `<div class="banner down">🔄 Let's keep practicing at Level ${LEVELS[levelIdx].label}</div>`;

  // Build quiz HTML if questions exist
  const hasQuiz = currentBook.q && currentBook.q.length > 0;
  const quizHtml = hasQuiz ? buildQuizHtml(currentBook.q) : '';

  area.innerHTML = `
    <div class="results-card ${isSuccess ? 'success' : 'fail'} slide-up">
      <div class="score-row">
        <div>
          <div class="score-num">${pct}%</div>
          <div class="score-lbl">Accuracy Score</div>
        </div>
        <div class="badge ${isSuccess ? 's' : 'f'}">${isSuccess ? '⭐ Great!' : '💪 Try Again!'}</div>
      </div>

      <div style="background:rgba(255,255,255,0.7);border-radius:13px;padding:12px 15px;margin-bottom:15px;font-weight:700;font-size:.9rem;color:#374151;">
        ${feedbackMsg}
      </div>

      <div style="font-size:.75rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Word by Word</div>
      <div class="word-feedback">${chips}</div>

      <div class="action-row">
        <button class="btn btn-blue"   onclick="loadStory()">📖 Next Story</button>
        <button class="btn btn-green"  onclick="reloadCurrentStory()">🔄 Try Again</button>
        <button class="btn btn-ghost"  onclick="showLevelPicker()" style="font-size:.85rem;">🎯 Change Level</button>
      </div>
      ${banner}
    </div>
    ${quizHtml}`;

  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function reloadCurrentStory() {
  // Step back the index so loadStory re-loads the same story
  storyIdx = storyIdx - 1;
  if (storyIdx < 0) storyIdx = STORIES[LEVELS[levelIdx].id].length - 1;
  // Override: just re-render current book
  document.getElementById('results-area').style.display = 'none';
  renderStory();
}

function buildQuizHtml(questions) {
  const qItems = questions.map((q, qi) => {
    const opts = q.opts.map((opt, oi) =>
      `<button class="quiz-opt" onclick="answerQuiz(${qi},${oi},${q.a})" id="qopt-${qi}-${oi}">${esc(opt)}</button>`
    ).join('');
    return `
      <div class="quiz-q" id="quiz-q-${qi}">
        <p>${qi + 1}. ${esc(q.q)}</p>
        <div class="quiz-opts">${opts}</div>
        <div id="quiz-fb-${qi}" style="display:none;margin-top:7px;font-size:.82rem;font-weight:800;"></div>
      </div>`;
  }).join('');

  return `
    <div class="quiz-wrap slide-up">
      <h3>📝 Comprehension Check</h3>
      ${qItems}
      <div id="quiz-score-area"></div>
    </div>`;
}

let quizAnswers = {};
function answerQuiz(qi, selected, correct) {
  // Disable all options for this question
  for (let oi = 0; oi < 4; oi++) {
    const btn = document.getElementById(`qopt-${qi}-${oi}`);
    if (!btn) continue;
    btn.disabled = true;
    if (oi === correct) btn.classList.add('correct');
    else if (oi === selected) btn.classList.add('wrong');
    else btn.classList.add('reveal');
  }
  const fb = document.getElementById(`quiz-fb-${qi}`);
  if (fb) {
    fb.style.display = 'block';
    fb.style.color = selected === correct ? '#15803d' : '#b91c1c';
    fb.textContent = selected === correct ? '✅ Correct!' : '❌ Not quite — the correct answer is highlighted in green.';
  }
  quizAnswers[qi] = selected === correct;
  checkQuizComplete();
}

function checkQuizComplete() {
  const total = currentBook.q ? currentBook.q.length : 0;
  if (Object.keys(quizAnswers).length < total) return;
  const correct = Object.values(quizAnswers).filter(Boolean).length;
  const scoreArea = document.getElementById('quiz-score-area');
  if (!scoreArea) return;
  let cls = correct === total ? 'perfect' : correct >= Math.ceil(total / 2) ? 'good' : 'tryagain';
  let msg = correct === total
    ? `🏆 Perfect! ${correct}/${total} correct!`
    : correct >= Math.ceil(total / 2)
    ? `⭐ Good job! ${correct}/${total} correct.`
    : `💡 Keep reading! ${correct}/${total} correct. Try the story again.`;
  scoreArea.innerHTML = `<div class="quiz-score ${cls}">${msg}</div>`;
  quizAnswers = {};
}

// ════════════════════════════════════════════════════════
//  UTILITY
// ════════════════════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
buildLevelGrid();
initSpeech();
</script>
