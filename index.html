<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Buddy 📚</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#4ade80; --mint-dark:#16a34a; --sky:#38bdf8; --sky-dark:#0284c7;
  --coral:#fb7185; --yellow:#fbbf24; --purple:#a78bfa; --orange:#fb923c;
  --bg:#f0fdf4; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  background-image:radial-gradient(circle at 15% 15%,#dcfce7 0%,transparent 45%),
                   radial-gradient(circle at 85% 85%,#dbeafe 0%,transparent 45%);
  min-height:100vh;color:var(--text);padding:16px;
}
h1,h2,h3{font-family:'Fredoka One',cursive;letter-spacing:.02em;}
.container{max-width:700px;margin:0 auto;}

/* ── Header ── */
.header{
  background:#fff;border-radius:24px;padding:18px 22px;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.06);border:2px solid #dcfce7;
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
}
.header-left h1{font-size:1.7rem;color:#16a34a;}
.header-left p{font-size:.72rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
.level-badge{text-align:right;}
.level-badge .lbl{font-size:.58rem;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:.12em;}
.level-badge .val{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--mint-dark);line-height:1.1;}
.level-badge .desc{font-size:.7rem;color:var(--muted);font-weight:700;}
.streak-bar{display:flex;gap:3px;justify-content:flex-end;margin-top:5px;}
.s-dot{width:16px;height:5px;border-radius:99px;background:#e2e8f0;transition:background .3s;}
.s-dot.on{background:#22c55e;} .s-dot.warn{background:var(--coral);}

/* ── Level Picker ── */
.level-picker{
  background:#fff;border-radius:24px;padding:22px;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.05);border:2px solid #f1f5f9;
}
.level-picker h2{font-size:1.1rem;color:var(--text);margin-bottom:14px;}
.level-grid{display:flex;flex-wrap:wrap;gap:8px;}
.lvl-btn{
  padding:8px 14px;border:2px solid var(--border);border-radius:10px;
  font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;background:#fff;
  color:var(--text);transition:all .15s;letter-spacing:.03em;
}
.lvl-btn:hover{border-color:var(--mint);background:#f0fdf4;transform:translateY(-1px);}
.lvl-btn.active{background:var(--mint-dark);border-color:var(--mint-dark);color:#fff;box-shadow:0 3px 10px rgba(22,163,74,.3);}
.lvl-btn.done{background:#dcfce7;border-color:#86efac;color:#16a34a;}

/* ── Card ── */
.card{background:#fff;border-radius:24px;padding:22px;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,.05);border:2px solid #f1f5f9;}

/* ── Buttons ── */
.btn{padding:11px 20px;border:none;border-radius:12px;font-family:'Fredoka One',cursive;font-size:.98rem;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .2s;letter-spacing:.04em;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}
.btn-green {background:linear-gradient(135deg,#4ade80,#22c55e);color:#fff;box-shadow:0 4px 14px rgba(74,222,128,.3);}
.btn-blue  {background:linear-gradient(135deg,#38bdf8,#0ea5e9);color:#fff;box-shadow:0 4px 14px rgba(56,189,248,.3);}
.btn-red   {background:linear-gradient(135deg,#fb7185,#f43f5e);color:#fff;box-shadow:0 4px 14px rgba(251,113,133,.3);}
.btn-purple{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;box-shadow:0 4px 14px rgba(167,139,250,.3);}
.btn-orange{background:linear-gradient(135deg,#fb923c,#ea580c);color:#fff;box-shadow:0 4px 14px rgba(251,146,60,.3);}
.btn-ghost {background:#f1f5f9;color:#475569;}
.btn-lg{padding:17px 28px;font-size:1.45rem;width:100%;border-radius:18px;}

/* ── Story ── */
.story-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;flex-wrap:wrap;}
.story-box{background:linear-gradient(135deg,#f0fdf4,#eff6ff);border-radius:20px;padding:26px 22px;border:3px solid #dcfce7;text-align:center;}
.story-title{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--sky-dark);margin-bottom:13px;}
.story-text{font-size:1.5rem;line-height:1.8;font-weight:700;color:var(--text);}
@media(max-width:480px){.story-text{font-size:1.15rem;}}
.live-hint{margin-top:13px;padding:9px 13px;background:rgba(255,255,255,.7);border-radius:11px;font-size:.8rem;color:var(--sky-dark);font-weight:700;font-style:italic;border:1px solid #bfdbfe;animation:pulse 2s infinite;word-break:break-word;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.empty-state{padding:46px 20px;text-align:center;}
.empty-emoji{font-size:68px;display:block;margin-bottom:13px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.empty-state p{color:var(--muted);font-weight:800;font-size:1rem;}
.countdown-disp{width:100%;padding:19px;background:linear-gradient(135deg,var(--yellow),#f59e0b);color:#fff;border:none;border-radius:18px;font-family:'Fredoka One',cursive;font-size:2.4rem;text-align:center;animation:bop .5s infinite;}
@keyframes bop{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* ── Results ── */
.results-card{border-radius:24px;padding:22px;margin-bottom:14px;box-shadow:0 6px 24px rgba(0,0,0,.07);}
.results-card.success{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:3px solid #86efac;}
.results-card.fail   {background:linear-gradient(135deg,#fff7ed,#ffedd5);border:3px solid #fdba74;}
.score-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;}
.score-num{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--text);line-height:1;}
.score-lbl{font-size:.68rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.badge{padding:7px 17px;border-radius:99px;font-family:'Fredoka One',cursive;font-size:.88rem;}
.badge.s{background:#22c55e;color:#fff;} .badge.f{background:#f97316;color:#fff;}
.word-feedback{display:flex;flex-wrap:wrap;gap:6px;padding:16px;background:rgba(255,255,255,.6);border-radius:13px;margin-bottom:16px;}
.wchip{font-size:.98rem;font-weight:800;transition:transform .15s;line-height:1.6;}
.wchip.ok {color:#16a34a;}
.wchip.bad{color:#fca5a5;text-decoration:line-through;text-decoration-color:#ef4444;text-decoration-thickness:3px;}
.action-row{display:flex;gap:9px;flex-wrap:wrap;}
.action-row .btn{flex:1;min-width:100px;}
.banner{border-radius:15px;padding:13px 17px;text-align:center;font-family:'Fredoka One',cursive;font-size:1.05rem;margin-top:13px;letter-spacing:.04em;}
.banner.up  {background:linear-gradient(135deg,#4ade80,#06b6d4);color:#fff;animation:pulse 1.5s infinite;}
.banner.down{background:linear-gradient(135deg,#fb923c,#f43f5e);color:#fff;animation:bop 1s infinite;}

/* ── Progress bar ── */
.progress-wrap{margin-bottom:16px;}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;font-weight:800;color:var(--muted);margin-bottom:5px;}
.progress-track{height:8px;background:#e2e8f0;border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#4ade80,#22d3ee);transition:width .5s ease;}

/* ── Tips box ── */
.tip-box{background:#fefce8;border-radius:13px;padding:13px 16px;border:2px solid #fde68a;margin-bottom:16px;font-size:.85rem;font-weight:700;color:#92400e;line-height:1.55;}
.tip-box .tip-title{font-family:'Fredoka One',cursive;color:#d97706;margin-bottom:4px;font-size:.95rem;}

/* ── Quiz ── */
.quiz-wrap{margin-top:20px;background:#fff;border-radius:20px;padding:20px;border:2px solid #e0f2fe;box-shadow:0 4px 16px rgba(0,0,0,.05);}
.quiz-wrap h3{font-size:1.1rem;color:var(--sky-dark);margin-bottom:16px;}
.quiz-q{margin-bottom:18px;}
.quiz-q p{font-weight:800;font-size:.95rem;color:var(--text);margin-bottom:10px;}
.quiz-opts{display:flex;flex-direction:column;gap:7px;}
.quiz-opt{padding:10px 14px;border:2px solid var(--border);border-radius:11px;background:#fff;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;color:var(--text);}
.quiz-opt:hover:not(:disabled){border-color:var(--sky);background:#f0f9ff;transform:translateX(3px);}
.quiz-opt:disabled{cursor:default;transform:none;}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e;color:#15803d;}
.quiz-opt.wrong  {background:#fee2e2;border-color:#f87171;color:#b91c1c;}
.quiz-opt.reveal {background:#f1f5f9;border-color:#94a3b8;color:#64748b;}
.quiz-score{margin-top:14px;padding:12px 16px;border-radius:12px;font-family:'Fredoka One',cursive;font-size:1rem;text-align:center;}
.quiz-score.perfect{background:#dcfce7;color:#15803d;}
.quiz-score.good   {background:#dbeafe;color:#1d4ed8;}
.quiz-score.tryagain{background:#fff7ed;color:#c2410c;}

.spin{display:inline-block;width:15px;height:15px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spinning .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spinning{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .35s ease;}

/* ── Story counter pill ── */
.story-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.pill{padding:4px 12px;border-radius:99px;font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;}
.pill-green{background:#dcfce7;color:#16a34a;}
.pill-blue {background:#dbeafe;color:#1d4ed8;}

footer{text-align:center;padding:16px 0;font-size:.7rem;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:.15em;}
</style>
</head>
<body>
<div class="container">

  <!-- ══ HEADER ══ -->
  <header class="header">
    <div class="header-left">
      <h1>📚 Reading Buddy</h1>
      <p>Reading A–Z Style Coach</p>
    </div>
    <div class="level-badge">
      <div class="lbl">Current Level</div>
      <div class="val" id="hdr-level">AA</div>
      <div class="desc" id="hdr-desc">Pre-Reader</div>
      <div class="streak-bar" id="streak-bar"></div>
    </div>
  </header>

  <!-- ══ LEVEL PICKER ══ -->
  <div class="level-picker" id="level-picker">
    <h2>🎯 Choose Starting Level</h2>
    <div class="level-grid" id="level-grid"></div>
  </div>

  <!-- ══ STORY PANEL ══ -->
  <div class="card" id="story-panel" style="display:none;">
    <div class="story-top">
      <div class="story-meta">
        <h2 style="font-size:1.1rem;">Practice Time</h2>
        <span class="pill pill-green" id="story-level-pill">Level AA</span>
        <span class="pill pill-blue"  id="story-num-pill">Story 1</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="showLevelPicker()" style="font-size:.85rem;padding:8px 14px;">🎯 Change Level</button>
        <button class="btn btn-blue" id="new-story-btn" onclick="loadStory()">New Story</button>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="prog-label">Level Progress</span>
        <span id="prog-count">0 / 2 reads to advance</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div id="story-area">
      <div class="empty-state">
        <span class="empty-emoji">📖</span>
        <p>Tap "New Story" to begin!</p>
      </div>
    </div>
    <div id="mic-controls" style="margin-top:13px;display:none;"></div>
  </div>

  <!-- ══ RESULTS ══ -->
  <div id="results-area" style="display:none;"></div>

  <footer>Reading Buddy · No API Key Required · Reading A–Z Style Levels</footer>
</div>

<script>

  AA: [
    { title:"The Cat", text:"I see a cat. The cat is big. I like the cat.", q:[{q:"What does the child see?",opts:["A dog","A cat","A bird","A fish"],a:1},{q:"What is the cat like?",opts:["Big","Small","Fast","Soft"],a:0},{q:"How does the child feel about the cat?",opts:["Scared of it","Likes it","Hates it","Ignores it"],a:1}] },

    { title:"The Ball", text:"I have a ball. The ball is red. I kick the ball.", q:[{q:"What does the child have?",opts:["A bat","A kite","A toy","A ball"],a:3},{q:"What color is the ball?",opts:["Blue","Green","Yellow","Red"],a:3},{q:"What does the child do with the ball?",opts:["Throws it","Kicks it","Catches it","Drops it"],a:1}] },

  B: [
    { title:"At the Park", text:"We go to the park. I see a slide. I can go up and down. My dad is here. We have fun at the park.", q:[{q:"Where do they go?",opts:["The beach","The park","The store","The school"],a:1},{q:"What does the child see at the park?",opts:["A swing","A slide","A pond","A tree"],a:1},{q:"Who is at the park with the child?",opts:["Their dad","Their mom","Their friend","Their teacher"],a:0}] },
    { title:"My Bed", text:"My bed is soft. I get in my bed at night. I put my head on the pillow. My mom says good night. I go to sleep.", q:[{q:"What is the bed like?",opts:["Hard","Soft","Cold","Small"],a:1},{q:"What does the child put their head on?",opts:["A blanket","A stuffed animal","The mattress","The pillow"],a:3},{q:"Who says good night?",opts:["Dad","A friend","The child","Mom"],a:3}] },
    { title:"The Duck", text:"I see a duck. The duck is in the pond. The duck has ducklings. They swim in the pond. I toss bread to the ducks.", q:[{q:"Where is the duck?",opts:["In the yard","In a nest","In the pond","On the grass"],a:2},{q:"What does the duck have?",opts:["Eggs","A nest","Feathers","Ducklings"],a:3},{q:"What does the child toss to the ducks?",opts:["Bread","Seeds","Fish","Corn"],a:0}] },
    { title:"Rain Day", text:"It is raining today. I put on my boots. I jump in the puddle. Splash! My dog runs in the rain too.", q:[{q:"What is the weather like?",opts:["Sunny","Windy","Snowing","Raining"],a:3},{q:"What does the child put on?",opts:["A coat","Boots","A hat","Gloves"],a:1},{q:"Who also runs in the rain?",opts:["A friend","A cat","The child's dog","Mom"],a:2}] },
    { title:"My Cat Naps", text:"My cat likes to nap. She naps on my bed. She naps in the sun. She naps all day long. I pet my cat.", q:[{q:"What does the cat like to do?",opts:["Run","Play","Eat","Nap"],a:3},{q:"Where does the cat nap?",opts:["On the child's bed","On the floor","Under the table","In a basket"],a:0},{q:"What does the child do to the cat?",opts:["Feeds it","Pets it","Washes it","Plays with it"],a:1}] },
    { title:"The Sandbox", text:"I play in the sandbox. I fill my bucket with sand. I pat it down. Then I flip it over. I made a sand cake! My brother wants one too. I make him one. We laugh and play.", q:[{q:"What does the child fill with sand?",opts:["A cup","A box","A bucket","A bowl"],a:2},{q:"What does the child make in the sandbox?",opts:["A sand castle","A hole","A sand cake","A road"],a:2},{q:"Who else wants a sand cake?",opts:["A sister","A friend","The child's dad","The child's brother"],a:3}] },
    { title:"My Red Coat", text:"It is cold outside. I put on my red coat. I zip it up. I put on my hat. Now I am warm. I go out to play in the snow. I love the cold days.", q:[{q:"Why does the child put on a coat?",opts:["It is raining","It is hot","It is cold outside","It is windy"],a:2},{q:"What color is the coat?",opts:["Blue","Green","Red","Yellow"],a:2},{q:"What does the child do after getting dressed?",opts:["Goes to bed","Goes out to play in the snow","Watches TV","Eats lunch"],a:1}] },
    { title:"The Snail", text:"I found a snail on a leaf. It had a brown shell on its back. It moved very slowly. I watched it for a long time. Then it went under the leaf and I could not see it anymore.", q:[{q:"Where did the child find the snail?",opts:["On a rock","On the ground","On a leaf","In the mud"],a:2},{q:"What did the snail have on its back?",opts:["A brown shell","A hard skin","A soft shell","A green shell"],a:0},{q:"How did the snail move?",opts:["Very fast","In circles","Very slowly","By jumping"],a:2}] },
  ],
  C: [
    { title:"The Nest", text:"A bird has a nest in the tree. The nest has three eggs in it. The eggs are small and blue. One day the eggs crack open. Three baby birds pop out. They are hungry. The mom bird brings food.", q:[{q:"Where is the bird's nest?",opts:["On the ground","In a bush","In the tree","On a roof"],a:2},{q:"What color are the eggs?",opts:["White","Yellow","Green","Blue"],a:3},{q:"How many baby birds pop out?",opts:["Three","One","Two","Four"],a:0}] },
    { title:"We Bake", text:"Mom and I bake a cake. We mix the batter. We put it in the pan. We put it in the oven. It smells so good. When it is done, we put on the frosting. Then we eat it up.", q:[{q:"What do Mom and the child bake?",opts:["Cookies","Bread","A pie","A cake"],a:3},{q:"Where do they put the batter to cook?",opts:["On the stove","In the microwave","In the oven","In the fridge"],a:2},{q:"What do they put on after it is done?",opts:["Sprinkles","Frosting","Jam","Sugar"],a:1}] },
    { title:"My Bike", text:"I have a red bike. I ride my bike on the path. I go fast down the hill. My dad runs behind me. I do not fall. I am a good rider now.", q:[{q:"What color is the bike?",opts:["Red","Blue","Green","Yellow"],a:0},{q:"Who runs behind the child?",opts:["Mom","A friend","A sibling","Dad"],a:3},{q:"Does the child fall?",opts:["Yes, once","Yes, twice","No","The story doesn't say"],a:2}] },
    { title:"The Frog", text:"I see a green frog by the pond. The frog jumps on a lily pad. It sits very still. Then it jumps in the water. Splash! I look for the frog but it is gone.", q:[{q:"What color is the frog?",opts:["Green","Brown","Yellow","Blue"],a:0},{q:"Where does the frog jump first?",opts:["Into the water","Onto a rock","Onto a lily pad","Into the grass"],a:2},{q:"What happens when the child looks for the frog?",opts:["It jumps again","It is still on the pad","It is gone","It comes closer"],a:3}] },
    { title:"Dog Tricks", text:"My dog can do tricks. She can sit and stay. She can shake my hand. She can roll over. I give her a treat when she does a good job. She wags her tail.", q:[{q:"What is one trick the dog can do?",opts:["Fetch","Jump","Bark","Roll over"],a:3},{q:"What does the child give the dog for doing well?",opts:["A treat","A toy","A hug","A pat"],a:0},{q:"What does the dog do at the end?",opts:["Sits down","Runs away","Wags her tail","Barks"],a:2}] },
    { title:"The Kite", text:"I got a kite for my birthday. It is yellow and has a long tail. We went to the park to fly it. The wind picked it up high into the sky. I held the string and ran. The kite went higher and higher. At the end of the day I did not want to go home.", q:[{q:"What color is the kite?",opts:["Red","Yellow","Green","Blue"],a:1},{q:"Where did they go to fly the kite?",opts:["The beach","The backyard","The school","The park"],a:3},{q:"How did the child feel at the end of the day?",opts:["Tired and happy","Did not want to go home","Hungry and cold","Ready for bed"],a:1}] },
    { title:"Our Class Garden", text:"Our class planted seeds in little cups. We put them on the window. We gave them water every day. After one week, tiny green plants grew. We cheered! Our teacher said we did a great job. Soon we will plant them outside.", q:[{q:"Where did the class put the cups?",opts:["On the shelf","On the desk","On the window","Outside"],a:2},{q:"How long did it take for plants to grow?",opts:["One week","One day","Two weeks","Three days"],a:0},{q:"What will the class do next with the plants?",opts:["Take them home","Throw them away","Plant them outside","Give them to parents"],a:2}] },
    { title:"The Lost Teddy", text:"Sam could not find his teddy bear at bedtime. He looked under his bed. He looked in the toy box. He looked behind the couch. Mom helped him look. They found it in the washing machine! Mom had washed it that morning. Sam gave it a big hug.", q:[{q:"When did Sam notice his teddy was missing?",opts:["At breakfast","At bedtime","After school","In the morning"],a:1},{q:"Where was the teddy found?",opts:["Under the bed","In the toy box","Behind the couch","In the washing machine"],a:3},{q:"Why was the teddy in the washing machine?",opts:["Sam put it there","A sibling hid it","Mom had washed it","It fell in by accident"],a:2}] },
  ],
  D: [
    { title:"The Garden", text:"Grandma has a garden in her backyard. She grows tomatoes, beans, and flowers. Every morning she waters the plants. I help her pull the weeds. When the vegetables are ready, we pick them together. Then Grandma makes soup. It tastes so good because we grew it ourselves.", q:[{q:"Where is Grandma's garden?",opts:["In the front yard","In the backyard","On the roof","At the park"],a:1},{q:"What does Grandma make with the vegetables?",opts:["Soup","A salad","A stew","A sandwich"],a:0},{q:"What does the child help Grandma do?",opts:["Water the plants","Pick the flowers","Pull the weeds","Make the soup"],a:2}] },
    { title:"Lost Mitten", text:"One cold morning, I lost my mitten on the way to school. I looked in my bag. I looked in my coat pocket. I looked on the ground. My teacher helped me look. We found it under my chair. I was so happy. Now I keep my mittens in my pocket.", q:[{q:"When did the child lose the mitten?",opts:["One cold morning","At night","On a warm day","After school"],a:0},{q:"Who helped the child look for the mitten?",opts:["A friend","Mom","Dad","The teacher"],a:3},{q:"Where was the mitten found?",opts:["In the bag","Under the chair","On the ground","In the coat pocket"],a:1}] },
    { title:"The Puppy", text:"We got a new puppy from the shelter. His name is Biscuit. He has brown spots and floppy ears. At first he was scared in our house. I sat on the floor and waited. He came over and licked my hand. Now Biscuit sleeps at the foot of my bed every night.", q:[{q:"Where did the family get the puppy?",opts:["A pet store","A friend's house","The shelter","A farm"],a:2},{q:"What is the puppy's name?",opts:["Biscuit","Buddy","Bruno","Benji"],a:0},{q:"Where does Biscuit sleep now?",opts:["At the foot of the child's bed","In the kitchen","In a dog bed","In the hallway"],a:0}] },
    { title:"Making Pizza", text:"Saturday is pizza night at our house. Dad rolls the dough into a big circle. Mom spreads the sauce on top. I get to put on the cheese. Then we each pick our toppings. I always pick peppers and mushrooms. The pizza goes in the oven. In twenty minutes dinner is ready.", q:[{q:"When is pizza night?",opts:["Friday","Sunday","Saturday","Monday"],a:2},{q:"What does the child put on the pizza?",opts:["Cheese","Sauce","Dough","Toppings"],a:0},{q:"What toppings does the child always pick?",opts:["Ham and pineapple","Peppers and mushrooms","Olives and onions","Cheese and tomato"],a:1}] },
    { title:"A Rainy Day", text:"It rained all Saturday. I could not go outside to play. First I read two books. Then I painted a picture of a rainbow. Mom taught me how to make cookies. We played a board game until dinner. It turned out to be a great day even without sunshine.", q:[{q:"What was the weather like all Saturday?",opts:["Sunny","Snowy","Windy","Rainy"],a:3},{q:"What did the child paint a picture of?",opts:["A garden","Their house","A cat","A rainbow"],a:3},{q:"Who taught the child how to make cookies?",opts:["Dad","A sibling","Grandma","Mom"],a:3}] },
    { title:"The Class Trip", text:"Our class went to the science museum. We saw rocks, fossils, and a model of the solar system. My favourite part was the earthquake machine. You could stand on it and feel the ground shake. Our teacher bought each of us a small rock to keep. I put mine on my desk at home.", q:[{q:"Where did the class go on their trip?",opts:["The art museum","The science museum","The zoo","The library"],a:1},{q:"What was the child's favourite part?",opts:["The rocks","The fossils","The solar system model","The earthquake machine"],a:3},{q:"What did the teacher buy for each student?",opts:["A book","A poster","A small rock","A pencil"],a:2}] },
    { title:"Helping at Home", text:"On Saturday mornings I help out at home. I make my bed and tidy my room. Then I help Dad wash the dishes. After that we sweep the kitchen floor together. Dad says I am a great helper. When we are done, we make pancakes for the whole family.", q:[{q:"When does the child help at home?",opts:["After school","Sunday afternoons","Saturday mornings","On weekdays"],a:2},{q:"What does the child do with Dad after the dishes?",opts:["Vacuum the living room","Cook dinner","Sweep the kitchen floor","Take out the garbage"],a:2},{q:"What do they make when the chores are done?",opts:["Waffles","Toast","Eggs","Pancakes"],a:3}] },
    { title:"The New Baby", text:"My aunt had a baby last month. His name is Leo. He is very small with tiny fingers and toes. When I held him he made a funny face and grabbed my finger. He sleeps a lot during the day. My aunt says he will grow fast. I cannot wait until he is big enough to play with me.", q:[{q:"What is the baby's name?",opts:["Leo","Liam","Luke","Luca"],a:0},{q:"What did the baby do when the child held him?",opts:["Cried loudly","Fell asleep","Made a funny face and grabbed the child's finger","Smiled and laughed"],a:2},{q:"What does the child look forward to?",opts:["Babysitting Leo","When Leo can talk","When Leo is big enough to play","Holding Leo again"],a:2}] },
  ],
  E: [
    { title:"The Science Fair", text:"Our class had a science fair. I made a volcano out of clay and painted it red and orange. I put baking soda inside. When I poured in the vinegar, it bubbled up like lava. Everyone gathered around to watch. My teacher said it was an excellent project. I felt very proud of all the work I had done.", q:[{q:"What did the child make for the science fair?",opts:["A robot","A solar system","A volcano","A bridge"],a:2},{q:"What did the child pour in to make it bubble?",opts:["Water","Vinegar","Juice","Soap"],a:1},{q:"What did the teacher say about the project?",opts:["It was excellent","It was okay","It needed work","It was too small"],a:0}] },
    { title:"The Library", text:"On Tuesday afternoons, Mom takes me to the library. The library is my favorite place. I love how quiet it is inside. The librarian knows my name and always finds books I will enjoy. Last week she found a whole series about a brave girl who solves mysteries. I have already read three of them.", q:[{q:"When does Mom take the child to the library?",opts:["Saturday mornings","Wednesday afternoons","Tuesday afternoons","Friday evenings"],a:2},{q:"What does the librarian always do?",opts:["Reads to the child","Finds books the child will enjoy","Saves a seat for the child","Gives the child a snack"],a:1},{q:"How many books from the new series has the child already read?",opts:["Three","One","Two","Four"],a:0}] },
    { title:"Camping Trip", text:"Our family went camping in the woods last summer. We set up our tent near a little stream. Dad taught me how to fish, and I caught my very first fish. At night we sat by the campfire. Dad told funny stories and Mom made hot chocolate. The stars looked so bright without city lights around.", q:[{q:"Where did the family set up their tent?",opts:["By a lake","Near a little stream","In a field","On a hill"],a:1},{q:"What did Dad teach the child to do?",opts:["Swim","Cook","Hike","Fish"],a:3},{q:"What did Mom make at the campfire?",opts:["Hot dogs","Soup","Hot chocolate","S'mores"],a:2}] },
    { title:"My New School", text:"Starting at a new school felt really scary. I did not know anyone at all. On my first morning, a girl named Sofia sat next to me at lunch. She showed me where everything was and introduced me to her friends. By the end of the week, I was not scared anymore. Sofia and I are best friends now.", q:[{q:"How did the child feel about starting at a new school?",opts:["Scared","Excited","Happy","Bored"],a:0},{q:"What is the new friend's name?",opts:["Mia","Sara","Lily","Sofia"],a:3},{q:"What are Sofia and the child now?",opts:["Classmates","Neighbors","Best friends","Lab partners"],a:2}] },
    { title:"The Storm", text:"A big thunderstorm came through town last night. The thunder was so loud it woke me up. I saw lightning flash across the sky. I was a little frightened, so I went to my parents' room. Mom explained how lightning works. Dad showed me how to count the seconds between lightning and thunder. By the time it was over, I was not scared at all.", q:[{q:"What woke the child up?",opts:["The thunder","The rain","The wind","The lightning"],a:0},{q:"Where did the child go when frightened?",opts:["The kitchen","Under the covers","A sibling's room","Their parents' room"],a:3},{q:"What did Dad show the child how to do?",opts:["Stay calm","Count seconds between lightning and thunder","Turn off the lights","Close the windows"],a:1}] },
    { title:"The Bake Sale", text:"Our school held a bake sale to raise money for new playground equipment. My mom and I made two dozen chocolate chip cookies the night before. At school I sat at a table and sold them for fifty cents each. By noon we had run out. Our class raised more money than any other class. The principal announced it over the loudspeaker and everyone cheered.", q:[{q:"Why did the school hold a bake sale?",opts:["To celebrate the end of the year","To raise money for new playground equipment","To welcome new students","To help a local charity"],a:1},{q:"What did the child and mom make for the sale?",opts:["Cupcakes","Brownies","Chocolate chip cookies","Muffins"],a:2},{q:"How much did each item cost at the sale?",opts:["Twenty-five cents","Fifty cents","One dollar","Seventy-five cents"],a:1}] },
    { title:"The Pond in Winter", text:"Every winter, the pond at the edge of our neighbourhood freezes over. When it is cold enough, kids from the whole street come to skate on it. My dad checks the ice first to make sure it is thick and safe. Last year I learned to skate for the first time. I fell down many times, but I kept getting back up. By the end of the afternoon I could skate all the way across without falling.", q:[{q:"What happens to the pond in winter?",opts:["It dries up","It freezes over","It floods the street","It turns green"],a:1},{q:"Who checks the ice before the kids skate?",opts:["The child","A neighbour","The child's dad","The school teacher"],a:2},{q:"What did the child learn to do last year?",opts:["Ski","Build a snowman","Skate","Play hockey"],a:2}] },
    { title:"My Favourite Season", text:"My favourite season is autumn. The leaves on the trees turn red, orange, and yellow. My brother and I rake them into a big pile in the backyard. Then we jump in. Leaves fly everywhere and we laugh until our stomachs hurt. After that, Mom brings out hot apple cider. I hold the warm cup in both hands. It is the best feeling in the world.", q:[{q:"What is the child's favourite season?",opts:["Winter","Spring","Summer","Autumn"],a:3},{q:"What do the children do with the pile of leaves?",opts:["Bag them up","Burn them","Jump in","Make a fort"],a:2},{q:"What does Mom bring out after the leaf jump?",opts:["Hot chocolate","Apple cider","Lemonade","Soup"],a:1}] },
  ],
  F: [
    { title:"My New Boots", text:"I got new boots for the rain. They are yellow and shiny. I put them on and ran outside. I jumped in a big puddle. Splash! Water went everywhere. My boots kept my feet dry. I love my new yellow boots.", q:[{q:"What color are the boots?",opts:["Red","Blue","Yellow","Green"],a:2},{q:"What did the child jump in?",opts:["A pile of leaves","A big puddle","A sandbox","A snowbank"],a:1},{q:"What did the boots keep dry?",opts:["The child's feet","The child's hands","The child's coat","The child's bag"],a:0}] },
    { title:"The Lost Kitten", text:"A little kitten sat under a bush. It was gray and very small. It made a soft crying sound. A girl named Mia heard it. She looked under the bush and found the kitten. She picked it up and held it close. She took it home and gave it some milk. The kitten stopped crying and went to sleep.", q:[{q:"Where was the kitten sitting?",opts:["Under a tree","On a step","Under a bush","In a box"],a:2},{q:"What color was the kitten?",opts:["White","Orange","Black","Gray"],a:3},{q:"What did Mia give the kitten at home?",opts:["Milk","Water","Food","A toy"],a:0}] },
    { title:"At the Farm", text:"We went to a farm on a sunny day. I saw cows, pigs, and chickens. A big brown cow looked at me. I gave her some hay to eat. The chickens ran all around the yard. A baby pig played in the mud. It was a fun day at the farm.", q:[{q:"What kind of day was it at the farm?",opts:["Rainy","Cloudy","Windy","Sunny"],a:3},{q:"What did the child give the cow?",opts:["Water","Corn","Hay","Grass"],a:2},{q:"What was the baby pig doing?",opts:["Playing in the mud","Sleeping","Eating","Running in the yard"],a:0}] },
    { title:"The Big Snowball", text:"After school, Sam and his sister went outside. There was lots of snow on the ground. They rolled a small ball of snow. They kept rolling it and rolling it. The ball got bigger and bigger. It was as big as a table! They put a scarf and a hat on it. Now it was a snowman.", q:[{q:"Who went outside with Sam?",opts:["His friend","His dad","His sister","His teacher"],a:2},{q:"What did Sam and his sister make?",opts:["A snow fort","A snowman","A snow angel","A sled"],a:1},{q:"What did they put on the snowball?",opts:["Sticks and rocks","Mittens and boots","A coat and gloves","A scarf and a hat"],a:3}] },
    { title:"The Butterfly", text:"I was in the garden when I saw a butterfly. It had orange and black wings. It flew from flower to flower. It landed on a red flower and sat very still. I got very close to look at it. Then it flew up into the sky. I watched it go until I could not see it anymore.", q:[{q:"Where did the child see the butterfly?",opts:["At the park","In the garden","By the pond","On the porch"],a:1},{q:"What colors were the butterfly's wings?",opts:["Orange and black","Blue and green","Yellow and white","Red and purple"],a:0},{q:"What did the butterfly do at the end?",opts:["Landed on the child","Flew up into the sky","Hid in a flower","Sat on the grass"],a:1}] },
    { title:"The Puppet Show", text:"Our class put on a puppet show for the younger kids. I made my puppet out of a brown paper bag. I drew a big smile and two round eyes on it. I also glued on yellow yarn for hair. My puppet was a friendly lion. When it was our turn to perform, I hid behind the cardboard stage. The little kids laughed at all the funny parts. It was the best day of the whole school year.", q:[{q:"What did the child make the puppet out of?",opts:["A sock","A brown paper bag","A cardboard box","A plastic cup"],a:1},{q:"What kind of animal was the child's puppet?",opts:["A bear","A dog","A lion","A rabbit"],a:2},{q:"How did the younger kids react to the show?",opts:["They cried","They were bored","They laughed","They were scared"],a:2}] },
    { title:"The Goldfish", text:"We won a goldfish at the school fair. We named her Sunny because she was bright orange. Dad helped us set up a tank with rocks and a little plastic plant. Every morning I feed her a pinch of fish food and watch her swim to the top. Sunny follows my finger when I trace it along the glass. My little sister thinks Sunny can hear her when she talks to her. Maybe she is right.", q:[{q:"Where did the family get the goldfish?",opts:["A pet store","A friend's house","The school fair","A lake"],a:2},{q:"What is the goldfish's name?",opts:["Goldie","Sunny","Bubbles","Flash"],a:1},{q:"What does the fish do when the child moves a finger along the glass?",opts:["Hides behind the rock","Swims to the bottom","Blows bubbles","Follows the finger"],a:3}] },
    { title:"A Walk in the Rain", text:"Mom said we could go for a walk even though it was raining. I put on my yellow raincoat and my rubber boots. We walked down the street and I jumped in every puddle I could find. The drops made circles on the puddles when they landed. We saw a big worm on the sidewalk and carefully moved it to the grass. By the time we got home, my boots were soaked on the inside but I did not care one bit.", q:[{q:"What did the child wear for the walk?",opts:["A blue coat and sneakers","A yellow raincoat and rubber boots","A red jacket and rain hat","A green coat and rubber boots"],a:1},{q:"What did the child do with every puddle?",opts:["Walked around it","Looked at it","Jumped in it","Measured it"],a:2},{q:"What did they do when they found a worm on the sidewalk?",opts:["Left it where it was","Put it in a jar","Moved it to the grass","Picked it up"],a:2}] },
  ],
  G: [
    { title:"Frogs", text:"Frogs are animals that live near water. They have wet skin and long back legs. Their back legs are great for jumping and swimming. Frogs eat bugs like flies and mosquitoes. They catch bugs with their long sticky tongues. In winter, many frogs hide under mud at the bottom of a pond. They stay there until spring comes again.", q:[{q:"Where do frogs live?",opts:["In the desert","Near water","In tall trees","Underground"],a:1},{q:"What do frogs eat?",opts:["Plants and seeds","Fish and worms","Bugs like flies and mosquitoes","Berries and leaves"],a:2},{q:"Where do many frogs go in winter?",opts:["They hide under mud at the bottom of a pond","They fly south","They hide in a tree","They move into houses"],a:0}] },
    { title:"My Garden", text:"This spring I planted my own small garden. I dug five holes in the dirt and put seeds in each one. Every day I watered the seeds and checked for weeds. After two weeks, tiny green plants poked up through the soil. By summer, I had tomatoes, carrots, and beans. I picked them and we used them for dinner. Growing my own food felt like magic.", q:[{q:"How many holes did the child dig for seeds?",opts:["Three","Four","Five","Six"],a:2},{q:"How long did it take before tiny plants appeared?",opts:["One week","One month","Three days","Two weeks"],a:3},{q:"What did the child grow in the garden?",opts:["Potatoes, peas, and corn","Tomatoes, carrots, and beans","Peppers, squash, and onions","Lettuce, beets, and peas"],a:1}] },
    { title:"The Fire Station", text:"Our class went on a trip to the fire station. A firefighter named Carlos showed us around. He showed us the big red fire truck and all the hoses inside it. We tried on a heavy firefighter helmet. Carlos told us what to do if there is a fire at home. He said to get out fast and meet outside. Then call for help. Never go back in for any reason.", q:[{q:"Who showed the class around the fire station?",opts:["A teacher named Ms. Lee","A firefighter named Carlos","A police officer","The principal"],a:1},{q:"What did the class try on?",opts:["A firefighter helmet","A firefighter coat","Heavy boots","Thick gloves"],a:0},{q:"What did Carlos say to do first if there is a fire?",opts:["Call for help","Get out fast","Find your pet","Hide under the bed"],a:1}] },
    { title:"Bear Cubs", text:"Black bears are born in winter while their mother sleeps. The cubs are tiny when they are born. They drink their mother's milk and grow fast. By spring, the mother bear wakes up. She takes her cubs outside to find food. Cubs stay with their mother for about two years. She teaches them how to find berries, fish, and insects to eat.", q:[{q:"When are black bear cubs born?",opts:["In summer","In spring","In fall","In winter"],a:3},{q:"How long do cubs stay with their mother?",opts:["Six months","One year","About two years","Three years"],a:2},{q:"What does the mother bear teach her cubs to find?",opts:["Honey and nuts","Grass and leaves","Roots and bark","Berries, fish, and insects"],a:3}] },
    { title:"The School Play", text:"Our class put on a play about the seasons. I played the part of winter. I wore a white costume and blew paper snowflakes across the stage. My friend Ava played summer. She wore a yellow dress and held a big paper sun. We practiced for three weeks. On the big night, the gym was full of families. When it was over, everyone clapped loudly. I felt proud of our whole class.", q:[{q:"What was the school play about?",opts:["The seasons","Animals","The ocean","Space"],a:0},{q:"What did the child wear as winter?",opts:["A blue costume","A white costume","A gray costume","A silver costume"],a:1},{q:"How long did the class practice for the play?",opts:["One week","Two weeks","Three weeks","Four weeks"],a:2}] },
  ],
  H: [
    { title:"How Caterpillars Change", text:"A caterpillar does not stay a caterpillar forever. When it is ready, it forms a hard shell around itself called a chrysalis. Inside the chrysalis, something amazing happens. The caterpillar slowly changes into a butterfly. This can take a few weeks. When the butterfly is ready, it breaks open the shell and climbs out. Its wings are wet at first. The butterfly waits for its wings to dry before it flies away.", q:[{q:"What is the hard shell a caterpillar forms called?",opts:["A chrysalis","A cocoon","A pod","A nest"],a:0},{q:"What does the caterpillar turn into inside the shell?",opts:["A moth","A dragonfly","A bee","A butterfly"],a:3},{q:"Why does the butterfly wait after coming out?",opts:["It is cold outside","Its wings need to dry","It is tired from the change","It needs to eat first"],a:1}] },
    { title:"The Lemonade Stand", text:"On a hot July day, my brother and I set up a lemonade stand at the end of our driveway. We squeezed twelve lemons and mixed the juice with water and sugar. We made a sign out of cardboard and wrote the price in big letters. Our first customer was our neighbor Mr. Park. By the end of the afternoon we had sold twenty cups. We made enough money to buy a new board game.", q:[{q:"Where did the children set up their lemonade stand?",opts:["At the park","In front of the school","In the backyard","At the end of the driveway"],a:3},{q:"How many lemons did they squeeze?",opts:["Twelve","Eight","Ten","Fifteen"],a:0},{q:"How many cups did they sell by the end of the afternoon?",opts:["Ten","Fifteen","Twenty-five","Twenty"],a:3}] },
    { title:"Sea Turtles", text:"Sea turtles are very old animals. They have lived on Earth for more than one hundred million years. Sea turtles spend most of their lives in the ocean. But female sea turtles come to the beach to lay their eggs in the sand. They dig a hole, lay about one hundred eggs, and cover them back up. When the baby turtles hatch, they crawl to the ocean by themselves. Many animals try to eat them, so only a few babies survive.", q:[{q:"Where do sea turtles spend most of their lives?",opts:["On beaches","In rivers","In the ocean","In lakes"],a:2},{q:"About how many eggs does a sea turtle lay at one time?",opts:["One hundred","Twenty","Fifty","Two hundred"],a:0},{q:"What do baby turtles do after they hatch?",opts:["Wait for their mother","Crawl to the ocean by themselves","Hide under the sand","Stay near the nest"],a:1}] },
    { title:"The Class Pet", text:"Our class got a hamster named Peanut. He is small and golden brown with big dark eyes. We take turns feeding him seeds and fresh vegetables. He loves to run on his wheel at night. Ms. Chen taught us how to hold him gently so he feels safe. When Peanut runs in his clear plastic ball around the classroom, everyone laughs. He is our favorite part of the school day.", q:[{q:"What is the class pet's name?",opts:["Biscuit","Nugget","Cookie","Peanut"],a:3},{q:"What does Peanut love to do at night?",opts:["Eat seeds","Sleep in his cage","Run on his wheel","Play with toys"],a:2},{q:"What does Peanut run around in across the classroom?",opts:["A small wagon","A clear plastic ball","A cardboard box","A tiny car"],a:1}] },
    { title:"Helpers in Our Town", text:"Many people work hard to keep our town safe and clean. Firefighters rush to put out fires and help people who are hurt. Garbage collectors pick up trash every week so our streets stay clean. Bus drivers take people to work and school every day. Doctors and nurses help us when we are sick. All of these workers are important. Next time you see one of them, you could say thank you.", q:[{q:"What do garbage collectors do?",opts:["Pick up trash every week","Put out fires","Fix roads","Drive school buses"],a:0},{q:"Who helps us when we are sick?",opts:["Firefighters and police","Doctors and nurses","Bus drivers and teachers","Garbage collectors and builders"],a:1},{q:"What does the story suggest you do when you see one of these workers?",opts:["Wave to them","Take a photo","Say thank you","Ask them a question"],a:2}] },

  I: [
    { title:"How Volcanoes Work", text:"A volcano is an opening in the earth where hot melted rock called lava comes out. Deep underground, rock gets so hot that it melts and turns into a thick liquid. This liquid is called magma. When pressure builds up, the magma pushes up through cracks and erupts out of the top of the volcano. The lava flows down the sides and cools slowly. When it hardens, it forms new rock. Over many years, layers of hardened lava can build up to form a mountain.", q:[{q:"What is melted rock underground called?",opts:["Lava","Magma","Ash","Crust"],a:1},{q:"What causes magma to erupt out of a volcano?",opts:["A build up of pressure","An earthquake","Wind pressure","Heavy rain"],a:0},{q:"What happens to lava after it flows down the sides of a volcano?",opts:["It becomes magma again","It flows into the ocean","It cools and hardens into new rock","It disappears into the ground"],a:2}] },
    { title:"My Pen Pal", text:"Last fall my teacher helped our class find pen pals in another country. My pen pal is a girl named Amara who lives in Ghana. We write letters to each other every month. Amara told me she lives near the ocean and loves to swim. I told her about winters here and how I skate on the pond near my house. She had never seen snow before. I drew her a picture of a snowflake. She drew me a picture of a baobab tree. Writing to Amara has taught me a lot about a place I have never been.", q:[{q:"Where does the pen pal Amara live?",opts:["Brazil","India","Japan","Ghana"],a:3},{q:"What does Amara love to do?",opts:["Swim","Read books","Play soccer","Ride bikes"],a:0},{q:"What did the narrator draw for Amara?",opts:["A pond","A snowflake","A winter coat","An ice skate"],a:1}] },
    { title:"Bats", text:"Many people are scared of bats, but bats are actually very helpful animals. Most bats eat insects. A single bat can eat thousands of mosquitoes in one night. Bats sleep during the day and hunt at night. They use a special skill called echolocation to find their food in the dark. They send out high sounds that bounce off objects and come back to them. This tells the bat where things are. Without bats, there would be many more insects bothering us.", q:[{q:"What do most bats eat?",opts:["Fruit","Fish","Insects","Seeds"],a:2},{q:"What is echolocation?",opts:["A way bats see in the dark with their eyes","A skill using sounds that bounce off objects","A type of sleeping pattern","A way bats talk to each other"],a:1},{q:"What does the story say would happen without bats?",opts:["There would be many more insects","There would be fewer birds","Plants would stop growing","The nights would be quieter"],a:0}] },
    { title:"The Science Project", text:"For our science project, my partner Jess and I tested which paper towel was the most absorbent. We poured the same amount of water on three different brands and measured how much each one soaked up. We wrote everything down in a notebook. The most expensive brand did not soak up the most water. The cheapest one worked the best. Our teacher said we had done a real experiment with a surprising result. We presented our findings to the class and answered their questions.", q:[{q:"What were Jess and the narrator testing in their experiment?",opts:["Which soap cleans best","Which paper towel was most absorbent","Which sponge holds the most water","Which cloth dries fastest"],a:1},{q:"Which paper towel soaked up the most water?",opts:["The most expensive one","The middle-priced one","The cheapest one","They were all the same"],a:2},{q:"What did the students do after finishing their experiment?",opts:["Presented their findings to the class","Made a poster","Wrote a report","Did the experiment again"],a:0}] },
    { title:"Moving to a New Town", text:"When my family moved to Riverside in September, I did not know anyone. Our house was on a quiet street with big maple trees. On the first day of school, a boy named Owen showed me where my classroom was and sat with me at lunch. He told me about the town, the best hill for sledding, and which teacher gave the most homework. By the end of the first week I had learned my way around. Having one friend made everything easier. Now Riverside feels like home.", q:[{q:"When did the family move to Riverside?",opts:["In June","In August","In September","In October"],a:2},{q:"What is the name of the boy who helped the narrator?",opts:["Ethan","Oscar","Oliver","Owen"],a:3},{q:"What did Owen tell the narrator about?",opts:["The best swimming spot","The school library and the gym","The nearest park and the bus route","The town, the best sledding hill, and which teacher gives the most homework"],a:3}] },
  ],
  J: [
    { title:"Why Birds Migrate", text:"Every fall, millions of birds fly south to find warmer weather. This is called migration. Birds migrate because it gets too cold to find food where they live. Some birds fly thousands of kilometres to reach their winter home. In spring, they fly all the way back. Scientists are not sure exactly how birds know which way to go. Many birds seem to use the sun and stars to find their direction. Some may even feel the pull of the Earth like a compass.", q:[{q:"Why do birds migrate in the fall?",opts:["To find a mate","Because it gets too cold to find food","To escape predators","To build new nests"],a:1},{q:"What do birds use to help find their direction?",opts:["The sun and stars","Wind patterns and clouds","Mountains and rivers","The temperature of the air"],a:0},{q:"When do migrating birds return to where they came from?",opts:["In summer","In fall","In winter","In spring"],a:3}] },
    { title:"The Honey Bee", text:"Honey bees are some of the hardest workers in nature. A hive can have up to fifty thousand bees living together. Each bee has a job. Worker bees collect nectar from flowers and bring it back to the hive. Other bees turn the nectar into honey by adding chemicals from their bodies and drying it out. Bees also help plants grow by carrying pollen from flower to flower. This is called pollination. Without bees, many of the fruits and vegetables we eat would not exist.", q:[{q:"How many bees can live in one hive?",opts:["Up to five thousand","Up to fifty thousand","Up to twenty thousand","Up to one hundred thousand"],a:1},{q:"What do worker bees collect from flowers?",opts:["Pollen only","Honey","Water","Nectar"],a:3},{q:"What is it called when bees carry pollen from flower to flower?",opts:["Migration","Pollination","Fertilization","Collection"],a:1}] },
    { title:"The New Neighbor", text:"A moving truck pulled up next door on a Saturday morning. I watched from the window as boxes and furniture were carried inside. Later that afternoon, a girl about my age came out and sat on the front steps. I walked over and introduced myself. Her name was Priya. She had just moved from a city far away and did not know anyone here yet. We talked for a long time. By the time her mom called her in for dinner, we had made plans to walk to school together on Monday.", q:[{q:"What day did the moving truck arrive?",opts:["Friday","Sunday","Monday","Saturday"],a:3},{q:"What is the new neighbor's name?",opts:["Priya","Prita","Prisha","Pritha"],a:0},{q:"What plans did the two girls make?",opts:["To play at the park after school","To meet at the library on Sunday","To walk to school together on Monday","To have lunch together"],a:2}] },
    { title:"Caves", text:"Caves are dark holes in the earth, usually found inside mountains or cliffs. They are formed over thousands of years when water slowly dissolves rock. Inside a cave, you might see stalactites hanging from the ceiling and stalagmites rising from the floor. These are made from minerals left behind by dripping water. Some caves are home to bats, fish, and insects that have adapted to living in the dark. Explorers who study caves are called speleologists. Some caves are so large they have their own rivers and lakes inside.", q:[{q:"How are most caves formed?",opts:["By water slowly dissolving rock over thousands of years","By earthquakes cracking open the ground","By rivers cutting through rock","By volcanic eruptions"],a:0},{q:"What are stalactites?",opts:["Rocks that rise from the cave floor","Pools of water on the cave floor","Animals that live in caves","Minerals that hang from the cave ceiling"],a:3},{q:"What are explorers who study caves called?",opts:["Geologists","Archaeologists","Speleologists","Volcanologists"],a:2}] },
    { title:"A Snowy Rescue", text:"Last winter, a family of ducks got stuck on a frozen pond near our school. The ice was too slippery for them to walk and too thick for them to swim. A teacher called the local animal rescue centre. Two workers arrived with special equipment. They carefully broke a path through the ice to the edge of the pond. One by one the ducks waddled to safety. All seven ducks made it out. Our whole class watched from the window. We cheered when the last duck reached the grass.", q:[{q:"Where were the ducks stuck?",opts:["On a frozen pond near the school","Under a bridge","In the school garden","In a tree near the school"],a:0},{q:"Who did the teacher call for help?",opts:["The fire department","The local animal rescue centre","The police","A vet"],a:1},{q:"How many ducks were rescued?",opts:["Five","Eight","Six","Seven"],a:3}] },
  ],
  K: [
    { title:"The Water Cycle", text:"Water is always moving between the Earth and the sky. When the sun heats water in lakes, rivers, and oceans, some of it turns into water vapour and rises into the air. This is called evaporation. High in the sky, the vapour cools and turns into tiny water droplets that form clouds. This is called condensation. When enough droplets collect, they fall back to Earth as rain or snow. This is called precipitation. The water collects in rivers and oceans again, and the whole cycle starts over.", q:[{q:"What is it called when water turns into vapour and rises into the air?",opts:["Condensation","Precipitation","Evaporation","Circulation"],a:2},{q:"What causes water to evaporate?",opts:["Wind","The moon","Cold air","The sun heating the water"],a:3},{q:"What is precipitation?",opts:["Water droplets falling back to Earth as rain or snow","Water vapour rising into the sky","Clouds forming high up","Water collecting in rivers"],a:0}] },
    { title:"Sled Dogs", text:"For hundreds of years, people in the Arctic have used dogs to pull sleds across snow and ice. Sled dogs are strong, fast, and able to work in very cold weather. A team usually has between eight and sixteen dogs. The dog at the front is called the lead dog. The lead dog is the smartest and best at following directions. Sled dog races are still popular today. The most famous race is the Iditarod in Alaska. Teams race over one thousand miles through wild and frozen land to reach the finish line.", q:[{q:"How many dogs are usually on a sled team?",opts:["Four to eight","Ten to twenty","Six to twelve","Eight to sixteen"],a:3},{q:"What is the lead dog?",opts:["The biggest dog on the team","The dog that runs closest to the sled","The fastest dog","The dog at the front that leads the way"],a:3},{q:"What is the name of the famous sled dog race in Alaska?",opts:["The Yukon Quest","The Iditarod","The Arctic Cup","The Snowpack Race"],a:1}] },
    { title:"The Broken Arm", text:"It happened on a Tuesday in gym class. I went up for a basketball and came down wrong. I heard a crack before I even felt the pain. The teacher helped me to the office and called my mom. At the hospital, the doctor took an X-ray and told me I had broken the bone below my elbow. They put a cast on my arm from my hand to above my elbow. My classmates all signed it in different colors. I had to wear it for six weeks. When the cast came off, my arm looked thin and pale, but it was fixed.", q:[{q:"How did the injury happen?",opts:["The narrator fell off a climbing wall","The narrator landed wrong coming down from a basketball jump","The narrator was hit by a ball","The narrator tripped running in gym class"],a:1},{q:"What did the doctor use to see the break?",opts:["A scan","An ultrasound","A physical exam only","An X-ray"],a:3},{q:"How long did the narrator have to wear the cast?",opts:["Four weeks","Five weeks","Six weeks","Eight weeks"],a:2}] },
    { title:"Owls", text:"Owls are birds that hunt at night. They have very large eyes that let in a lot of light, which helps them see in the dark. Unlike most birds, owls cannot move their eyes from side to side. Instead, they can turn their heads almost all the way around to look behind them. Owls have soft feathers that let them fly almost silently. Their sharp talons grab prey like mice, rabbits, and small birds. After eating, owls cough up the parts they cannot digest, like bones and fur, in a small tight bundle called a pellet.", q:[{q:"Why do owls have very large eyes?",opts:["To let in a lot of light for seeing in the dark","To see colour better","To see far away during the day","To frighten other animals"],a:0},{q:"Why can owls turn their heads almost all the way around?",opts:["Because their necks are very long","Because they cannot move their eyes side to side","Because they sleep upside down","Because their feathers weigh them down"],a:1},{q:"What is the bundle of undigested material an owl coughs up called?",opts:["A cast","A bundle","A pellet","A bolus"],a:2}] },
    { title:"Rosa Parks", text:"On December 1, 1955, a woman named Rosa Parks was riding a bus in Montgomery, Alabama. At that time, Black people were required by law to give up their seats to white passengers. When the bus driver told Rosa to move, she refused. She was arrested. Her act of bravery helped spark a major protest. For over a year, Black residents of Montgomery refused to ride the city buses. This was called the Montgomery Bus Boycott. It ended when the law was changed. Rosa Parks became an important symbol of the civil rights movement.", q:[{q:"What was Rosa Parks asked to do on the bus?",opts:["Give up her seat to a white passenger","Move to a different bus","Pay more money for her ticket","Get off the bus early"],a:0},{q:"What happened after Rosa Parks refused to move?",opts:["She was fined","She was arrested","She was removed from the bus","She was driven home"],a:1},{q:"What was the protest called where people refused to ride the buses?",opts:["The Freedom March","The Montgomery Bus Boycott","The Seat Protest","The Civil Rights Ride"],a:1}] },
  ],
  L: [
    { title:"The Amazon Rainforest", text:"The Amazon rainforest in South America is the largest tropical rainforest on Earth. It covers more than five and a half million square kilometres and is home to an incredible number of plants and animals. Scientists believe the Amazon contains about ten percent of all species on Earth. The forest gets a huge amount of rain every year, which is why it stays so green. The trees of the Amazon also release moisture into the air, helping to create rain clouds. This means the rainforest actually helps make its own rain. Sadly, large areas of the Amazon are being cut down each year for farming and logging.", q:[{q:"Where is the Amazon rainforest located?",opts:["Central Africa","Southeast Asia","South America","Central America"],a:2},{q:"About what percentage of all species on Earth does the Amazon contain?",opts:["Five percent","Twenty percent","Thirty percent","Ten percent"],a:3},{q:"What does the story say is happening to the Amazon?",opts:["Large areas are being cut down for farming and logging","It is growing larger each year","It is being protected by new laws","Flooding is destroying parts of it"],a:0}] },
    { title:"Thomas Edison", text:"Thomas Edison was one of the most famous inventors in history. He was born in Ohio in 1847 and showed a love of experimenting from a young age. Edison invented more than one thousand things during his lifetime, including an improved light bulb, a machine for recording sound, and an early motion picture camera. He was known for working extremely hard and never giving up. He once said that genius is one percent inspiration and ninety-nine percent hard work. Edison also built one of the first electrical power stations, which helped bring electricity to homes and businesses.", q:[{q:"Where was Thomas Edison born?",opts:["Ohio","New York","Michigan","Pennsylvania"],a:0},{q:"Approximately how many inventions did Edison create in his lifetime?",opts:["More than five hundred","More than two thousand","More than one hundred","More than one thousand"],a:3},{q:"What did Edison build that helped bring electricity to homes?",opts:["An improved light bulb","A telegraph machine","A generator","One of the first electrical power stations"],a:3}] },
    { title:"The Food Bank", text:"Our school decided to collect food for the local food bank. Every class set a goal. Ours was to bring in one hundred cans of food. My teacher, Mr. Hassan, explained that a food bank is a place where families who cannot afford enough food can come and get groceries for free. For two weeks, students brought in cans of soup, beans, pasta, and vegetables. By the end, our class had collected one hundred and thirty-seven cans. We loaded them into boxes and a volunteer came to pick them up. Mr. Hassan told us our cans would feed about forty families.", q:[{q:"What was the class goal for the food drive?",opts:["Fifty cans","One hundred cans","Seventy-five cans","One hundred and fifty cans"],a:1},{q:"What is a food bank?",opts:["A place where food is stored for emergencies","A grocery store with cheap prices","A restaurant that serves free meals","A place where families who cannot afford food can get groceries for free"],a:3},{q:"How many cans did the class end up collecting?",opts:["One hundred and thirty-seven","Exactly one hundred","One hundred and twenty","One hundred and fifty"],a:0}] },
    { title:"Sharks", text:"Sharks have been swimming in the world's oceans for more than four hundred million years, long before dinosaurs existed. There are more than five hundred species of shark, ranging in size from the tiny dwarf lantern shark, which fits in your hand, to the whale shark, which can be as long as a school bus. Sharks are important to ocean health because they eat sick and weak animals, which keeps populations balanced. Most sharks do not attack humans, and when they do, it is usually a case of mistaken identity. A person on a surfboard can look like a seal from below.", q:[{q:"How long have sharks been on Earth?",opts:["More than one hundred million years","More than two hundred million years","More than three hundred million years","More than four hundred million years"],a:3},{q:"How many species of shark are there?",opts:["More than one hundred","More than two hundred","More than three hundred","More than five hundred"],a:3},{q:"Why does the story say shark attacks on humans are usually a mistake?",opts:["Sharks have poor eyesight in daylight","A person on a surfboard can look like a seal from below","Sharks are attracted to splashing sounds","Humans swim in shark feeding areas"],a:1}] },
    { title:"My Grandmother Comes to Stay", text:"When my grandmother came to stay with us for the whole summer, I did not know what to expect. She had always lived far away and I had only seen her a few times. At first it felt strange having someone new in the house. But Grandma knew how to do so many things. She taught me to make dumplings, to identify birds by their calls, and to play a card game she had learned as a child. She told me stories about what my mom was like when she was young. By August, I did not want her to leave. The house felt quiet for weeks after she went home.", q:[{q:"How long did the grandmother come to stay?",opts:["A few weeks","One month","The whole summer","The whole year"],a:2},{q:"What are three things the grandmother taught the narrator?",opts:["Cooking, sewing, and gardening","How to make dumplings, identify birds, and play a card game","How to bake bread, paint, and knit","How to fish, cook, and dance"],a:1},{q:"How did the house feel after the grandmother left?",opts:["Quiet","Messy","Crowded","Busy"],a:0}] },
  ],
  M: [
    { title:"How the Moon Affects the Tides", text:"If you watch the ocean carefully over a full day, you will notice the water level rising and falling. These changes are called tides. Tides are caused mainly by the pull of the moon's gravity on the Earth's oceans. When the moon is directly above an area of ocean, its gravity pulls the water toward it, causing the water level to rise. This is called high tide. As the Earth rotates, that area moves away from the moon and the water level drops. This is low tide. Most coastal areas experience two high tides and two low tides every day. Fishers, sailors, and swimmers all need to understand tides to stay safe.", q:[{q:"What mainly causes tides?",opts:["Strong winds blowing across the ocean","The rotation of the Earth","The pull of the moon's gravity on the oceans","Changes in ocean temperature"],a:2},{q:"What happens to the water level when the moon is directly above an area of ocean?",opts:["It rises, creating high tide","It drops to its lowest point","It stays the same","It becomes rough and choppy"],a:0},{q:"How many high tides and low tides do most coastal areas experience each day?",opts:["One of each","Three of each","Four of each","Two of each"],a:3}] },
    { title:"Terry Fox", text:"Terry Fox was a Canadian athlete and cancer survivor who became one of the most admired people in Canadian history. When he was eighteen years old, he was diagnosed with bone cancer and his right leg was amputated. In 1980, he began a run across Canada to raise money for cancer research. He called it the Marathon of Hope. Running on a prosthetic leg, Terry covered about forty-two kilometres every day. He ran through six provinces before he was forced to stop near Thunder Bay when the cancer spread to his lungs. He passed away in 1981 at the age of twenty-two. He had raised over twenty-four million dollars. The Terry Fox Run continues every year in countries around the world.", q:[{q:"What was Terry Fox's run across Canada called?",opts:["The Hope Run","The Cancer Run","The Marathon of Hope","The Cross-Canada Challenge"],a:2},{q:"Why did Terry Fox stop his run near Thunder Bay?",opts:["The cancer had spread to his lungs","He had an injury to his prosthetic leg","He ran out of money","The weather became too dangerous"],a:0},{q:"How much money had Terry raised when he stopped?",opts:["Over ten million dollars","Over fifteen million dollars","Over twenty million dollars","Over twenty-four million dollars"],a:3}] },
    { title:"Life in a Tide Pool", text:"When the ocean tide goes out, it leaves behind shallow pools of water in the rocks along the shore. These are called tide pools. Tide pools are full of life. You might find starfish, sea urchins, small crabs, snails, and tiny fish all living together in a space no bigger than a bathtub. Life in a tide pool is not easy. The animals must survive being pounded by waves, exposed to hot sun, and drenched by fresh rainwater. Each tide pool is like its own small ecosystem, with animals that depend on each other for food and shelter. Scientists study tide pools to learn how ocean life adapts to change.", q:[{q:"What is a tide pool?",opts:["A deep underwater cave","A shallow pool left in the rocks when the tide goes out","A warm section of the ocean near the shore","A pool created by waves crashing on the beach"],a:1},{q:"Which of these animals might you find in a tide pool?",opts:["Dolphins and seals","Sharks and rays","Starfish, sea urchins, and small crabs","Whales and sea turtles"],a:2},{q:"What do scientists study tide pools to learn?",opts:["How ocean life adapts to change","How to predict tides","The depth of the ocean","The effect of pollution on the sea"],a:0}] },
    { title:"The Printing Press", text:"Before the printing press was invented, books had to be copied by hand. This took a very long time and made books extremely expensive. Only wealthy people and churches could afford them. In the 1440s, a German man named Johannes Gutenberg invented a machine with movable metal letters that could print pages quickly. For the first time, books could be made in large numbers. Prices dropped and more people were able to learn to read. New ideas spread faster than ever before. Many historians believe the printing press was one of the most important inventions in history because it helped more people gain access to knowledge.", q:[{q:"Why were books so expensive before the printing press?",opts:["Paper was very hard to find","They had to be copied by hand, which took a long time","Only kings were allowed to sell them","They were made from rare materials"],a:1},{q:"Who invented the printing press?",opts:["A French scientist named Gilles Martin","An English monk named William Caxton","A German man named Johannes Gutenberg","An Italian artist named Leonardo da Vinci"],a:2},{q:"What happened to book prices after the printing press was invented?",opts:["They dropped as books could be made in large numbers","They stayed the same","They went up because more people wanted books","The government controlled the prices"],a:0}] },
    { title:"Training for the Race", text:"When my gym teacher announced a 5K fun run, I decided to train for it seriously. I had never run more than a kilometre without stopping. I found a six-week training plan online and printed it out. The first week I ran just two kilometres, three times a week. Each week I added a little more distance. Some days were hard and I wanted to quit, but I kept going. By week five I ran four kilometres without stopping. On race day, the route wound through the park and along the river. My legs ached near the end, but I finished in thirty-four minutes. My dad was waiting at the finish line with a bottle of water and the biggest smile I had ever seen.", q:[{q:"How long was the training plan the narrator followed?",opts:["Four weeks","Five weeks","Six weeks","Eight weeks"],a:2},{q:"How far did the narrator run in the first week of training?",opts:["One kilometre","Two kilometres","Three kilometres","Four kilometres"],a:1},{q:"What did the narrator's dad have waiting at the finish line?",opts:["A bottle of water and a big smile","A medal and a photo","A snack and a hug","A banner and a cheering crowd"],a:0}] },
  ],
  N: [
    { title:"The Underground Railroad", text:"The Underground Railroad was not a real railroad. It was a secret network of people who helped enslaved African Americans escape to freedom in the northern United States and Canada before the Civil War. Brave people called conductors guided freedom seekers along hidden routes. They traveled mostly at night, hiding in barns, churches, and homes of people who opposed slavery. Harriet Tubman was one of the most famous conductors. She had escaped slavery herself and went back south nineteen times to lead others to freedom. She never lost a single person on any of her journeys.", q:[{q:"What was the Underground Railroad?",opts:["A real railroad that ran underground","A government program to free enslaved people","A series of tunnels built under southern cities","A secret network that helped enslaved people escape to freedom"],a:3},{q:"What were the people called who guided freedom seekers along escape routes?",opts:["Guides","Freedom riders","Conductors","Runners"],a:2},{q:"How many times did Harriet Tubman return south to lead others to freedom?",opts:["Nineteen times","Seven times","Twelve times","Twenty-five times"],a:0}] },
    { title:"How the Eye Works", text:"Your eyes are remarkable organs that allow you to see color, movement, and detail. When light enters your eye, it passes through a clear lens that focuses the image onto the back of your eye, called the retina. The retina contains millions of tiny cells called rods and cones. Rods help you see in dim light, while cones detect color. The image that forms on your retina is actually upside down. Your brain automatically flips the image so that everything appears right side up. People who have difficulty focusing light clearly on the retina may need glasses to see properly.", q:[{q:"What part of the eye does light focus onto?",opts:["The lens","The pupil","The retina","The iris"],a:2},{q:"What do cone cells in the eye detect?",opts:["Color","Movement","Dim light","Distance"],a:0},{q:"How does the image appear on the retina before the brain processes it?",opts:["Blurry","Upside down","Sideways","Very small"],a:1}] },
    { title:"The Dust Bowl", text:"In the 1930s, a large part of the American Great Plains turned into a wasteland of blowing dust. Farmers had plowed up the native grasses that held the soil in place, leaving the dry earth exposed. When a severe drought struck, strong winds picked up the loose topsoil and created massive dust storms that turned the sky black. Thousands of farm families lost everything and were forced to leave their homes. Many headed west to California hoping to find work. The disaster was called the Dust Bowl and it taught Americans important lessons about caring for the land.", q:[{q:"What had farmers done that left the soil exposed to wind?",opts:["Planted too many crops","Overwatered the fields","Plowed up the native grasses that held soil in place","Used too many chemicals"],a:2},{q:"What made the dust storms possible?",opts:["Flooding followed by drought","Plowed land combined with drought and strong winds","A series of earthquakes","Unusually cold temperatures"],a:1},{q:"Where did many displaced farm families head to look for work?",opts:["Texas","Canada","New York","California"],a:3}] },
    { title:"Maglev Trains", text:"Most trains run on wheels that roll along metal tracks. Maglev trains are different. The word maglev is short for magnetic levitation. These trains use powerful magnets to lift the train slightly above the track so that it floats without touching anything. Because there is no friction between the train and the track, maglev trains can travel at incredible speeds. Some reach over five hundred kilometres per hour. Japan and China have built successful maglev lines. The technology is expensive to build, but the trains are very smooth and quiet. Engineers believe maglev trains could eventually replace air travel for some shorter routes.", q:[{q:"What does the word maglev stand for?",opts:["Maximum levitation","Magnetic levitation","Motorized levitation","Mechanical levitation"],a:1},{q:"Why can maglev trains travel so fast?",opts:["There is no friction between the train and the track","They have more powerful engines","Their shape cuts through air better","They run on electricity instead of fuel"],a:0},{q:"Which countries have built successful maglev train lines?",opts:["Germany and France","The United States and Canada","Japan and China","South Korea and India"],a:2}] },
    { title:"The Night Watch", text:"During my first overnight camping trip without parents, our group of six hiked to a backcountry campsite and set up tents in the late afternoon. Our counselor divided the night into watches. Each person had to stay awake for one hour to keep the fire going and watch for animals. My watch was from two to three in the morning. I sat alone by the dying fire wrapped in a blanket, listening to sounds I could not identify. An owl called somewhere above me. Something rustled in the bushes nearby. By the time my hour was done, the sky had begun to lighten in the east. I had never felt so awake or so small.", q:[{q:"What was each person responsible for during their watch?",opts:["Cooking breakfast for the group","Checking that all tents were secure","Recording weather observations","Keeping the fire going and watching for animals"],a:3},{q:"What time was the narrator's watch?",opts:["From two to three","From midnight to one","From one to two","From three to four"],a:0},{q:"What did the narrator notice at the end of the watch?",opts:["Rain beginning to fall","The fire went out","The sky had begun to lighten in the east","Another animal appeared at camp"],a:2}] },
