  O: [
    { title:"Plate Tectonics", text:"The surface of the Earth is not one solid piece. It is made up of about fifteen large sections called tectonic plates that fit together like a giant puzzle. These plates float on hot, partly melted rock deep inside the Earth and move very slowly, usually just a few centimetres per year. Where plates pull apart, new rock forms as magma fills the gap. Where plates collide, mountains are pushed upward or one plate dives under the other. Earthquakes and volcanoes happen most often along plate boundaries. The theory of plate tectonics explained many geological mysteries and is now the foundation of modern earth science.", q:[{q:"How many large tectonic plates make up the Earth's surface?",opts:["About fifteen","About five","About ten","About twenty"],a:0},{q:"What happens where two tectonic plates collide?",opts:["New rock forms as magma fills the gap","Mountains are pushed up or one plate dives under the other","The plates bounce off each other","A large valley is formed"],a:1},{q:"Where do most earthquakes and volcanoes occur?",opts:["In the middle of plates","Along plate boundaries","Near the poles","Under the oceans only"],a:1}] },
    { title:"Amelia Earhart", text:"Amelia Earhart was the first woman to fly solo across the Atlantic Ocean. She made the historic flight in 1932, flying from Newfoundland to Northern Ireland in just under fifteen hours. Earhart became an international celebrity and used her fame to encourage women to pursue careers in aviation and other fields. In 1937, she attempted to fly around the world with navigator Fred Noonan. Somewhere over the Pacific Ocean, her plane disappeared and was never found. Despite an extensive search, neither Earhart nor Noonan was ever located. Her disappearance remains one of aviation's greatest unsolved mysteries.", q:[{q:"What was Amelia Earhart the first woman to do?",opts:["Fly solo across the Atlantic Ocean","Fly a powered aircraft","Fly across the Pacific Ocean","Break the sound barrier"],a:0},{q:"In what year did Earhart make her solo Atlantic crossing?",opts:["1927","1935","1930","1932"],a:3},{q:"What happened to Earhart during her attempt to fly around the world?",opts:["She was forced to turn back due to weather","Her plane disappeared over the Pacific Ocean","She landed safely but the plane was damaged","She completed the trip but broke a world record"],a:1}] },
    { title:"How Vaccines Work", text:"When a harmful germ enters your body, your immune system fights back by producing proteins called antibodies. These antibodies recognize and attack the specific germ. After the illness, your body remembers how to make those antibodies quickly. This is called immunity. Vaccines work by introducing your immune system to a harmless version or piece of a germ before you ever get sick. Your body responds by building antibodies without you having to suffer through the disease. If you later encounter the real germ, your immune system recognizes it immediately and destroys it before you become seriously ill.", q:[{q:"What does the immune system produce to fight a specific germ?",opts:["White blood cells","Vitamins","Antibodies","Enzymes"],a:2},{q:"How do vaccines protect you from disease?",opts:["They kill germs already in your body","They make your blood thicker so germs cannot spread","They prevent germs from entering your body","They introduce a harmless version of a germ so your body builds immunity"],a:3},{q:"What is immunity?",opts:["The ability to fight all germs at once","When your body learns to make antibodies quickly after exposure","A medicine that kills germs","The process of getting a vaccine"],a:1}] },
    { title:"The Coral Triangle", text:"In the waters of Southeast Asia lies a region known as the Coral Triangle. It covers parts of Indonesia, Malaysia, Papua New Guinea, the Philippines, the Solomon Islands, and Timor-Leste. This area contains the greatest diversity of coral reef life on Earth, including more than six hundred species of coral and over two thousand species of fish. The Coral Triangle supports the livelihoods of over one hundred and twenty million people who depend on the reefs for food and income. Climate change, overfishing, and pollution are threatening these ecosystems. Conservation organizations are working with local communities to protect this irreplaceable region.", q:[{q:"Where is the Coral Triangle located?",opts:["Southeast Asia","The Caribbean Sea","The Indian Ocean","The Mediterranean Sea"],a:0},{q:"How many people depend on the Coral Triangle reefs for food and income?",opts:["Over fifty million","Over eighty million","Over one hundred million","Over one hundred and twenty million"],a:3},{q:"What three things are threatening the Coral Triangle?",opts:["Tourism, shipping, and storms","Climate change, overfishing, and pollution","Mining, logging, and agriculture","Earthquakes, tsunamis, and rising seas"],a:1}] },
    { title:"Starting Over", text:"My parents announced we were moving to a new country when I was thirteen. I had one month to say goodbye to everyone I had ever known. The flight took eleven hours. When we landed, everything was unfamiliar, the signs, the sounds, the food, even the smell of the air. School was the hardest part. I understood most of what was said but could not always find the right words to respond. For weeks I ate lunch alone. Then a teacher named Mr. Okafor noticed and paired me with a student named Diana for a project. Diana became my first friend. Two years later, the place that once felt impossible now feels like mine.", q:[{q:"How old was the narrator when the family moved?",opts:["Eleven","Fourteen","Twelve","Thirteen"],a:3},{q:"Which teacher helped the narrator by pairing them with another student?",opts:["Mr. Okafor","Mr. Hassan","Mr. Chen","Mr. Davis"],a:0},{q:"What was the hardest part of adjusting to the new country?",opts:["The weather","The food","The language signs","School"],a:3}] },

  P: [
    { title:"The Nervous System", text:"Your nervous system is the body's communication network. It has two main parts: the central nervous system and the peripheral nervous system. The central nervous system consists of the brain and spinal cord. The brain processes information and sends out instructions. The spinal cord carries signals between the brain and the rest of the body. The peripheral nervous system is the vast network of nerves that reaches every part of your body. When you touch something hot, sensory nerves send a signal to your brain almost instantly. Your brain responds by sending a signal back to your muscles to pull your hand away, often before you are even conscious of the pain.", q:[{q:"What are the two main parts of the nervous system?",opts:["The brain and the nerves","The central and peripheral nervous systems","The spinal cord and the muscles","The sensory and motor systems"],a:1},{q:"What does the spinal cord do?",opts:["Processes all information from the senses","Controls involuntary actions like breathing","Carries signals between the brain and the rest of the body","Stores memories"],a:2},{q:"What type of nerves send a signal to your brain when you touch something hot?",opts:["Motor nerves","Central nerves","Reflex nerves","Sensory nerves"],a:3}] },
    { title:"Marie Curie", text:"Marie Curie was a physicist and chemist who made some of the most important scientific discoveries of the twentieth century. Born in Poland in 1867, she moved to Paris to study science at a time when women were rarely allowed into universities. She discovered two new elements, polonium and radium, and developed the concept of radioactivity. She was awarded the Nobel Prize twice, in 1903 for physics and in 1911 for chemistry, making her the only person ever to win Nobel Prizes in two different sciences. Her research on radioactivity laid the foundation for cancer treatments still used today.", q:[{q:"Where was Marie Curie born?",opts:["France","Russia","Germany","Poland"],a:3},{q:"How many Nobel Prizes did Marie Curie win?",opts:["One","Three","Four","Two"],a:3},{q:"What two elements did Marie Curie discover?",opts:["Polonium and radium","Uranium and thorium","Helium and neon","Carbon and nitrogen"],a:0}] },
    { title:"The School Garden Project", text:"Last spring, our school started a garden project on the unused land beside the gymnasium. A committee of students researched what vegetables grow well in our climate and drew up a planting plan. We raised money by hosting a bake sale and bought seeds, soil, and tools. Volunteers from the community helped us build raised garden beds. Each class adopted one bed and was responsible for planting, watering, and weeding. By September, we had harvested enough tomatoes, cucumbers, and lettuce to supply the school cafeteria for two weeks. The principal said it was the most successful student-led project in the school's history.", q:[{q:"Where was the school garden built?",opts:["On the school roof","Behind the library","On unused land beside the gymnasium","In the school courtyard"],a:2},{q:"How did the students raise money for the garden?",opts:["By asking for donations","By hosting a bake sale","By applying for a grant","By selling their own plants"],a:1},{q:"How long did the harvest supply the school cafeteria?",opts:["One week","Two weeks","Three weeks","One month"],a:1}] },
    { title:"The Migration of the Monarch Butterfly", text:"Every autumn, hundreds of millions of monarch butterflies make one of the most remarkable journeys in the animal kingdom. Flying up to four thousand kilometres, they travel from Canada and the northern United States to their wintering grounds in the mountains of central Mexico. What makes this migration extraordinary is that no single butterfly makes the round trip. The butterflies that arrive in Mexico have never been there before. Scientists believe they navigate using the position of the sun and an internal magnetic compass. In spring, the new generation begins the return journey north, stopping along the way to lay eggs and die.", q:[{q:"Where do monarch butterflies travel to for the winter?",opts:["Southern California","Central Mexico","Florida","South America"],a:1},{q:"Why is the monarch migration considered extraordinary?",opts:["No single butterfly makes the full round trip","The butterflies travel faster than any other insect","They fly higher than birds","They cross entire oceans"],a:0},{q:"What do scientists believe monarchs use to navigate?",opts:["Smell and wind direction","The Earth's temperature changes","Memory passed down from parents","The position of the sun and an internal magnetic compass"],a:3}] },
    { title:"The Last Game", text:"It was the final game of the season and we were down by two points with three minutes left. Our team had worked all year to reach this moment and now it was slipping away. Coach called a timeout and gathered us in a circle. She did not yell or make complicated plays. She just looked at us and said, do what you know how to do. Somehow that was exactly the right thing. We went back out and played the way we had practiced a thousand times. With forty seconds left, Kezia scored twice and we won. After the game, no one wanted to leave the gym. We just stood there, sweaty and stunned, understanding that some moments do not come twice.", q:[{q:"How much time was left in the game when the coach called a timeout?",opts:["Three minutes","Five minutes","Four minutes","Two minutes"],a:0},{q:"What did Coach say to the team during the timeout?",opts:["Play harder than you ever have","Never give up no matter what","Make a new plan and stick to it","Do what you know how to do"],a:3},{q:"Who scored the winning points at the end of the game?",opts:["The narrator","A teammate named Marcus","Coach","Kezia"],a:3}] },

  Q: [
    { title:"The History of the Internet", text:"The Internet began as a small military and university computer network called ARPANET in the late 1960s. It was designed so that information could be rerouted automatically if part of the network was damaged. Over the following decades, universities and research institutions connected to the network and began sharing information. In 1991, a scientist named Tim Berners-Lee invented the World Wide Web, a system for organizing and linking information that made the Internet accessible to ordinary people. By the mid-1990s, commercial websites were appearing rapidly. Today the Internet connects billions of people and devices and has transformed nearly every aspect of modern life.", q:[{q:"What was the original military and university computer network called?",opts:["The Web","ARPANET","NetLink","InfoNet"],a:1},{q:"Who invented the World Wide Web in 1991?",opts:["Steve Jobs","Bill Gates","Tim Berners-Lee","Vint Cerf"],a:2},{q:"What was the original purpose of the network's design?",opts:["To reroute information automatically if part was damaged","To send messages faster than telephone","To connect universities for research","To share military secrets securely"],a:0}] },
    { title:"Rainwater Harvesting", text:"In many parts of the world, fresh water is scarce. Rainwater harvesting is a technique that collects and stores rainwater for later use. The simplest systems consist of gutters that channel rain from rooftops into large tanks or barrels. More complex systems filter and purify the water for drinking. In some rural communities in India, Africa, and Australia, rainwater harvesting provides the primary source of fresh water for families. The technique is ancient, with evidence of collection systems dating back thousands of years. As climate change makes droughts more frequent in some regions, rainwater harvesting is gaining new interest worldwide.", q:[{q:"What is rainwater harvesting?",opts:["A method of purifying river water","A technique that collects and stores rainwater for later use","A way of recycling used water","A system for monitoring rainfall amounts"],a:1},{q:"How do the simplest rainwater harvesting systems work?",opts:["They drill wells to reach underground water","They filter seawater to remove salt","Gutters channel rain from rooftops into tanks or barrels","They pump water from rivers into storage tanks"],a:2},{q:"Why is rainwater harvesting gaining new interest worldwide?",opts:["Climate change is making droughts more frequent in some regions","It is cheaper than building wells","New technology makes the water taste better","Governments are requiring it by law"],a:0}] },
    { title:"The Deepest Place on Earth", text:"The Mariana Trench in the Pacific Ocean is the deepest known point on Earth. Its lowest point, called the Challenger Deep, reaches nearly eleven kilometres below the ocean surface. If you placed Mount Everest at the bottom of the Challenger Deep, its peak would still be more than two kilometres underwater. The pressure at that depth is over a thousand times greater than at the ocean surface. Despite these extreme conditions, scientists have discovered living creatures there, including bacteria, small shrimp-like animals, and fish. The first people to reach the bottom were Don Walsh and Jacques Piccard, who descended in a special submarine in 1960.", q:[{q:"What is the name of the deepest point in the Mariana Trench?",opts:["The Deep Point","The Pacific Pit","The Challenger Deep","The Ocean Floor"],a:2},{q:"How deep is the Challenger Deep?",opts:["Nearly eleven kilometres","About five kilometres","About eight kilometres","Nearly fifteen kilometres"],a:0},{q:"Who were the first people to reach the bottom of the Challenger Deep?",opts:["Jacques Cousteau and a crewmate","Don Walsh and Jacques Piccard","Neil Armstrong and Buzz Aldrin","Robert Ballard and his team"],a:1}] },
    { title:"The Fastest Animal on Earth", text:"The cheetah is widely known as the fastest land animal, capable of reaching speeds of over one hundred kilometres per hour in short bursts. But speed in the animal kingdom is more complicated than a single number. The peregrine falcon, when diving to catch prey, can reach speeds of over three hundred kilometres per hour, making it the fastest animal on Earth by a wide margin. In water, the sailfish can reach speeds of over one hundred and ten kilometres per hour. Even some insects, like the Australian dragonfly, have been recorded flying at nearly sixty kilometres per hour. Speed has evolved in many different animals as a tool for either catching prey or escaping predators.", q:[{q:"How fast can a cheetah run?",opts:["Over one hundred kilometres per hour","Over fifty kilometres per hour","Over seventy-five kilometres per hour","Over one hundred and fifty kilometres per hour"],a:0},{q:"Which animal is actually the fastest on Earth?",opts:["The cheetah","The Australian dragonfly","The sailfish","The peregrine falcon"],a:3},{q:"According to the story, why has speed evolved in many animals?",opts:["To regulate body temperature","To travel long distances efficiently","To catch prey or escape predators","To impress potential mates"],a:2}] },
    { title:"The Bridge Builders", text:"Building a bridge across a wide river or bay requires years of planning, engineering, and construction. Engineers must consider the weight the bridge will carry, the forces of wind and water, the type of soil beneath the foundations, and the materials that will last longest. Suspension bridges use long cables draped over tall towers to carry the weight of the road deck. Arch bridges transfer weight outward along curved supports to the ground on either side. Every bridge design is a solution to a specific set of conditions. The Golden Gate Bridge in San Francisco, completed in 1937, remains one of the most recognized engineering achievements in history.", q:[{q:"What must engineers consider when planning a bridge?",opts:["The appearance and the local weather only","Only the weight the bridge will carry","Only the materials and cost","Weight, wind, water, soil type, and materials"],a:3},{q:"How do suspension bridges carry the weight of the road deck?",opts:["Through long cables draped over tall towers","Through curved supports that transfer weight to the ground","Through thick concrete pillars below the road","Through a series of interlocking steel beams"],a:0},{q:"When was the Golden Gate Bridge completed?",opts:["1941","1932","1927","1937"],a:3}] },

  R: [
    { title:"The Human Genome", text:"Every cell in your body contains a complete set of instructions for building and running you. This set of instructions is called your genome and it is written in a chemical language using four molecules called bases. The human genome contains about three billion base pairs arranged along twenty-three pairs of chromosomes. In 2003, scientists completed the Human Genome Project, which mapped the entire sequence of human DNA for the first time. The project took thirteen years and cost nearly three billion dollars. Understanding the genome has opened new possibilities for treating genetic diseases and has transformed medicine, forensics, and our understanding of human evolution.", q:[{q:"What is the human genome?",opts:["A single chromosome","The complete set of DNA instructions in a cell","The part of the cell that produces energy","A type of protein that carries oxygen"],a:1},{q:"How many base pairs does the human genome contain?",opts:["About three million","About thirty million","About three hundred million","About three billion"],a:3},{q:"When was the Human Genome Project completed?",opts:["2003","1990","1997","2010"],a:0}] },
    { title:"The First Nations of the Pacific Northwest", text:"The Indigenous peoples of the Pacific Northwest coast of North America developed some of the most complex societies of any non-agricultural people in history. Rich ocean resources, including salmon, halibut, and sea mammals, provided abundant food without farming. With their material needs met, communities had time to develop elaborate art, ceremony, and trade networks. The totem pole is one of the most recognized art forms of this region, carved from large cedar trees to tell family histories and mark significant events. Potlatch ceremonies brought communities together to mark important occasions and redistribute wealth through gift-giving.", q:[{q:"What was the main source of food for Pacific Northwest peoples?",opts:["Agriculture and farming","Hunting land animals","Rich ocean resources including salmon and sea mammals","Gathering wild plants and berries"],a:2},{q:"What is a totem pole?",opts:["A ceremonial weapon used in battles","A carved cedar pole that tells family histories and marks events","A type of shelter built from cedar","A trade item exchanged between communities"],a:1},{q:"What happened at Potlatch ceremonies?",opts:["Communities competed in athletic events","Leaders were elected by the people","Communities marked occasions and redistributed wealth through gift-giving","Young people were initiated into adulthood"],a:2}] },
    { title:"The Power of Habit", text:"Scientists who study human behavior have found that a large portion of our daily actions are not conscious decisions but habits, automatic routines triggered by specific cues. A habit works in a three-part loop: a cue that triggers the behavior, the routine itself, and a reward that reinforces it. For example, feeling stressed might cue someone to eat something sweet, and the temporary relief of stress serves as the reward. Understanding this loop makes it possible to change habits deliberately. You cannot easily eliminate a habit, but you can replace the routine while keeping the same cue and reward. This insight has influenced approaches to health, addiction treatment, and education.", q:[{q:"What are the three parts of the habit loop?",opts:["Thought, action, and result","Trigger, behavior, and consequence","Cue, routine, and reward","Signal, response, and reinforcement"],a:2},{q:"According to the story, how can you change a habit?",opts:["Eliminate both the cue and the routine","Replace the reward with something healthier","Replace the routine while keeping the same cue and reward","Avoid all situations that trigger the habit"],a:2},{q:"What field has this understanding of habits NOT been said to influence?",opts:["Health","Addiction treatment","Education","Architecture"],a:3}] },
    { title:"The Library of Alexandria", text:"The ancient Library of Alexandria in Egypt was one of the greatest repositories of knowledge in the ancient world. Founded in the third century BCE under the rule of Ptolemy I, the library aimed to collect all the books in the world. At its height it may have held hundreds of thousands of scrolls. Scholars traveled from across the Mediterranean to study there. It was not destroyed in a single dramatic fire as is often claimed, but declined gradually over centuries as funding was cut and scrolls were lost to neglect, war, and the changing political fortunes of the city. Its destruction came to symbolize the fragility of accumulated human knowledge.", q:[{q:"When was the Library of Alexandria founded?",opts:["In the first century BCE","In the second century BCE","In the third century BCE","In the fourth century BCE"],a:2},{q:"What is a common misconception about how the library was destroyed?",opts:["That it was flooded","That it collapsed due to an earthquake","That it was destroyed in a single dramatic fire","That its books were deliberately buried"],a:2},{q:"What does the library's decline come to symbolize?",opts:["The fall of the Roman Empire","The fragility of accumulated human knowledge","The importance of government funding for education","The danger of collecting too much information"],a:1}] },
    { title:"Solo", text:"The night before the regional science fair, I realized my display board had a serious error in the data section. My partner Tomás was unreachable. I had two options: present the flawed data and hope no one noticed, or stay up and fix it alone. I chose to fix it. I worked until almost two in the morning, recalculating everything from the raw results and reprinting the graphs. The next day I stood in front of three judges who asked sharp questions. I answered them clearly because I now understood every number on that board. We placed second. Tomás said I had saved us. I did not say what I actually thought, which was that I had saved myself.", q:[{q:"What problem did the narrator discover the night before the fair?",opts:["The display board had been damaged","The experiment had to be redone","There was a serious error in the data section","The wrong project was entered"],a:2},{q:"What did the narrator choose to do about the problem?",opts:["Present it and hope no one noticed","Contact the teacher for help","Stay up and fix it alone","Ask a different partner for help"],a:2},{q:"What place did the narrator and Tomás receive at the fair?",opts:["First","Second","Third","Honorable mention"],a:1}] },

  S: [
    { title:"Convergent Evolution", text:"Convergent evolution is the phenomenon by which unrelated species independently develop similar traits in response to similar environmental pressures. The eye, for example, evolved independently in vertebrates and cephalopods, yet both arrived at remarkably similar optical structures. Dolphins and sharks share a streamlined body shape despite one being a mammal and the other a fish. The marsupial wolf of Australia, now extinct, was strikingly similar in form and likely behavior to the placental wolves of other continents, despite having been separated for millions of years. Evolution does not follow a single path, but it keeps arriving at some of the same solutions." },
    { title:"The Promise of Infrastructure", text:"The historian Tony Judt argued that the gradual dismantling of public infrastructure, transit systems, libraries, parks, and schools, amounts to an erosion of the shared spaces through which strangers become fellow citizens. When public life is relegated to private substitutes, those who can afford the substitutes withdraw from common experience. The infrastructure that remains, underfunded and deteriorating, is used only by those who have no alternatives. The result is not merely inconvenience but the fragmentation of a society's capacity to experience itself as a community." },
    { title:"Fieldwork", text:"When I arrived at my field site in the highlands of Ethiopia for my doctoral research, I had three suitcases, a research design I had spent two years developing, and a set of assumptions about the community I intended to study that turned out to be almost entirely wrong. The first month was a process of methodical humiliation. Every interview I conducted revealed gaps in my understanding. Every observation I made had to be revised in light of context I had not known to look for. A colleague who had worked in the region for a decade told me this was normal, that the most important thing fieldwork teaches researchers is what their questions have left out." },
    { title:"The Pianist's Hands", text:"The concert pianist asked me, during a conversation I conducted for a music magazine, whether I had ever considered how much trust is involved in playing from memory before an audience. She explained. When you perform from memory, she said, you are trusting your body to know something your conscious mind cannot hold. You have practiced the piece so many thousands of times that it has moved below awareness, into muscle and reflex. If you try to think your way through a performance, you will almost certainly fail. What I do on stage, she said, is mostly listening. Listening to what my hands already know." },
    { title:"Civil Disobedience", text:"Henry David Thoreau spent one night in jail in 1846 for refusing to pay a tax he considered unjust, and from that experience produced one of the most influential political essays in American history. Thoreau argued that individuals have a moral obligation to refuse to cooperate with unjust laws, even at personal cost. The essay was read by Mahatma Gandhi, who developed from it a philosophy of nonviolent resistance that proved capable of challenging an empire. Gandhi's methods were later studied and adapted by Martin Luther King Jr. and the American civil rights movement." },
  ],
  T: [
    { title:"The Ship of Theseus", text:"The Ship of Theseus is one of philosophy's oldest thought experiments. According to Greek legend, the ship that carried the hero Theseus was preserved in Athens for centuries as a monument. As its planks rotted, they were replaced one by one with new wood. Eventually every original plank had been replaced. The question the Athenians debated was: is it still the same ship? Philosophers have extended the puzzle in various ways. Suppose someone had collected all the original planks and reassembled them. Which would be the real Ship of Theseus? The paradox remains genuinely unresolved and has implications for questions about personal identity, the continuity of nations, and the nature of cultural heritage." },
    { title:"Invisible Architectures", text:"Anthropologists who study urban environments have noted that cities contain two kinds of structure. The first is visible: the buildings, streets, parks, and infrastructure that can be seen and measured. The second is invisible: the unwritten conventions, social hierarchies, and shared assumptions that govern how people move through and use those physical spaces. These invisible architectures are often more powerful than the visible ones. Zoning laws can desegregate a neighborhood on paper while unwritten social rules maintain its character unchanged for generations." },
    { title:"The Archive", text:"For six months I worked as a volunteer in a regional historical archive, cataloguing letters and photographs donated by local families. Most of the material would interest no one but a specialist. But occasionally I would open a folder and find something that stopped me completely: a photograph of a street that had been demolished, with people in it who had no idea they were about to be historical; a letter written in 1943 by a young soldier to his mother, matter of fact and homesick; a child's drawing pinned to a page by someone who had thought it worth keeping." },
    { title:"Measuring Inequality", text:"Economists use a statistic called the Gini coefficient to measure income inequality within a country. A Gini coefficient of zero indicates perfect equality, in which every person earns the same income. A coefficient of one indicates maximum inequality, in which one person earns all income and everyone else earns nothing. Real countries fall somewhere between these extremes. The Gini coefficient is useful as a summary measure, but it conceals as much as it reveals. Two societies can have identical Gini coefficients while distributing inequality very differently across their populations." },
    { title:"The Apology", text:"My best friend and I did not speak for nearly two years after an argument that began over something trivial and escalated into an exchange of truths we had each been careful to avoid saying. When we finally met again, at a mutual friend's wedding, the two years sat between us at the table like a third guest. Neither of us mentioned it at first. We talked about everything else. Then, late in the evening, he said simply: 'I'm sorry I said what I said the way I said it.' Not: I'm sorry if you were hurt. Not: I'm sorry, but. Just the unqualified acknowledgment that he had caused harm." },

    { title:"Epigenetics and Inheritance", text:"Classical genetics teaches that the characteristics we inherit from our parents are encoded in the DNA sequence of our chromosomes. Epigenetics studies a second layer of inheritance: modifications to the way genes are expressed that do not alter the underlying DNA sequence but can nevertheless be passed from one generation to the next. Research on populations that experienced severe famine has found that the effects can be measurable in the health profiles of grandchildren. Stress hormones experienced by pregnant women can alter gene expression patterns in their offspring. These findings require us to complicate the simple nature versus nurture framework." },
    { title:"The Architecture of Attention", text:"The philosopher Simone Weil wrote that attention is the rarest and purest form of generosity. She meant something precise by this: that to give another person your full, disinterested attention, without planning what you will say next or how the interaction will serve you, is an act of profound respect. Most of our attention is selective and self interested. We notice what confirms our expectations, what affects our interests, what entertains us. Weil's insight, grounded in her contemplative practice, was that genuine attention requires the suspension of the self. It is a discipline, she argued, not a capacity. It must be trained." },
    { title:"The River Engineers", text:"The Mississippi River has been so extensively engineered over the past century and a half that many hydrologists no longer consider it a natural system. A network of locks, dams, levees, and navigation channels constrains the river within banks that prevent it from following its natural tendency to meander and change course. These engineering works were built to protect farmland, facilitate barge traffic, and prevent flooding. But hydrologists have observed that preventing a river from flooding also prevents it from depositing the sediment that builds and maintains delta land. The Louisiana coast is losing land at a rate of a football field every hour." },

    { title:"What the Glacier Remembers", text:"Glaciologists can extract ice cores from glaciers that contain atmospheric samples going back hundreds of thousands of years. Trapped air bubbles in the ice preserve samples of the atmosphere as it existed when the ice formed. By analyzing these bubbles, researchers can determine the concentration of greenhouse gases and even something about global temperatures at the time of formation. The ice cores from Antarctica have given scientists a detailed record of climate over the past eight hundred thousand years, covering eight complete glacial cycles. What that context reveals is that the rate of change we are currently observing is without precedent in the entire record the ice preserves." },

    { title:"The Visible and Invisible Curriculum", text:"Educational theorists distinguish between the explicit curriculum, the subject matter and skills officially taught in schools, and the hidden curriculum, the attitudes, dispositions, and social relations that are transmitted implicitly through the organization of schooling itself. Students learn not only mathematics and reading but also how to relate to authority, when to speak and when to stay silent, how to compete and how to cooperate, and which kinds of knowledge count as valuable. Critics argue that the hidden curriculum in many school systems reproduces existing social hierarchies." },
    { title:"Returning", text:"After seven years working abroad, I returned to the city where I had grown up to find it recognizable in structure but alien in texture. The buildings were mostly the same but the businesses inside them had changed. The neighborhood I had lived in had gentrified beyond the economic reach of the people who had given it its character. Several friends had left. The ones who remained had been shaped by years of experience I had not shared. The philosopher Thomas Wolfe wrote that you can't go home again, meaning not that home disappears but that you do." },

    { title:"The Ethics of Memory", text:"Philosopher Paul Ricoeur argued that communities, like individuals, have a responsibility toward the past, but that this responsibility involves a delicate balance. Too much remembrance, he suggested, can become a form of resentment that prevents the work of reconciliation and forward movement. Too little is a form of dishonesty that falsifies the historical conditions that shaped the present. The question of how societies should remember atrocity, trauma, and injustice has no universal answer. What Ricoeur insisted upon was that the question must be taken seriously: that forgetting, when it is chosen rather than inevitable, is a moral act with moral consequences." },
    { title:"The Wilderness Essay", text:"When Robert MacFarlane set out to document the experience of wild places, he found himself revising his initial assumptions about what wildness means. He had begun with a romantic notion of wilderness as remote, untouched, and inhuman. What he discovered was something more subtle: that wildness is not a quality of places but of encounters, that it exists as much in a wren's nest in a city hedge as in a mountain summit above the Arctic Circle. The most profound experiences of wildness he recorded were often the most intimate: a light on moss, the behavior of a river in flood, the sensation of being cold enough that the body begins to recalculate its priorities." },

    { title:"What We Owe the Future", text:"The philosopher William MacAskill has argued that future people, who will vastly outnumber all humans who have ever lived if civilization continues for millennia, should count in our moral calculations at least as much as people alive today. This view, which he calls longtermism, implies that decisions and policies affecting the long run trajectory of civilization are of moral importance that dwarfs most of what currently occupies political attention. Critics argue that the uncertainty involved in predicting long run consequences is so great as to render systematic longtermist reasoning unreliable, and that focusing on speculative future populations risks neglecting urgent needs of actual present people." },

    { title:"The Champion", text:"Nadia had been training for the provincial swimming championships since she was eight years old. Now, at fourteen, she stood on the starting block for the final race of her competitive career before her family moved to another country. She had never won the one-hundred-metre freestyle. It was always her event and always her disappointment. Her coach told her before the race to swim her own race and ignore everyone else. For the first fifty metres she did exactly that, staying in her lane, finding her rhythm, not looking left or right. In the final turn she felt something release inside her, as if she had stopped trying and started simply swimming. She touched the wall first by a hundredth of a second.", q:[{q:"How old was Nadia when she competed at the championships?",opts:["Twelve","Fourteen","Thirteen","Fifteen"],a:1},{q:"What had the one-hundred-metre freestyle always represented for Nadia before this race?",opts:["Her greatest strength","The race she always avoided","Her favourite event and her greatest triumph","Her event and her disappointment"],a:3},{q:"What did Nadia's coach tell her before the race?",opts:["Swim her own race and ignore everyone else","Swim faster in the first fifty metres","Watch the swimmer in lane four","Focus on her breathing above everything"],a:0}] },

// ════════════════════════════════════════════════════════
//  READING TIPS per level band
// ════════════════════════════════════════════════════════
const TIPS = {
  early:  { title:"📌 Reading Tip", text:"Point to each word as you read. Take your time — every word matters!" },
  mid:    { title:"📌 Reading Tip", text:"Read the whole sentence first, then go back if a word is tricky." },
  fluent: { title:"📌 Reading Tip", text:"Try to read smoothly without stopping. Use expression in your voice!" },
  adv:    { title:"📌 Reading Tip", text:"Focus on phrasing and punctuation — let commas and periods guide your pace." },
};

function getTip(lvlId) {
  const early  = ['AA','A','B','C','D','E'];
  const mid    = ['F','G','H','I','J','K','L'];
  const fluent = ['M','N','O','P','Q','R'];
  if (early.includes(lvlId))  return TIPS.early;
  if (mid.includes(lvlId))    return TIPS.mid;
  if (fluent.includes(lvlId)) return TIPS.fluent;
  return TIPS.adv;
}

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
const STREAK_UP   = 2;
const STREAK_DOWN = 2;
const ACCURACY_OK   = 0.90;
const ACCURACY_FAIL = 0.85;

let levelIdx       = 0;
let successStreak  = 0;
let failStreak     = 0;
let storyIdx       = 0;
let currentBook    = null;
let shuffledPool   = [];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetPool(lvlId) {
  shuffledPool = shuffle(STORIES[lvlId]);
  storyIdx = 0;
}

let capturedTranscript   = '';
let prevTranscript       = '';
let latestTranscript     = '';
let isManuallyStopping   = false;
let recognition          = null;

// ════════════════════════════════════════════════════════
//  LEVEL PICKER
// ════════════════════════════════════════════════════════
function buildLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const btn = document.createElement('button');
    btn.className = 'lvl-btn' + (i === levelIdx ? ' active' : '');
    btn.textContent = lv.label;
    btn.title = lv.desc;
    btn.onclick = () => selectLevel(i);
    grid.appendChild(btn);
  });
}

function selectLevel(i) {
  levelIdx = i;
  successStreak = 0;
  failStreak = 0;
  resetPool(LEVELS[i].id);
  buildLevelGrid();
  updateHeader();
  document.getElementById('level-picker').style.display = 'none';
  document.getElementById('story-panel').style.display = 'block';
  document.getElementById('results-area').style.display = 'none';
  loadStory();
}

function showLevelPicker() {
  buildLevelGrid();
  document.getElementById('level-picker').style.display = 'block';
  document.getElementById('story-panel').style.display = 'none';
  document.getElementById('results-area').style.display = 'none';
}

// ════════════════════════════════════════════════════════
//  HEADER
// ════════════════════════════════════════════════════════
function updateHeader() {
  const lv = LEVELS[levelIdx];
  document.getElementById('hdr-level').textContent = lv.label;
  document.getElementById('hdr-desc').textContent  = lv.desc;
  const bar = document.getElementById('streak-bar');
  bar.innerHTML = '';
  for (let i = 0; i < STREAK_UP; i++) {
    const d = document.createElement('div');
    d.className = 's-dot' + (i < successStreak ? ' on' : '');
    bar.appendChild(d);
  }
  if (failStreak > 0) {
    const d = document.createElement('div');
    d.className = 's-dot warn';
    bar.appendChild(d);
  }
  const pct = (successStreak / STREAK_UP) * 100;
  const fill = document.getElementById('prog-fill');
  if (fill) fill.style.width = pct + '%';
  const prog = document.getElementById('prog-count');
  if (prog) prog.textContent = successStreak + ' / ' + STREAK_UP + ' reads to advance';
  const lbl = document.getElementById('prog-label');
  if (lbl) lbl.textContent = 'Level ' + lv.label + ' Progress';
  const lp = document.getElementById('story-level-pill');
  if (lp) lp.textContent = 'Level ' + lv.label + ' · ' + lv.desc;
}

// ════════════════════════════════════════════════════════
//  STORY LOADING
// ════════════════════════════════════════════════════════
function loadStory() {
  const lv = LEVELS[levelIdx];
  if (!shuffledPool.length || shuffledPool[0] === undefined) {
    resetPool(lv.id);
  }
  if (storyIdx >= shuffledPool.length) {
    shuffledPool = shuffle(shuffledPool);
    storyIdx = 0;
  }
  currentBook = shuffledPool[storyIdx];
  storyIdx++;

  const np = document.getElementById('story-num-pill');
  if (np) np.textContent = 'Story ' + storyIdx + ' of ' + shuffledPool.length;

  updateHeader();
  renderStory();
  document.getElementById('results-area').style.display = 'none';
}

function renderStory() {
  const lv  = LEVELS[levelIdx];
  const tip = getTip(lv.id);
  document.getElementById('story-area').innerHTML = `
    <div class="tip-box slide-up">
      <div class="tip-title">${tip.title}</div>
      ${tip.text}
    </div>
    <div class="story-box slide-up">
      <div class="story-title">${esc(currentBook.title)}</div>
      <p class="story-text">${esc(currentBook.text)}</p>
      <div id="transcript-live" style="display:none;" class="live-hint"></div>
    </div>`;
  document.getElementById('mic-controls').style.display = 'block';
  resetMic();
}

// ════════════════════════════════════════════════════════
//  SPEECH RECOGNITION
// ════════════════════════════════════════════════════════
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('mic-controls').innerHTML =
      '<p style="color:#f43f5e;font-weight:700;text-align:center;padding:12px;">⚠️ Speech recognition requires Chrome or Edge browser.</p>';
    return;
  }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    let session = '';
    for (let i = 0; i < e.results.length; i++) session += e.results[i][0].transcript;
    const full = (prevTranscript + ' ' + session).trim();
    capturedTranscript = full;
    latestTranscript = full;
    const el = document.getElementById('transcript-live');
    if (el) { el.style.display = 'block'; el.textContent = '"' + full.slice(-140) + '…"'; }
  };

  recognition.onend = () => {
    if (!isManuallyStopping) {
      prevTranscript = latestTranscript;
      try { recognition.start(); } catch(e) {}
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') {
      alert('Microphone permission denied. Please allow microphone access in your browser and try again.');
      resetMic();
    }
  };
}

function startListening() {
  if (!currentBook) return;
  if (!recognition) { initSpeech(); if (!recognition) return; }
  isManuallyStopping = false;
  prevTranscript = ''; latestTranscript = ''; capturedTranscript = '';

  let count = 3;
  const mc = document.getElementById('mic-controls');
  mc.innerHTML = `<div class="countdown-disp">${count}</div>`;
  const timer = setInterval(() => {
    count--;
    if (count === 1) { try { recognition.start(); } catch(e) {} }
    if (count === 0) {
      clearInterval(timer);
      mc.innerHTML = `<button class="btn btn-red btn-lg" onclick="stopAndScore()">🎙️ I'M DONE!</button>`;
    } else {
      const cd = mc.querySelector('.countdown-disp');
      if (cd) cd.textContent = count;
    }
  }, 1000);
}

function stopAndScore() {
  if (!recognition) return;
  isManuallyStopping = true;
  try { recognition.stop(); } catch(e) {}
  resetMic();
  setTimeout(() => processReading(capturedTranscript), 400);
}

function resetMic() {
  const mc = document.getElementById('mic-controls');
  if (mc) mc.innerHTML = `<button class="btn btn-green btn-lg" onclick="startListening()">🎤 START READING</button>`;
}

// ════════════════════════════════════════════════════════
//  SCORING
// ════════════════════════════════════════════════════════
function normalize(text) {
  if (!text) return [];
  return text.toLowerCase()
    .replace(/[^a-z0-9'\s]/g, ' ')
    .replace(/\s+/g, ' ').trim()
    .split(' ').filter(w => w.length > 0);
}

function processReading(transcript) {
  if (!currentBook || !transcript) {
    renderResults({ accuracy: 0, isSuccess: false, feedback: [], advanced: false, regressed: false });
    return;
  }
  const expected = normalize(currentBook.text);
  const actual   = normalize(transcript);
  let correct = 0;
  const feedback = expected.map(word => {
    const ok = actual.includes(word);
    if (ok) correct++;
    return { word, ok };
  });
  const accuracy   = expected.length > 0 ? correct / expected.length : 0;
  const isSuccess  = accuracy >= ACCURACY_OK;
  const isBad      = accuracy < ACCURACY_FAIL;

  let newLvl  = levelIdx;
  let newSucc = isSuccess ? successStreak + 1 : 0;
  let newFail = isBad    ? failStreak + 1     : 0;
  let advanced = false, regressed = false;

  if (isSuccess && newSucc >= STREAK_UP) {
    newLvl   = Math.min(levelIdx + 1, LEVELS.length - 1);
    newSucc  = 0; newFail = 0; advanced = true;
    resetPool(LEVELS[newLvl].id);
  } else if (newFail >= STREAK_DOWN) {
    newLvl   = Math.max(0, levelIdx - 1);
    newSucc  = 0; newFail = 0; regressed = true;
    resetPool(LEVELS[newLvl].id);
  }

  levelIdx = newLvl; successStreak = newSucc; failStreak = newFail;
  updateHeader();
  renderResults({ accuracy, isSuccess, feedback, advanced, regressed });
}

// ════════════════════════════════════════════════════════
//  RESULTS + QUIZ
// ════════════════════════════════════════════════════════
function renderResults({ accuracy, isSuccess, feedback, advanced, regressed }) {
  const pct  = Math.round(accuracy * 100);
  const area = document.getElementById('results-area');
  area.style.display = 'block';

  const chips = feedback.length > 0
    ? feedback.map(f =>
        `<span class="wchip ${f.ok ? 'ok' : 'bad'}">${esc(f.word)}</span>`
      ).join(' ')
    : '<span style="color:#94a3b8;font-weight:700;">No speech detected — try again!</span>';

  let feedbackMsg = '';
  if (pct === 100) feedbackMsg = '🏆 Perfect reading! Every word was spot on!';
  else if (pct >= 95) feedbackMsg = '⭐ Nearly perfect! Just a couple of words to work on.';
  else if (pct >= 90) feedbackMsg = '✅ Great reading! You\'re ready to level up soon.';
  else if (pct >= 80) feedbackMsg = '👍 Good effort! Try reading a little more slowly and clearly.';
  else if (pct >= 70) feedbackMsg = '📖 Keep practicing! Try pointing to each word as you read.';
  else feedbackMsg = '💡 Let\'s try again. Read slowly and say every word you see.';

  let banner = '';
  if (advanced) banner = `<div class="banner up">🎉 LEVEL UP! Moving to Level ${LEVELS[levelIdx].label} — ${LEVELS[levelIdx].desc}</div>`;
  if (regressed) banner = `<div class="banner down">🔄 Let's keep practicing at Level ${LEVELS[levelIdx].label}</div>`;

  // Build quiz HTML if questions exist
  const hasQuiz = currentBook.q && currentBook.q.length > 0;
  const quizHtml = hasQuiz ? buildQuizHtml(currentBook.q) : '';

  area.innerHTML = `
    <div class="results-card ${isSuccess ? 'success' : 'fail'} slide-up">
      <div class="score-row">
        <div>
          <div class="score-num">${pct}%</div>
          <div class="score-lbl">Accuracy Score</div>
        </div>
        <div class="badge ${isSuccess ? 's' : 'f'}">${isSuccess ? '⭐ Great!' : '💪 Try Again!'}</div>
      </div>

      <div style="background:rgba(255,255,255,0.7);border-radius:13px;padding:12px 15px;margin-bottom:15px;font-weight:700;font-size:.9rem;color:#374151;">
        ${feedbackMsg}
      </div>

      <div style="font-size:.75rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Word by Word</div>
      <div class="word-feedback">${chips}</div>

      <div class="action-row">
        <button class="btn btn-blue"   onclick="loadStory()">📖 Next Story</button>
        <button class="btn btn-green"  onclick="reloadCurrentStory()">🔄 Try Again</button>
        <button class="btn btn-ghost"  onclick="showLevelPicker()" style="font-size:.85rem;">🎯 Change Level</button>
      </div>
      ${banner}
    </div>
    ${quizHtml}`;

  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function reloadCurrentStory() {
  // Step back one so loadStory re-serves the same story
  storyIdx = Math.max(0, storyIdx - 1);
  document.getElementById('results-area').style.display = 'none';
  renderStory();
}

function buildQuizHtml(questions) {
  const qItems = questions.map((q, qi) => {
    const opts = q.opts.map((opt, oi) =>
      `<button class="quiz-opt" onclick="answerQuiz(${qi},${oi},${q.a})" id="qopt-${qi}-${oi}">${esc(opt)}</button>`
    ).join('');
    return `
      <div class="quiz-q" id="quiz-q-${qi}">
        <p>${qi + 1}. ${esc(q.q)}</p>
        <div class="quiz-opts">${opts}</div>
        <div id="quiz-fb-${qi}" style="display:none;margin-top:7px;font-size:.82rem;font-weight:800;"></div>
      </div>`;
  }).join('');

  return `
    <div class="quiz-wrap slide-up">
      <h3>📝 Comprehension Check</h3>
      ${qItems}
      <div id="quiz-score-area"></div>
    </div>`;
}

let quizAnswers = {};
function answerQuiz(qi, selected, correct) {
  // Disable all options for this question
  for (let oi = 0; oi < 4; oi++) {
    const btn = document.getElementById(`qopt-${qi}-${oi}`);
    if (!btn) continue;
    btn.disabled = true;
    if (oi === correct) btn.classList.add('correct');
    else if (oi === selected) btn.classList.add('wrong');
    else btn.classList.add('reveal');
  }
  const fb = document.getElementById(`quiz-fb-${qi}`);
  if (fb) {
    fb.style.display = 'block';
    fb.style.color = selected === correct ? '#15803d' : '#b91c1c';
    fb.textContent = selected === correct ? '✅ Correct!' : '❌ Not quite — the correct answer is highlighted in green.';
  }
  quizAnswers[qi] = selected === correct;
  checkQuizComplete();
}

function checkQuizComplete() {
  const total = currentBook.q ? currentBook.q.length : 0;
  if (Object.keys(quizAnswers).length < total) return;
  const correct = Object.values(quizAnswers).filter(Boolean).length;
  const scoreArea = document.getElementById('quiz-score-area');
  if (!scoreArea) return;
  let cls = correct === total ? 'perfect' : correct >= Math.ceil(total / 2) ? 'good' : 'tryagain';
  let msg = correct === total
    ? `🏆 Perfect! ${correct}/${total} correct!`
    : correct >= Math.ceil(total / 2)
    ? `⭐ Good job! ${correct}/${total} correct.`
    : `💡 Keep reading! ${correct}/${total} correct. Try the story again.`;
  scoreArea.innerHTML = `<div class="quiz-score ${cls}">${msg}</div>`;
  quizAnswers = {};
}

// ════════════════════════════════════════════════════════
//  UTILITY
// ════════════════════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
buildLevelGrid();
resetPool(LEVELS[levelIdx].id);
initSpeech();
</script>
