<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Buddy 📚</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#4ade80; --mint-dark:#16a34a; --sky:#38bdf8; --sky-dark:#0284c7;
  --coral:#fb7185; --yellow:#fbbf24; --purple:#a78bfa; --orange:#fb923c;
  --bg:#f0fdf4; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  background-image:radial-gradient(circle at 15% 15%,#dcfce7 0%,transparent 45%),
                   radial-gradient(circle at 85% 85%,#dbeafe 0%,transparent 45%);
  min-height:100vh;color:var(--text);padding:16px;
}
h1,h2,h3{font-family:'Fredoka One',cursive;letter-spacing:.02em;}
.container{max-width:700px;margin:0 auto;}

/* ── Header ── */
.header{
  background:#fff;border-radius:24px;padding:18px 22px;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.06);border:2px solid #dcfce7;
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
}
.header-left h1{font-size:1.7rem;color:#16a34a;}
.header-left p{font-size:.72rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
.level-badge{text-align:right;}
.level-badge .lbl{font-size:.58rem;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:.12em;}
.level-badge .val{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--mint-dark);line-height:1.1;}
.level-badge .desc{font-size:.7rem;color:var(--muted);font-weight:700;}
.streak-bar{display:flex;gap:3px;justify-content:flex-end;margin-top:5px;}
.s-dot{width:16px;height:5px;border-radius:99px;background:#e2e8f0;transition:background .3s;}
.s-dot.on{background:#22c55e;} .s-dot.warn{background:var(--coral);}

/* ── Level Picker ── */
.level-picker{
  background:#fff;border-radius:24px;padding:22px;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.05);border:2px solid #f1f5f9;
}
.level-picker h2{font-size:1.1rem;color:var(--text);margin-bottom:14px;}
.level-grid{display:flex;flex-wrap:wrap;gap:8px;}
.lvl-btn{
  padding:8px 14px;border:2px solid var(--border);border-radius:10px;
  font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;background:#fff;
  color:var(--text);transition:all .15s;letter-spacing:.03em;
}
.lvl-btn:hover{border-color:var(--mint);background:#f0fdf4;transform:translateY(-1px);}
.lvl-btn.active{background:var(--mint-dark);border-color:var(--mint-dark);color:#fff;box-shadow:0 3px 10px rgba(22,163,74,.3);}
.lvl-btn.done{background:#dcfce7;border-color:#86efac;color:#16a34a;}

/* ── Card ── */
.card{background:#fff;border-radius:24px;padding:22px;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,.05);border:2px solid #f1f5f9;}

/* ── Buttons ── */
.btn{padding:11px 20px;border:none;border-radius:12px;font-family:'Fredoka One',cursive;font-size:.98rem;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .2s;letter-spacing:.04em;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}
.btn-green {background:linear-gradient(135deg,#4ade80,#22c55e);color:#fff;box-shadow:0 4px 14px rgba(74,222,128,.3);}
.btn-blue  {background:linear-gradient(135deg,#38bdf8,#0ea5e9);color:#fff;box-shadow:0 4px 14px rgba(56,189,248,.3);}
.btn-red   {background:linear-gradient(135deg,#fb7185,#f43f5e);color:#fff;box-shadow:0 4px 14px rgba(251,113,133,.3);}
.btn-purple{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;box-shadow:0 4px 14px rgba(167,139,250,.3);}
.btn-orange{background:linear-gradient(135deg,#fb923c,#ea580c);color:#fff;box-shadow:0 4px 14px rgba(251,146,60,.3);}
.btn-ghost {background:#f1f5f9;color:#475569;}
.btn-lg{padding:17px 28px;font-size:1.45rem;width:100%;border-radius:18px;}

/* ── Story ── */
.story-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;flex-wrap:wrap;}
.story-box{background:linear-gradient(135deg,#f0fdf4,#eff6ff);border-radius:20px;padding:26px 22px;border:3px solid #dcfce7;text-align:center;}
.story-title{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--sky-dark);margin-bottom:13px;}
.story-text{font-size:1.5rem;line-height:1.8;font-weight:700;color:var(--text);}
@media(max-width:480px){.story-text{font-size:1.15rem;}}
.live-hint{margin-top:13px;padding:9px 13px;background:rgba(255,255,255,.7);border-radius:11px;font-size:.8rem;color:var(--sky-dark);font-weight:700;font-style:italic;border:1px solid #bfdbfe;animation:pulse 2s infinite;word-break:break-word;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.empty-state{padding:46px 20px;text-align:center;}
.empty-emoji{font-size:68px;display:block;margin-bottom:13px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.empty-state p{color:var(--muted);font-weight:800;font-size:1rem;}
.countdown-disp{width:100%;padding:19px;background:linear-gradient(135deg,var(--yellow),#f59e0b);color:#fff;border:none;border-radius:18px;font-family:'Fredoka One',cursive;font-size:2.4rem;text-align:center;animation:bop .5s infinite;}
@keyframes bop{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* ── Results ── */
.results-card{border-radius:24px;padding:22px;margin-bottom:14px;box-shadow:0 6px 24px rgba(0,0,0,.07);}
.results-card.success{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:3px solid #86efac;}
.results-card.fail   {background:linear-gradient(135deg,#fff7ed,#ffedd5);border:3px solid #fdba74;}
.score-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;}
.score-num{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--text);line-height:1;}
.score-lbl{font-size:.68rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.badge{padding:7px 17px;border-radius:99px;font-family:'Fredoka One',cursive;font-size:.88rem;}
.badge.s{background:#22c55e;color:#fff;} .badge.f{background:#f97316;color:#fff;}
.word-feedback{display:flex;flex-wrap:wrap;gap:6px;padding:16px;background:rgba(255,255,255,.6);border-radius:13px;margin-bottom:16px;}
.wchip{font-size:.98rem;font-weight:800;transition:transform .15s;line-height:1.6;}
.wchip.ok {color:#16a34a;}
.wchip.bad{color:#fca5a5;text-decoration:line-through;text-decoration-color:#ef4444;text-decoration-thickness:3px;}
.action-row{display:flex;gap:9px;flex-wrap:wrap;}
.action-row .btn{flex:1;min-width:100px;}
.banner{border-radius:15px;padding:13px 17px;text-align:center;font-family:'Fredoka One',cursive;font-size:1.05rem;margin-top:13px;letter-spacing:.04em;}
.banner.up  {background:linear-gradient(135deg,#4ade80,#06b6d4);color:#fff;animation:pulse 1.5s infinite;}
.banner.down{background:linear-gradient(135deg,#fb923c,#f43f5e);color:#fff;animation:bop 1s infinite;}

/* ── Progress bar ── */
.progress-wrap{margin-bottom:16px;}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;font-weight:800;color:var(--muted);margin-bottom:5px;}
.progress-track{height:8px;background:#e2e8f0;border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#4ade80,#22d3ee);transition:width .5s ease;}

/* ── Tips box ── */
.tip-box{background:#fefce8;border-radius:13px;padding:13px 16px;border:2px solid #fde68a;margin-bottom:16px;font-size:.85rem;font-weight:700;color:#92400e;line-height:1.55;}
.tip-box .tip-title{font-family:'Fredoka One',cursive;color:#d97706;margin-bottom:4px;font-size:.95rem;}

/* ── Quiz ── */
.quiz-wrap{margin-top:20px;background:#fff;border-radius:20px;padding:20px;border:2px solid #e0f2fe;box-shadow:0 4px 16px rgba(0,0,0,.05);}
.quiz-wrap h3{font-size:1.1rem;color:var(--sky-dark);margin-bottom:16px;}
.quiz-q{margin-bottom:18px;}
.quiz-q p{font-weight:800;font-size:.95rem;color:var(--text);margin-bottom:10px;}
.quiz-opts{display:flex;flex-direction:column;gap:7px;}
.quiz-opt{padding:10px 14px;border:2px solid var(--border);border-radius:11px;background:#fff;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;color:var(--text);}
.quiz-opt:hover:not(:disabled){border-color:var(--sky);background:#f0f9ff;transform:translateX(3px);}
.quiz-opt:disabled{cursor:default;transform:none;}
.quiz-opt.correct{background:#dcfce7;border-color:#22c55e;color:#15803d;}
.quiz-opt.wrong  {background:#fee2e2;border-color:#f87171;color:#b91c1c;}
.quiz-opt.reveal {background:#f1f5f9;border-color:#94a3b8;color:#64748b;}
.quiz-score{margin-top:14px;padding:12px 16px;border-radius:12px;font-family:'Fredoka One',cursive;font-size:1rem;text-align:center;}
.quiz-score.perfect{background:#dcfce7;color:#15803d;}
.quiz-score.good   {background:#dbeafe;color:#1d4ed8;}
.quiz-score.tryagain{background:#fff7ed;color:#c2410c;}

.spin{display:inline-block;width:15px;height:15px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spinning .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spinning{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .35s ease;}

/* ── Story counter pill ── */
.story-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.pill{padding:4px 12px;border-radius:99px;font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;}
.pill-green{background:#dcfce7;color:#16a34a;}
.pill-blue {background:#dbeafe;color:#1d4ed8;}

footer{text-align:center;padding:16px 0;font-size:.7rem;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:.15em;}
</style>
</head>
<body>
<div class="container">

  <!-- ══ HEADER ══ -->
  <header class="header">
    <div class="header-left">
      <h1>📚 Reading Buddy</h1>
      <p>Reading A–Z Style Coach</p>
    </div>
    <div class="level-badge">
      <div class="lbl">Current Level</div>
      <div class="val" id="hdr-level">AA</div>
      <div class="desc" id="hdr-desc">Pre-Reader</div>
      <div class="streak-bar" id="streak-bar"></div>
    </div>
  </header>

  <!-- ══ LEVEL PICKER ══ -->
  <div class="level-picker" id="level-picker">
    <h2>🎯 Choose Starting Level</h2>
    <div class="level-grid" id="level-grid"></div>
  </div>

  <!-- ══ STORY PANEL ══ -->
  <div class="card" id="story-panel" style="display:none;">
    <div class="story-top">
      <div class="story-meta">
        <h2 style="font-size:1.1rem;">Practice Time</h2>
        <span class="pill pill-green" id="story-level-pill">Level AA</span>
        <span class="pill pill-blue"  id="story-num-pill">Story 1</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="showLevelPicker()" style="font-size:.85rem;padding:8px 14px;">🎯 Change Level</button>
        <button class="btn btn-blue" id="new-story-btn" onclick="loadStory()">New Story</button>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="prog-label">Level Progress</span>
        <span id="prog-count">0 / 2 reads to advance</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div id="story-area">
      <div class="empty-state">
        <span class="empty-emoji">📖</span>
        <p>Tap "New Story" to begin!</p>
      </div>
    </div>
    <div id="mic-controls" style="margin-top:13px;display:none;"></div>
  </div>

  <!-- ══ RESULTS ══ -->
  <div id="results-area" style="display:none;"></div>

  <footer>Reading Buddy · No API Key Required · Reading A–Z Style Levels</footer>
</div>

<script>
// ════════════════════════════════════════════════════════
//  LEVEL DATA  (Reading A-Z: AA → Z)
// ════════════════════════════════════════════════════════

  { id:'Y',  label:'Y',  desc:'Proficient',       color:'#fb7185', words:610, sentences:27 },
  { id:'Z',  label:'Z',  desc:'Proficient',       color:'#fb923c', words:640, sentences:28 },
];

// ════════════════════════════════════════════════════════
//  STORIES
// ════════════════════════════════════════════════════════
const STORIES = {
  AA: [
    { title:"The Cat", text:"I see a cat. The cat is big. I like the cat.", q:[{q:"What does the child see?",opts:["A dog","A cat","A bird","A fish"],a:1},{q:"What is the cat like?",opts:["Small","Fast","Big","Soft"],a:2},{q:"How does the child feel about the cat?",opts:["Scared of it","Likes it","Hates it","Ignores it"],a:1}] },
    { title:"My Dog", text:"My dog is red. My dog can run. I love my dog.", q:[{q:"What color is the dog?",opts:["Blue","Black","Red","Brown"],a:2},{q:"What can the dog do?",opts:["Swim","Fly","Sing","Run"],a:3},{q:"How does the child feel about the dog?",opts:["Loves it","Fears it","Dislikes it","Ignores it"],a:0}] },
    { title:"The Sun", text:"The sun is up. I see the sun. It is hot.", q:[{q:"Where is the sun?",opts:["Down","Behind clouds","Up","In the water"],a:2},{q:"What does the child see?",opts:["The moon","The sun","A star","A cloud"],a:1},{q:"What is the sun like?",opts:["Cold","Wet","Dark","Hot"],a:3}] },
    { title:"The Ball", text:"I have a ball. The ball is red. I kick the ball.", q:[{q:"What does the child have?",opts:["A bat","A ball","A kite","A toy"],a:1},{q:"What color is the ball?",opts:["Blue","Green","Yellow","Red"],a:3},{q:"What does the child do with the ball?",opts:["Throws it","Kicks it","Catches it","Drops it"],a:1}] },
    { title:"My Mom", text:"I see my mom. My mom is big. I love my mom.", q:[{q:"Who does the child see?",opts:["Their dad","Their teacher","Their mom","Their friend"],a:2},{q:"What is the mom like?",opts:["Small","Tall","Big","Fast"],a:2},{q:"How does the child feel about their mom?",opts:["Loves her","Fears her","Dislikes her","Misses her"],a:0}] },
  ],
  A: [
    { title:"I Can Jump", text:"I can jump. I can run. I can hop. I can play. It is fun.", q:[{q:"What is one thing the child can do?",opts:["Swim","Jump","Fly","Climb"],a:1},{q:"What does the child say about playing?",opts:["It is hard","It is boring","It is fun","It is loud"],a:2},{q:"Which of these can the child do?",opts:["Swim","Fly","Hop","Drive"],a:2}] },
    { title:"The Big Box", text:"I see a big box. The box is red. I put my toys in the box. I like my box.", q:[{q:"What color is the box?",opts:["Blue","Green","Red","Yellow"],a:2},{q:"What does the child put in the box?",opts:["Books","Toys","Food","Clothes"],a:1},{q:"How does the child feel about the box?",opts:["Hates it","Likes it","Fears it","Breaks it"],a:1}] },
    { title:"My Hat", text:"I have a hat. My hat is blue. I put on my hat. I go out to play.", q:[{q:"What color is the hat?",opts:["Red","Green","Blue","Yellow"],a:2},{q:"What does the child do with the hat?",opts:["Loses it","Puts it on","Throws it","Gives it away"],a:1},{q:"Where does the child go after putting on the hat?",opts:["To bed","To school","To eat","Out to play"],a:3}] },

  B: [
    { title:"At the Park", text:"We go to the park. I see a slide. I can go up and down. My dad is here. We have fun at the park.", q:[{q:"Where do they go?",opts:["The beach","The park","The store","The school"],a:1},{q:"What does the child see at the park?",opts:["A swing","A slide","A pond","A tree"],a:1},{q:"Who is at the park with the child?",opts:["Their mom","Their friend","Their dad","Their teacher"],a:2}] },
    { title:"My Bed", text:"My bed is soft. I get in my bed at night. I put my head on the pillow. My mom says good night. I go to sleep.", q:[{q:"What is the bed like?",opts:["Hard","Soft","Cold","Small"],a:1},{q:"What does the child put their head on?",opts:["A blanket","A stuffed animal","The mattress","The pillow"],a:3},{q:"Who says good night?",opts:["Dad","A friend","The child","Mom"],a:3}] },

    { title:"Rain Day", text:"It is raining today. I put on my boots. I jump in the puddle. Splash! My dog runs in the rain too.", q:[{q:"What is the weather like?",opts:["Sunny","Windy","Snowing","Raining"],a:3},{q:"What does the child put on?",opts:["A coat","Boots","A hat","Gloves"],a:1},{q:"Who also runs in the rain?",opts:["A friend","A cat","The child's dog","Mom"],a:2}] },

  C: [
    { title:"The Nest", text:"A bird has a nest in the tree. The nest has three eggs in it. The eggs are small and blue. One day the eggs crack open. Three baby birds pop out. They are hungry. The mom bird brings food.", q:[{q:"Where is the bird's nest?",opts:["On the ground","In a bush","In the tree","On a roof"],a:2},{q:"What color are the eggs?",opts:["White","Yellow","Green","Blue"],a:3},{q:"How many baby birds pop out?",opts:["One","Two","Three","Four"],a:2}] },
    { title:"We Bake", text:"Mom and I bake a cake. We mix the batter. We put it in the pan. We put it in the oven. It smells so good. When it is done, we put on the frosting. Then we eat it up.", q:[{q:"What do Mom and the child bake?",opts:["Cookies","Bread","A pie","A cake"],a:3},{q:"Where do they put the batter to cook?",opts:["On the stove","In the microwave","In the oven","In the fridge"],a:2},{q:"What do they put on after it is done?",opts:["Sprinkles","Frosting","Jam","Sugar"],a:1}] },
    { title:"My Bike", text:"I have a red bike. I ride my bike on the path. I go fast down the hill. My dad runs behind me. I do not fall. I am a good rider now.", q:[{q:"What color is the bike?",opts:["Blue","Green","Red","Yellow"],a:2},{q:"Who runs behind the child?",opts:["Mom","A friend","A sibling","Dad"],a:3},{q:"Does the child fall?",opts:["Yes, once","Yes, twice","No","The story doesn't say"],a:2}] },
    { title:"The Frog", text:"I see a green frog by the pond. The frog jumps on a lily pad. It sits very still. Then it jumps in the water. Splash! I look for the frog but it is gone.", q:[{q:"What color is the frog?",opts:["Brown","Yellow","Green","Blue"],a:2},{q:"Where does the frog jump first?",opts:["Into the water","Onto a rock","Onto a lily pad","Into the grass"],a:2},{q:"What happens when the child looks for the frog?",opts:["It jumps again","It is still on the pad","It is gone","It comes closer"],a:3}] },
    { title:"Dog Tricks", text:"My dog can do tricks. She can sit and stay. She can shake my hand. She can roll over. I give her a treat when she does a good job. She wags her tail.", q:[{q:"What is one trick the dog can do?",opts:["Fetch","Roll over","Jump","Bark"],a:1},{q:"What does the child give the dog for doing well?",opts:["A toy","A hug","A treat","A pat"],a:2},{q:"What does the dog do at the end?",opts:["Sits down","Runs away","Wags her tail","Barks"],a:2}] },

  D: [
    { title:"The Garden", text:"Grandma has a garden in her backyard. She grows tomatoes, beans, and flowers. Every morning she waters the plants. I help her pull the weeds. When the vegetables are ready, we pick them together. Then Grandma makes soup. It tastes so good because we grew it ourselves.", q:[{q:"Where is Grandma's garden?",opts:["In the front yard","In the backyard","On the roof","At the park"],a:1},{q:"What does Grandma make with the vegetables?",opts:["A salad","A stew","Soup","A sandwich"],a:2},{q:"What does the child help Grandma do?",opts:["Water the plants","Pick the flowers","Pull the weeds","Make the soup"],a:2}] },
    { title:"Lost Mitten", text:"One cold morning, I lost my mitten on the way to school. I looked in my bag. I looked in my coat pocket. I looked on the ground. My teacher helped me look. We found it under my chair. I was so happy. Now I keep my mittens in my pocket.", q:[{q:"When did the child lose the mitten?",opts:["At night","On a warm day","One cold morning","After school"],a:2},{q:"Who helped the child look for the mitten?",opts:["A friend","Mom","Dad","The teacher"],a:3},{q:"Where was the mitten found?",opts:["In the bag","Under the chair","On the ground","In the coat pocket"],a:1}] },
    { title:"The Puppy", text:"We got a new puppy from the shelter. His name is Biscuit. He has brown spots and floppy ears. At first he was scared in our house. I sat on the floor and waited. He came over and licked my hand. Now Biscuit sleeps at the foot of my bed every night.", q:[{q:"Where did the family get the puppy?",opts:["A pet store","A friend's house","The shelter","A farm"],a:2},{q:"What is the puppy's name?",opts:["Biscuit","Buddy","Bruno","Benji"],a:0},{q:"Where does Biscuit sleep now?",opts:["In the kitchen","In a dog bed","At the foot of the child's bed","In the hallway"],a:2}] },
    { title:"Making Pizza", text:"Saturday is pizza night at our house. Dad rolls the dough into a big circle. Mom spreads the sauce on top. I get to put on the cheese. Then we each pick our toppings. I always pick peppers and mushrooms. The pizza goes in the oven. In twenty minutes dinner is ready.", q:[{q:"When is pizza night?",opts:["Friday","Sunday","Saturday","Monday"],a:2},{q:"What does the child put on the pizza?",opts:["Sauce","Dough","Cheese","Toppings"],a:2},{q:"What toppings does the child always pick?",opts:["Ham and pineapple","Peppers and mushrooms","Olives and onions","Cheese and tomato"],a:1}] },
    { title:"A Rainy Day", text:"It rained all Saturday. I could not go outside to play. First I read two books. Then I painted a picture of a rainbow. Mom taught me how to make cookies. We played a board game until dinner. It turned out to be a great day even without sunshine.", q:[{q:"What was the weather like all Saturday?",opts:["Sunny","Snowy","Windy","Rainy"],a:3},{q:"What did the child paint a picture of?",opts:["A garden","A rainbow","Their house","A cat"],a:1},{q:"Who taught the child how to make cookies?",opts:["Dad","A sibling","Grandma","Mom"],a:3}] },
  ],
  E: [
    { title:"The Science Fair", text:"Our class had a science fair. I made a volcano out of clay and painted it red and orange. I put baking soda inside. When I poured in the vinegar, it bubbled up like lava. Everyone gathered around to watch. My teacher said it was an excellent project. I felt very proud of all the work I had done.", q:[{q:"What did the child make for the science fair?",opts:["A robot","A solar system","A volcano","A bridge"],a:2},{q:"What did the child pour in to make it bubble?",opts:["Water","Vinegar","Juice","Soap"],a:1},{q:"What did the teacher say about the project?",opts:["It was okay","It needed work","It was excellent","It was too small"],a:2}] },
    { title:"The Library", text:"On Tuesday afternoons, Mom takes me to the library. The library is my favorite place. I love how quiet it is inside. The librarian knows my name and always finds books I will enjoy. Last week she found a whole series about a brave girl who solves mysteries. I have already read three of them.", q:[{q:"When does Mom take the child to the library?",opts:["Saturday mornings","Wednesday afternoons","Tuesday afternoons","Friday evenings"],a:2},{q:"What does the librarian always do?",opts:["Reads to the child","Finds books the child will enjoy","Saves a seat for the child","Gives the child a snack"],a:1},{q:"How many books from the new series has the child already read?",opts:["One","Two","Three","Four"],a:2}] },
    { title:"Camping Trip", text:"Our family went camping in the woods last summer. We set up our tent near a little stream. Dad taught me how to fish, and I caught my very first fish. At night we sat by the campfire. Dad told funny stories and Mom made hot chocolate. The stars looked so bright without city lights around.", q:[{q:"Where did the family set up their tent?",opts:["By a lake","Near a little stream","In a field","On a hill"],a:1},{q:"What did Dad teach the child to do?",opts:["Swim","Cook","Hike","Fish"],a:3},{q:"What did Mom make at the campfire?",opts:["Hot dogs","Soup","Hot chocolate","S'mores"],a:2}] },
    { title:"My New School", text:"Starting at a new school felt really scary. I did not know anyone at all. On my first morning, a girl named Sofia sat next to me at lunch. She showed me where everything was and introduced me to her friends. By the end of the week, I was not scared anymore. Sofia and I are best friends now.", q:[{q:"How did the child feel about starting at a new school?",opts:["Excited","Happy","Scared","Bored"],a:2},{q:"What is the new friend's name?",opts:["Mia","Sofia","Sara","Lily"],a:1},{q:"What are Sofia and the child now?",opts:["Classmates","Neighbors","Best friends","Lab partners"],a:2}] },
    { title:"The Storm", text:"A big thunderstorm came through town last night. The thunder was so loud it woke me up. I saw lightning flash across the sky. I was a little frightened, so I went to my parents' room. Mom explained how lightning works. Dad showed me how to count the seconds between lightning and thunder. By the time it was over, I was not scared at all.", q:[{q:"What woke the child up?",opts:["The rain","The wind","The thunder","The lightning"],a:2},{q:"Where did the child go when frightened?",opts:["The kitchen","Under the covers","A sibling's room","Their parents' room"],a:3},{q:"What did Dad show the child how to do?",opts:["Stay calm","Count seconds between lightning and thunder","Turn off the lights","Close the windows"],a:1}] },
  ],
  F: [
    { title:"The Old Lighthouse", text:"On our vacation, we visited an old lighthouse near the ocean. A guide took us up the spiral staircase. There were one hundred and twelve steps to the top. From up there, the boats in the harbor looked like tiny toys. The guide told us that the lighthouse had been built over a hundred years ago to keep ships safe from the rocky shore. I want to be a lighthouse keeper someday.", q:[{q:"How many steps were there to the top?",opts:["Ninety","One hundred","One hundred and twelve","One hundred and twenty"],a:2},{q:"What did the boats look like from the top?",opts:["Very large","Like tiny toys","Hard to see","Like painted pictures"],a:1},{q:"Why was the lighthouse built?",opts:["To guide fishing boats to shore","To warn sailors of storms","To keep ships safe from the rocky shore","To help people find the harbor town"],a:2}] },
    { title:"Recycling Day", text:"Every Friday is recycling day on our street. Our family sorts paper, plastic, and glass into separate bins. I learned that one recycled aluminum can saves enough energy to run a television for three hours. Now I remind my whole family to recycle. I also bring an extra bag to school to collect bottles from the cafeteria. Small actions can really make a difference.", q:[{q:"When is recycling day on their street?",opts:["Monday","Wednesday","Thursday","Friday"],a:3},{q:"How long can one recycled aluminum can power a television?",opts:["One hour","Two hours","Three hours","Four hours"],a:2},{q:"Where does the child collect bottles?",opts:["At home","At the park","In the classroom","In the cafeteria"],a:3}] },
    { title:"The Dragon Kite", text:"Grandpa gave me a dragon kite for my birthday. It was red and gold with a long shimmery tail. We took it to the park on a windy afternoon. At first it kept crashing into the grass. Grandpa showed me how to angle it into the wind and let the string out slowly. After several tries it climbed high above the trees. I ran and the dragon soared above me like it was alive.", q:[{q:"Who gave the child the kite?",opts:["Dad","An uncle","Grandpa","A friend"],a:2},{q:"What colors was the kite?",opts:["Blue and silver","Green and yellow","Red and gold","Orange and white"],a:2},{q:"What did the child do to help the kite fly?",opts:["Ran very fast","Climbed a hill","Waited for more wind","Angled it into the wind and let the string out slowly"],a:3}] },
    { title:"Fresh Snow", text:"The first snowfall of winter arrived while I was still asleep. When I looked out my window in the morning, everything was covered in white. Our dog Chester had never seen snow before. He pressed his nose against the glass and whined. When we finally let him outside, he leaped into a drift and disappeared. We laughed for a long time. Chester decided he loves snow.", q:[{q:"When did the snowfall arrive?",opts:["During dinner","While the child was at school","While the child was still asleep","Early in the evening"],a:2},{q:"What is the dog's name?",opts:["Biscuit","Chester","Charlie","Cooper"],a:1},{q:"What did Chester do when he went outside?",opts:["Ran back inside","Barked at the snow","Sat very still","Leaped into a drift"],a:3}] },
    { title:"Grandma's Recipe", text:"My grandmother makes the best chicken soup in the world. Last winter, she finally agreed to teach me her recipe. We spent the whole afternoon together in her warm kitchen. She showed me how to chop the vegetables, season the broth, and know when the noodles are done. She said her own grandmother had taught her the same recipe long ago. Now I know it too, and one day I will pass it on.", q:[{q:"What does Grandma make that is described as the best in the world?",opts:["Apple pie","Chicken soup","Vegetable stew","Bread"],a:1},{q:"What did Grandma show the child how to do?",opts:["Bake bread","Make dessert","Chop vegetables and season the broth","Boil water and stir the pot"],a:2},{q:"Who originally taught Grandma the recipe?",opts:["Her mother","Her aunt","Her own grandmother","A neighbor"],a:2}] },
