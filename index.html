  G: [
    { title:"The Bee Keeper", text:"My aunt keeps bees in wooden hives behind her farmhouse. She let me help her check on them one afternoon. We wore white suits with veils over our faces to protect us. She used a smoker to calm the bees before opening the hive. Inside were thousands of bees working together in perfect order. Some made wax cells, others fanned their wings, and the queen laid eggs. I tasted fresh honey straight from the comb and it was the sweetest thing I have ever eaten.", q:[{q:"Where does the aunt keep her bees?",opts:["In the front yard","Behind her farmhouse","In a field nearby","On the roof"],a:1},{q:"What did they wear to protect themselves?",opts:["Yellow suits with masks","White suits with veils","Blue gloves and hats","Thick coats and boots"],a:1},{q:"What did the child taste straight from the comb?",opts:["Wax","Royal jelly","Fresh honey","Nectar"],a:2}] },
    { title:"Starting a Business", text:"Last summer my sister and I started a small business selling lemonade and homemade cookies in front of our house. We made a sign on cardboard and designed a price list. We figured out how much we spent on ingredients so we could set the right prices. On a hot Saturday, we made seventeen dollars in one afternoon. We split the money and both put our shares in our savings accounts. Our parents said we were natural entrepreneurs.", q:[{q:"What did the siblings sell in their business?",opts:["Juice and muffins","Lemonade and homemade cookies","Water and brownies","Smoothies and cake"],a:1},{q:"How much money did they make on the hot Saturday?",opts:["Twelve dollars","Fifteen dollars","Twenty dollars","Seventeen dollars"],a:3},{q:"What did both siblings do with their share of the money?",opts:["Spent it on supplies","Gave it to their parents","Put it in their savings accounts","Bought more ingredients"],a:2}] },
    { title:"The Disappearing Lake", text:"Scientists studying a lake in our region discovered that the water level drops every summer and rises each fall. For years nobody understood why. A team of researchers finally figured out that an underground river connects the lake to a cave system beneath the mountains. During dry months, water drains slowly into the cave. Rain in autumn fills it back up. The lake had been hiding an amazing secret all along.", q:[{q:"When does the lake's water level drop?",opts:["Every winter","Every spring","Every summer","Every fall"],a:2},{q:"What connects the lake to the cave system?",opts:["A hidden tunnel","A drainage pipe","An underground river","A narrow stream"],a:2},{q:"What fills the lake back up in autumn?",opts:["Melting snow","Rain","A river","Groundwater"],a:1}] },
    { title:"Moving Away", text:"When my best friend Marcus told me his family was moving to another city, I felt like someone had punched me in the stomach. We had been friends since kindergarten. The week before he left, we did everything we loved together one last time. We rode our bikes on the trail, stayed up late playing games, and made a promise to video call every weekend. Moving apart was hard, but Marcus is still my best friend.", q:[{q:"What is the best friend's name?",opts:["Michael","Matthew","Marcus","Martin"],a:2},{q:"Since when had the two been friends?",opts:["First grade","Preschool","Second grade","Kindergarten"],a:3},{q:"What promise did they make before Marcus left?",opts:["To write letters every week","To visit each other every month","To video call every weekend","To text every day"],a:2}] },
    { title:"Night Sky Journal", text:"My teacher challenged us to keep a sky journal for one month. Every clear night I went outside with a blanket and a flashlight. I sketched the moon and the stars I could find. I learned the names of several constellations and tracked how the moon changed shape over the weeks. By the end of the month my journal had thirty pages of drawings and notes. I never knew how much was happening right above my head.", q:[{q:"Who challenged the child to keep a sky journal?",opts:["A parent","A neighbor","A librarian","The teacher"],a:3},{q:"What did the child bring outside each night?",opts:["A telescope and notebook","A blanket and flashlight","A camera and chair","A map and pencil"],a:1},{q:"How many pages did the journal have by the end of the month?",opts:["Twenty","Twenty-five","Thirty","Forty"],a:2}] },
  ],
  H: [
    { title:"Ocean Zones", text:"The ocean is divided into zones based on how deep and how much sunlight reaches each layer. The sunlit zone near the surface is home to most of the fish, sea turtles, and dolphins we know. Beneath it is the twilight zone, where creatures must make their own faint light. The midnight zone is completely dark and bitterly cold. Scientists have only explored a small fraction of these deeper waters, and new species are discovered nearly every year.", q:[{q:"What is the sunlit zone home to?",opts:["Only whales and sharks","Most fish, sea turtles, and dolphins","Deep sea creatures that glow","Creatures that make their own light"],a:1},{q:"What must creatures in the twilight zone do?",opts:["Swim very fast","Stay completely still","Make their own faint light","Eat plants on the ocean floor"],a:2},{q:"How often are new species discovered in deeper ocean waters?",opts:["Every decade","Every few years","Nearly every year","Every month"],a:2}] },
    { title:"The Map Maker", text:"In the 1500s, making an accurate map of the world was nearly impossible. Explorers returned with rough sketches and conflicting reports. A cartographer named Gerardus Mercator spent decades gathering information from sailors and scholars. He designed a new way of representing the curved surface of the Earth on a flat page. His projection was not perfect, but it allowed ships to plot straight lines across the ocean. Sailors used his maps for hundreds of years.", q:[{q:"What is the name of the cartographer described in the story?",opts:["Marco Polo","Gerardus Mercator","Ferdinand Magellan","Amerigo Vespucci"],a:1},{q:"What did Mercator design a new way of doing?",opts:["Measuring ocean depth","Tracking weather patterns","Representing Earth's curved surface on a flat page","Drawing coastlines accurately"],a:2},{q:"How long did sailors use his maps?",opts:["Decades","Hundreds of years","About fifty years","A few generations"],a:1}] },
    { title:"My Little Brother", text:"My little brother Theo was born six months ago, and our family has not been the same since. At first I thought having a baby around would be nothing but trouble. He cried at night and Mom was always tired and I had to keep my music quiet. But then something changed. One morning Theo looked right at me and smiled the biggest smile I had ever seen. It was just for me. I felt something warm and important inside my chest. I think it was love.", q:[{q:"What is the little brother's name?",opts:["Thomas","Timothy","Theo","Tyler"],a:2},{q:"How old is the baby brother?",opts:["Three months","Six months","One year","Nine months"],a:1},{q:"What made something change for the narrator?",opts:["Theo said his first word","Theo started walking","Theo looked at the narrator and smiled","Theo stopped crying at night"],a:2}] },
    { title:"Desert Rain", text:"Rain in the desert is rare, but when it comes, the effect is astonishing. Seeds that have been waiting dormant in the dry soil for years suddenly spring to life. Within forty eight hours of a good rainfall, the sand is covered in tiny green shoots. Some flowers complete their entire life cycle in just a few weeks before the ground dries out again. The desert is not a lifeless place. It is a community of organisms that have mastered the art of waiting.", q:[{q:"How long after rainfall does the sand become covered in green shoots?",opts:["Twenty-four hours","Forty-eight hours","One week","Three days"],a:1},{q:"How long do some flowers take to complete their entire life cycle?",opts:["A few days","A few months","A few weeks","One year"],a:2},{q:"What does the story say the desert is?",opts:["A lifeless wasteland","A place only animals visit","A community of organisms that have mastered waiting","A place that gets rain often"],a:2}] },
    { title:"The Debate", text:"Our class had a debate about whether homework should be abolished. I was assigned to argue in favor of keeping homework even though I personally disagreed with that position. I had to research both sides carefully. I found statistics about study habits, spoke to teachers, and read articles. On debate day I made my argument as clearly as I could. Even though the other team won, my teacher gave me top marks for preparation. I learned that understanding different points of view makes you a stronger thinker.", q:[{q:"What was the class debate about?",opts:["Whether school days should be longer","Whether homework should be abolished","Whether students should choose their own classes","Whether exams should be removed"],a:1},{q:"Which side was the narrator assigned to argue?",opts:["Against homework","For shorter school days","In favor of keeping homework","Against exams"],a:2},{q:"What did the teacher give the narrator top marks for?",opts:["Winning the debate","Speaking loudly","Preparation","Finding the most statistics"],a:2}] },
  ],
  I: [
    { title:"The Internet Before the Internet", text:"Long before the Internet existed, a network of scholars across Europe exchanged letters and ideas through what was called the Republic of Letters. Scientists and philosophers would write to each other for months or years, sharing discoveries, questioning each other's theories, and building on each other's work. A single letter could take weeks to arrive. Despite the slowness, this network produced some of the most important scientific breakthroughs of the 1600s and 1700s. It shows that the human desire to share knowledge is ancient and unstoppable.", q:[{q:"What was the network of letter-writing scholars called?",opts:["The Academy of Sciences","The Republic of Letters","The Scholar's Circle","The European Exchange"],a:1},{q:"How long could a single letter take to arrive?",opts:["A few days","Several months","Weeks","Over a year"],a:2},{q:"In which centuries did this network produce important breakthroughs?",opts:["The 1400s and 1500s","The 1500s and 1600s","The 1600s and 1700s","The 1700s and 1800s"],a:2}] },
    { title:"My Grandmother's Hands", text:"My grandmother's hands have always told the story of her life. They are small and brown and marked with the lines of decades of work. She grew up on a farm and learned to sew, cook, and garden before she was ten years old. When she came to this country as a young woman, those same capable hands helped her build a new life. Now she uses them to braid my hair, roll dough, and hold my face when she wants me to listen carefully.", q:[{q:"What did the grandmother learn to do before she was ten years old?",opts:["Read, write, and paint","Sew, cook, and garden","Cook, fish, and hunt","Sew, knit, and weave"],a:1},{q:"When did the grandmother come to the new country?",opts:["As a child","As a teenager","As a young woman","As an older woman"],a:2},{q:"What does the grandmother use her hands for now?",opts:["Farming and sewing","Cooking and cleaning","Braiding hair, rolling dough, and holding the narrator's face","Writing letters and teaching"],a:2}] },
    { title:"Wildfires and Renewal", text:"Although wildfires are terrifying and destructive, ecologists have long understood that fire is a natural and necessary part of many ecosystems. In forests of lodgepole pine, the cones are sealed shut with a waxy resin that only melts at high temperatures. A fire actually releases the seeds, allowing new trees to grow in the cleared and nutrient rich soil. Some species of birds prefer the open habitat created in the years following a fire. Nature, it turns out, has been adapting to fire for millions of years.", q:[{q:"What seals the cones of lodgepole pine trees shut?",opts:["Thick bark","A waxy resin","Dried sap","Hardened soil"],a:1},{q:"What does a fire do for lodgepole pine seeds?",opts:["Burns them away","Buries them deeper","Releases them","Carries them to new forests"],a:2},{q:"What do some species of birds prefer after a fire?",opts:["Dense old forest","Areas near water","The open habitat created by the fire","Tall treetops"],a:2}] },
    { title:"Learning Chess", text:"When I was in fourth grade, my uncle taught me how to play chess. I was frustrated at first because there were so many rules and my uncle beat me every single time without even trying hard. But something about the game captured my imagination. I started reading books about strategy and watching videos of grandmaster matches. Gradually I improved. By the end of the school year I entered a local tournament and finished in third place. Losing many games had been the best teacher I ever had.", q:[{q:"Who taught the narrator to play chess?",opts:["A teacher","A friend","A grandfather","An uncle"],a:3},{q:"What did the narrator do to improve at chess?",opts:["Practiced alone every day","Read books about strategy and watched videos of grandmaster matches","Asked their uncle for daily lessons","Joined a school chess club"],a:1},{q:"Where did the narrator finish in the local tournament?",opts:["First place","Second place","Third place","Fourth place"],a:2}] },
    { title:"The Translator", text:"My mother works as a medical interpreter. She helps patients who do not speak English communicate with their doctors. It is a job that demands enormous skill and absolute accuracy. When someone describes pain or fear in one language, she must find precisely the right words in another language instantly. She often says that a misunderstood word in a hospital can change a person's life. Watching her work has made me think carefully about the power of language and how much we depend on being truly understood.", q:[{q:"What is the narrator's mother's job?",opts:["A nurse","A doctor","A medical interpreter","A hospital administrator"],a:2},{q:"What does the mother say a misunderstood word in a hospital can do?",opts:["Cause minor confusion","Slow down treatment","Change a person's life","Create extra paperwork"],a:2},{q:"What has watching her mother work made the narrator think about?",opts:["Becoming a doctor","The power of language","Learning new languages","Working in a hospital"],a:1}] },
  ],
  J: [
    { title:"The Rosetta Stone", text:"For over a thousand years, the ancient Egyptian writing system known as hieroglyphics remained a complete mystery. Scholars could see the symbols carved on monuments and papyrus scrolls, but no one alive could read them. Then in 1799, soldiers in Napoleon's army discovered a large black stone near the town of Rosetta in Egypt. The stone was inscribed with the same message written in three different scripts: hieroglyphics, a simpler Egyptian script, and ancient Greek. Because scholars could already read Greek, they finally had a key to unlock the ancient language. It took twenty three more years of painstaking work, but in 1822 a French linguist named Jean François Champollion cracked the code completely.", q:[{q:"What color was the Rosetta Stone?",opts:["Grey","White","Brown","Black"],a:3},{q:"How many different scripts were on the Rosetta Stone?",opts:["Two","Three","Four","Five"],a:1},{q:"In what year did Champollion fully crack the hieroglyphic code?",opts:["1799","1808","1815","1822"],a:3}] },
    { title:"Why We Dream", text:"Every night during sleep, the human brain cycles through several stages, including a phase called REM sleep during which the eyes move rapidly and the most vivid dreams occur. Scientists have proposed many theories about why we dream. Some believe dreams help the brain process difficult emotions. Others think dreaming allows the mind to consolidate memories from the day. Certain researchers suggest that dreams are simply a byproduct of the brain organizing and pruning neural connections during sleep. Despite decades of research, no single explanation has been proven. Dreams remain one of the genuinely unsolved puzzles of neuroscience.", q:[{q:"During which sleep phase do the most vivid dreams occur?",opts:["Deep sleep","Delta sleep","REM sleep","Light sleep"],a:2},{q:"What do some scientists believe dreams help the brain do?",opts:["Grow new neurons","Process difficult emotions","Speed up learning","Rest completely"],a:1},{q:"What does the story say about dreams at the end?",opts:["They are fully understood","They are caused by memories","They are one of neuroscience's unsolved puzzles","They only happen in REM sleep"],a:2}] },
    { title:"The River Between Us", text:"The summer I was eleven, a drought lowered the river behind our house until you could almost walk across it. That was the summer I met a girl named Yara who lived on the opposite bank. She would stand in the shallows on her side and I would stand in the shallows on mine, and we would shout across the water. Over weeks of shouting we told each other everything — our families, our fears, our favourite books. When autumn rains finally filled the river again, we could no longer hear each other. I still think about Yara and wonder if she remembers our summer of talking across the water.", q:[{q:"How old was the narrator the summer they met Yara?",opts:["Nine","Ten","Eleven","Twelve"],a:2},{q:"Where did Yara live?",opts:["Down the road","On the opposite bank of the river","In the next town","Across a field"],a:1},{q:"What caused the narrator and Yara to no longer hear each other?",opts:["They moved away","The drought ended and autumn rains filled the river","It became too cold to stand outside","They ran out of things to say"],a:1}] },
    { title:"Caves of Altamira", text:"In 1879, a Spanish amateur archaeologist named Marcelino Sanz de Sautuola was exploring a cave in northern Spain when his young daughter María noticed something extraordinary on the ceiling above her. Painted in red and black ochre were dozens of bison, horses, and deer rendered with startling life and skill. Sautuola believed the paintings were made by prehistoric people. The scientific community initially ridiculed his claim, insisting that Stone Age humans were too primitive to create art of such quality. It took more than twenty years and the discovery of similar paintings elsewhere before scholars accepted that our ancestors had been sophisticated artists for at least thirty five thousand years.", q:[{q:"Who first noticed the cave paintings?",opts:["Marcelino himself","A fellow archaeologist","His young daughter María","A local guide"],a:2},{q:"What colors were the cave paintings made in?",opts:["Blue and white","Brown and yellow","Red and black","Orange and grey"],a:2},{q:"How long did it take before scholars accepted the paintings were prehistoric?",opts:["Five years","Ten years","More than twenty years","About fifty years"],a:2}] },
    { title:"A Language Called Home", text:"When my family moved from Seoul to our new city, I was eight years old and spoke almost no English. School was terrifying. I understood nothing the teachers said and sat through each lesson feeling invisible. My one refuge was mathematics, because numbers did not require translation. Over months my English improved. But something unexpected also happened: I became fluent in a third language, the language of navigating between two cultures. I learned when to bow and when to shake hands, when to speak up and when to listen. My parents call it adaptability. I call it survival.", q:[{q:"How old was the narrator when the family moved?",opts:["Six","Seven","Eight","Nine"],a:2},{q:"What was the narrator's one refuge at school?",opts:["Art class","Lunch break","Physical education","Mathematics"],a:3},{q:"What do the narrator's parents call the skill of navigating between two cultures?",opts:["Survival","Intelligence","Adaptability","Resilience"],a:2}] },
  ],
  K: [
    { title:"The Invention of Writing", text:"Approximately five thousand years ago in ancient Mesopotamia, the people known as the Sumerians developed one of the world's first writing systems. It began not as poetry or storytelling but as accounting. Merchants needed a reliable way to record how many sheep or jars of grain had been traded. The earliest symbols were simple pictures pressed into soft clay tablets with a sharpened reed. Over centuries, these pictures became more abstract until they resembled the wedge shaped marks we call cuneiform. Writing transformed human civilization by allowing ideas, laws, and history to outlast any individual human memory.", q:[{q:"Who developed one of the world's first writing systems?",opts:["The Egyptians","The Babylonians","The Sumerians","The Persians"],a:2},{q:"What was writing first used for?",opts:["Poetry","Storytelling","Religion","Accounting"],a:3},{q:"What were the earliest writing symbols pressed into?",opts:["Stone tablets","Papyrus scrolls","Soft clay tablets","Wooden boards"],a:2}] },
    { title:"Marathon", text:"In 490 BCE, a vastly outnumbered Athenian army defeated a Persian invasion force on the plain of Marathon. According to legend, a messenger named Pheidippides ran the roughly twenty six miles to Athens to announce the victory before collapsing and dying of exhaustion. Historians debate whether this story is entirely accurate, but it inspired the modern marathon race, which was introduced at the first modern Olympic Games in 1896. The original distance was measured from the town of Marathon to Athens, establishing the length we still run today.", q:[{q:"In what year did the Battle of Marathon take place?",opts:["490 BCE","480 BCE","500 BCE","470 BCE"],a:0},{q:"What is the legendary messenger's name?",opts:["Leonidas","Pheidippides","Themistocles","Herodotus"],a:1},{q:"In what year was the modern marathon introduced at the Olympic Games?",opts:["1888","1892","1896","1900"],a:2}] },
    { title:"My Father's Garden", text:"My father grew up in a small village in Mexico where his family grew corn, squash, and chili peppers in the same way their ancestors had for generations. When we moved to our apartment in the city, he brought seeds with him. Our balcony became a miniature farm. He taught me that plants in Mexico and plants in Canada need different amounts of water and light, and that you must listen to the plant, not just follow instructions. I learned that knowledge about the natural world is not stored only in books. It is stored in people, and it can travel wherever people travel.", q:[{q:"What crops did the father's family grow in Mexico?",opts:["Tomatoes, beans, and peppers","Corn, squash, and chili peppers","Rice, corn, and squash","Beans, peppers, and herbs"],a:1},{q:"What did the father bring with him when the family moved to the city?",opts:["Tools","Seeds","Soil","Books"],a:1},{q:"Where did the father create a miniature farm?",opts:["In a community garden","In the backyard","On the balcony","In a rented plot"],a:2}] },
    { title:"The Great Barrier Reef", text:"Stretching more than two thousand three hundred kilometres along the northeastern coast of Australia, the Great Barrier Reef is the largest living structure on Earth. It is composed of nearly three thousand individual reef systems and is home to an extraordinary diversity of life, including fifteen hundred species of fish, four thousand species of mollusk, and dozens of species of shark and marine mammal. Coral reefs are built by tiny animals called polyps that secrete calcium carbonate skeletons. Rising ocean temperatures caused by climate change are bleaching and killing coral at an alarming rate.", q:[{q:"How long is the Great Barrier Reef?",opts:["More than one thousand kilometres","More than fifteen hundred kilometres","More than two thousand three hundred kilometres","More than three thousand kilometres"],a:2},{q:"What tiny animals build coral reefs?",opts:["Krill","Plankton","Polyps","Larvae"],a:2},{q:"What is causing coral bleaching and death?",opts:["Overfishing","Pollution from ships","Rising ocean temperatures caused by climate change","Invasive species"],a:2}] },
    { title:"First Flight", text:"On December 17, 1903, on a cold and windy beach in Kitty Hawk, North Carolina, Orville and Wilbur Wright made the first successful powered aircraft flight in history. The plane flew for twelve seconds and covered thirty seven metres. To put that distance in perspective, a modern commercial airplane is longer than the entire distance of that first flight. The Wright brothers were self taught engineers who ran a bicycle shop. They had no university degrees and no government funding. They succeeded through systematic experimentation, careful observation, and an extraordinary willingness to fail, learn, and try again.", q:[{q:"On what date did the first successful powered flight take place?",opts:["December 14, 1903","December 17, 1903","January 17, 1903","December 17, 1905"],a:1},{q:"How long did the first flight last?",opts:["Eight seconds","Ten seconds","Twelve seconds","Fifteen seconds"],a:2},{q:"What kind of shop did the Wright brothers run?",opts:["A hardware shop","A printing shop","An engine shop","A bicycle shop"],a:3}] },
  ],
  L: [
    { title:"The Language of Whales", text:"Humpback whales produce complex sequences of sounds that researchers call songs. These songs can last for hours and travel hundreds of kilometres through the ocean. What makes humpback communication particularly remarkable is that the songs change over time. A new phrase will appear in one whale's song, and within months, whales across entire ocean basins have adopted it. Scientists do not yet fully understand what the songs communicate. Some researchers believe they play a role in mating, while others think they may serve social functions we have not yet identified.", q:[{q:"What do researchers call the complex sounds humpback whales produce?",opts:["Calls","Songs","Signals","Patterns"],a:1},{q:"How far can whale songs travel through the ocean?",opts:["Tens of kilometres","Dozens of kilometres","Hundreds of kilometres","Thousands of kilometres"],a:2},{q:"What do some researchers believe the songs play a role in?",opts:["Navigation","Hunting","Warning others of danger","Mating"],a:3}] },
    { title:"The Silk Road", text:"The Silk Road was not a single road but a vast network of trade routes connecting China to the Mediterranean world for more than a thousand years. Merchants traveled portions of the route carrying silk, spices, glassware, precious metals, and ideas. Buddhism spread from India to China along these paths. Papermaking techniques traveled westward from China to the Islamic world and eventually to Europe. The bubonic plague that devastated fourteenth century Europe may have traveled the Silk Road as well.", q:[{q:"What did the Silk Road connect?",opts:["Rome and Persia","China and the Mediterranean world","India and Egypt","Arabia and Europe"],a:1},{q:"What spread from India to China along the Silk Road?",opts:["Islam","Christianity","Buddhism","Hinduism"],a:2},{q:"What did papermaking techniques travel from China to?",opts:["The Roman Empire","The African continent","The Islamic world and eventually Europe","Persia and Arabia"],a:2}] },
    { title:"Becoming a Surgeon", text:"My cousin Fatima decided she wanted to become a surgeon when she was twelve years old. Everyone thought it was a phase. Fatima was not phased. She studied ferociously through secondary school, earned top marks in university science courses, applied to medical school three times before being accepted, and spent five brutal years completing her residency. Last year she performed her first solo surgery. When I asked her what kept her going through years of doubt and exhaustion, she said simply: 'I kept imagining the day I would save someone's life.'", q:[{q:"How old was Fatima when she decided to become a surgeon?",opts:["Ten","Eleven","Twelve","Thirteen"],a:2},{q:"How many times did Fatima apply to medical school before being accepted?",opts:["Once","Twice","Three times","Four times"],a:2},{q:"What did Fatima say kept her going through years of doubt and exhaustion?",opts:["The support of her family","Imagining the day she would save someone's life","Her love of science","Her determination to prove others wrong"],a:1}] },
    { title:"How Memory Works", text:"Human memory is not a recording. It is a reconstruction. Each time you remember an event, your brain reassembles it from stored fragments, filling in gaps with assumptions and details drawn from other experiences. This means that memories can shift subtly each time they are recalled. Research by psychologist Elizabeth Loftus demonstrated that people can be led to believe, with complete confidence, that they remember events that never occurred. The implications of this discovery for courtroom eyewitness testimony were dramatic and have led to significant reforms in how witness evidence is treated by legal systems around the world.", q:[{q:"According to the story, what is human memory?",opts:["A perfect recording","A video playback","A reconstruction","A collection of facts"],a:2},{q:"Which psychologist's research is mentioned in the story?",opts:["Sigmund Freud","Elizabeth Loftus","Carl Jung","Jean Piaget"],a:1},{q:"What did Loftus demonstrate people could be led to believe?",opts:["That they had forgotten real events","That their memories were always accurate","That they remembered events that never occurred","That memory improves with age"],a:2}] },
    { title:"The Cold Mountain", text:"When a team of climbers set out to summit a remote peak in the Himalayas, they expected the usual dangers: altitude sickness, treacherous weather, frostbite. What they did not expect was getting pinned in their tents for six straight days by a blizzard. They were forced to ration their food, take turns sleeping to monitor each other for signs of hypothermia, and remain calm when the wind threatened to tear the tent from the snow. On the seventh morning the storm lifted. They reached the summit two days later.", q:[{q:"How many days were the climbers pinned in their tents by the blizzard?",opts:["Four","Five","Six","Seven"],a:2},{q:"What did the climbers take turns doing while sleeping?",opts:["Keeping watch for avalanches","Monitoring each other for signs of hypothermia","Cooking food over a small stove","Checking weather reports"],a:1},{q:"When did the climbers reach the summit?",opts:["The day the storm lifted","One day after the storm lifted","Two days after the storm lifted","Three days after the storm lifted"],a:2}] },
  ],
  M: [
    { title:"The Mathematics of Music", text:"The connection between mathematics and music is ancient and deep. The philosopher Pythagoras noticed that strings with simple ratio lengths, such as two to one or three to two, produced intervals that sounded harmonious together. This was one of the first observations in history that the natural world operates according to mathematical principles. Modern music theory is built on these ratios. When you hear a chord that sounds beautiful or a dissonance that creates tension, you are hearing the physics of vibrating air expressed as emotion.", q:[{q:"Who noticed that simple string ratios produced harmonious intervals?",opts:["Aristotle","Euclid","Pythagoras","Plato"],a:2},{q:"What is modern music theory built on?",opts:["The speed of sound","Pythagoras's ratios","The vibration of air","Mathematical equations invented later"],a:1},{q:"According to the story, what are you hearing when you hear a beautiful chord?",opts:["Random vibrations","The history of mathematics","The physics of vibrating air expressed as emotion","Ancient Greek philosophy"],a:2}] },
    { title:"A City Made of Salt", text:"In the Bolivian highlands at an altitude of nearly four thousand metres, the Salar de Uyuni is the world's largest salt flat, stretching across ten thousand square kilometres. During the dry season it is a blinding white plain where the horizon seems to disappear. When a thin layer of water covers its surface during the rainy season, the flat becomes the world's largest natural mirror, perfectly reflecting the sky above. The salt beneath the surface may contain more than half of the world's known lithium reserves.", q:[{q:"Where is the Salar de Uyuni located?",opts:["The Peruvian highlands","The Chilean desert","The Bolivian highlands","The Argentine pampas"],a:2},{q:"What does the salt flat become during the rainy season?",opts:["A shallow lake","The world's largest natural mirror","A flooded plain","A wetland habitat"],a:1},{q:"What mineral may the salt beneath the surface contain more than half of the world's known reserves of?",opts:["Salt","Sodium","Lithium","Magnesium"],a:2}] },
    { title:"Letters to the Future", text:"In 1939, the New York World's Fair buried a time capsule designed to be opened in five thousand years. Inside were items chosen to represent twentieth century civilization to people living in the year 6939: a woman's hat, a pack of cigarettes, seeds of food plants, a dollar bill, a Bible, and a spool of microfilm containing thousands of pages of text. The committee that chose the contents debated intensely about what their era's most important achievements were.", q:[{q:"In what year was the time capsule buried?",opts:["1929","1935","1939","1945"],a:2},{q:"When is the time capsule designed to be opened?",opts:["In one hundred years","In one thousand years","In five thousand years","In ten thousand years"],a:2},{q:"Which of these items was inside the time capsule?",opts:["A telephone","A newspaper","A photograph","A dollar bill"],a:3}] },
    { title:"The Polio Vaccine", text:"In the early twentieth century, polio was one of the most feared diseases in the world. It struck without warning, often leaving children paralyzed or dead. In the summer of 1952 alone, nearly fifty eight thousand cases were reported in the United States. Jonas Salk, a physician and researcher, led a team that worked for years to develop a vaccine. When trials confirmed it was safe and effective in 1955, the announcement was greeted with celebrations in cities across the country. Salk chose not to patent the vaccine, forgoing a personal fortune because he believed the treatment belonged to the world.", q:[{q:"How many polio cases were reported in the United States in the summer of 1952?",opts:["Nearly thirty thousand","Nearly forty five thousand","Nearly fifty eight thousand","Nearly seventy thousand"],a:2},{q:"In what year were vaccine trials confirmed as safe and effective?",opts:["1952","1953","1955","1957"],a:2},{q:"Why did Salk choose not to patent the vaccine?",opts:["He was told not to by the government","He believed the treatment belonged to the world","He did not think it would be profitable","He wanted other scientists to improve it"],a:1}] },
    { title:"My Grandmother Sang", text:"My grandmother grew up during a time when her people were not allowed to speak their own language in the schools or government buildings of the country that had absorbed their homeland. The language retreated into kitchens, into songs sung quietly at night, into prayers whispered before sleep. My grandmother kept it alive that way, syllable by syllable, song by song. She taught it to my mother, who taught fragments of it to me. When I speak it now, even imperfectly, I feel the presence of everyone who refused to let it die.", q:[{q:"Where was the grandmother's language forced to retreat to?",opts:["Into written books","Into churches and temples","Into kitchens, songs, and prayers","Into schools in other regions"],a:2},{q:"Who did the grandmother teach the language to?",opts:["Her neighbors","Her friends","The narrator directly","The narrator's mother"],a:3},{q:"How does the narrator feel when speaking the language now?",opts:["Embarrassed by imperfection","The presence of everyone who refused to let it die","Proud of speaking it perfectly","Grateful to their grandmother only"],a:1}] },
  ],
  N: [
    { title:"The Periodic Table", text:"In 1869, the Russian chemist Dmitri Mendeleev arranged the sixty three known chemical elements in a table organized by atomic weight and recurring properties. What made his table remarkable was not just how it ordered existing knowledge, but how confidently it predicted gaps where elements not yet discovered should exist. Mendeleev described the properties of these missing elements in detail before anyone had found them. Within fifteen years, three of his predicted elements had been discovered, matching his descriptions almost perfectly. The periodic table remains one of science's most elegant achievements: a framework that brings order to the invisible architecture of everything in the universe." },
    { title:"The Midnight Library", text:"There was a library in our town that opened only on weekend evenings. My mother called it the midnight library, though it actually closed at ten. We would go there on Friday nights, my mother and I, and move slowly through the shelves while the rest of the world slept or watched television. The librarians knew us by name. They would save books they thought we would enjoy. My mother and I read the same novels separately and then discussed them over dinner all the following week. That library closed years ago. I still consider it the most important place of my childhood." },
    { title:"How Earthquakes Work", text:"The surface of the Earth is divided into enormous pieces called tectonic plates that move very slowly, typically a few centimetres per year. Where these plates meet, they slide past each other, collide, or pull apart. When pressure that has been building along a fault line is suddenly released, the ground shakes. The point below the surface where the rupture begins is called the focus. The point on the surface directly above it is the epicenter. The energy radiates outward as seismic waves that shake the ground for hundreds of kilometres. Seismologists measure earthquake magnitude on the Richter scale, where each point represents a tenfold increase in ground motion amplitude." },
    { title:"Running the Country Road", text:"Every morning before school for three years, I ran the same five kilometre loop along the country road outside our house. In winter I ran in darkness, my breath fogging in the cold air. In spring I watched the fields transform from frozen mud to green. I ran on the day my grandfather died. I ran on the day I received my acceptance letter. The road did not care about any of it, which was exactly why I needed it. There is a kind of thinking that can only happen when your body is moving rhythmically through familiar space and your mind is left to sort itself out." },
    { title:"What Coins Reveal", text:"Ancient coins are among archaeologists' most valuable sources of historical information. A coin's design typically includes the image of a ruler, a deity, or a symbol of the issuing city, along with an inscription. From these details, scholars can determine when and where a coin was made, who held political power at the time, and what values the society wanted to project. The distribution patterns of coins found across excavation sites reveal trade routes, migration patterns, and the extent of ancient empires. A small disc of bronze or silver, no larger than your thumb, can contain an entire chapter of human history." },
  ],
  O: [
    { title:"The Arctic Tern", text:"The Arctic tern holds the record for the longest annual migration of any animal on Earth. Each year these small seabirds travel from their breeding grounds in the Arctic to the Antarctic and back again, a round trip of approximately seventy thousand kilometres. In a lifetime of roughly thirty years, a single Arctic tern may travel the equivalent of three trips to the moon and back. Researchers tracking the birds discovered that they do not travel in straight lines but follow curved paths that take advantage of prevailing wind systems, effectively surfing the atmosphere across hemispheres." },
    { title:"The Printing Press", text:"When Johannes Gutenberg developed his movable type printing press around 1440, he likely did not anticipate that he was setting off one of the most consequential revolutions in human history. Before the press, books were copied by hand, a process so slow and expensive that most people never owned a book in their lives. Within fifty years of Gutenberg's invention, an estimated twenty million books were in circulation across Europe. Literacy rates began to climb. Scientific ideas that might once have remained confined to a single monastery or university now traveled rapidly across the continent." },
    { title:"Night Shift", text:"My mother worked the night shift at the hospital for ten years. She would leave our apartment at ten in the evening and return just as my brother and I were waking up for school. She would sit at the kitchen table in her scrubs, still smelling of antiseptic, and eat cereal while we ate toast, and we would all talk for half an hour before she went to sleep. When I was older, I understood what those half hours cost her. She was running on no sleep, but she sat with us anyway, every single morning." },
    { title:"Mapping the Brain", text:"The human brain contains approximately eighty six billion neurons, each connected to thousands of others through synaptic connections that number in the hundreds of trillions. Neuroscientists have spent decades attempting to map these connections, a project called the connectome. The complete connectome of a tiny roundworm with just three hundred and two neurons was first mapped in 1986 and required more than a decade of work. The idea of mapping all the connections in a human brain is almost incomprehensibly ambitious. Yet researchers continue to make progress, driven by the belief that understanding how the brain is wired is the first step toward understanding consciousness, memory, and mental illness." },
    { title:"The Cartographer's Daughter", text:"My great great grandmother was a cartographer's daughter in nineteenth century Vienna. Her father made maps of far places he had never visited, working from the accounts of explorers and missionaries and merchants. She told her children that she grew up reading the world in symbols: the lines that meant mountains, the blue that meant rivers, the stippling that meant desert. When she eventually emigrated, she carried a rolled map of her destination inside her coat. She said she found it comforting, that feeling of knowing the shape of the place you are going toward, even when everything else is uncertain." },
  ],
  P: [
    { title:"The Bystander Effect", text:"In 1964, a woman named Kitty Genovese was attacked outside her apartment building in New York City. Newspaper reports at the time claimed that thirty eight neighbors had witnessed the attack but not one had called for help. This case prompted psychologists John Darley and Bibb Latané to conduct a series of experiments exploring why people sometimes fail to act in emergencies when others are present. They found that the more bystanders there are, the less likely any individual is to help, a phenomenon they called diffusion of responsibility. Each person assumes someone else will act." },
    { title:"The Understudy", text:"I had been rehearsing the role of understudy for the school play for six weeks when the lead actor broke his wrist three days before opening night. The director looked at me with an expression that contained apology and expectation in equal measure. I barely slept for the next three nights. I walked through our apartment rehearsing lines under my breath. I stood in front of the mirror working on gestures. On opening night, I stood in the wings listening to the audience settling into their seats and felt something shift inside me. It was not confidence exactly. It was readiness." },
    { title:"What Darwin Saw", text:"When Charles Darwin arrived in the Galápagos Islands in 1835 aboard the research vessel HMS Beagle, he was a young naturalist with conventional religious views about the origin of species. What he found on those remote volcanic islands gradually forced him to reconsider everything. The finches, the tortoises, the mockingbirds — all varied from island to island in ways that suggested they had adapted to local conditions over long periods of time. Darwin spent more than twenty years refining his observations and theory before publishing On the Origin of Species in 1859." },
    { title:"Refugee Summer", text:"The summer my family arrived at the resettlement centre, my mother had three hundred dollars, two suitcases, and a folder of documents she carried everywhere. We had left most of what we owned in a rented room we had lived in for eleven months while waiting. I was fourteen, old enough to understand what had been lost and what we were attempting. The volunteers at the centre were kind. A woman named Patricia had been helping refugee families resettle for fifteen years. She showed us where the food bank was and helped us navigate the registration systems." },
    { title:"Tectonic Civilizations", text:"The historian Felipe Fernández Armesto has argued that geography is destiny, that the physical features of a landscape profoundly shape the civilizations that develop within it. River valleys with annual flooding and rich silt deposits tend to produce agricultural surpluses that allow cities to grow. Mountain ranges create barriers that can either isolate cultures or funnel trade through predictable passes. Island nations develop naval technologies out of necessity. These geographic determinants do not override human agency or creativity, but they create conditions within which societies must operate." },
  ],
  Q: [
    { title:"The Language of Numbers", text:"Numerical cognition, the ability to understand and manipulate quantities, appears to be built into the human brain. Infants as young as five months old show surprise when one object plus one object produces a result other than two objects, suggesting that basic arithmetic is grasped before language is acquired. Yet cultural and linguistic factors profoundly shape how mathematical thinking develops. Languages that have simple, regular number words, such as Chinese, appear to give children an advantage in learning arithmetic. Some languages have words for only 'one,' 'two,' and 'many.' The speakers of these languages can still reason about quantity, but they do so differently." },
    { title:"The Siege of Leningrad", text:"From September 1941 to January 1944, the city of Leningrad in the Soviet Union was surrounded and besieged by German forces for eight hundred and seventy two days. More than a million civilians died, most from starvation and cold. During the worst winter, the daily bread ration fell to one hundred and twenty five grams per person. Yet the city's cultural life continued. An orchestra performed Shostakovich's Seventh Symphony, composed during the siege, in the besieged city's concert hall. The composer dedicated the work to the city's struggle." },
    { title:"Building the Argument", text:"The summer before I applied to university, I spent three months studying formal argumentation with a retired debate coach who lived three blocks from my house. She taught me that an argument is not a fight. It is a structure. Every claim requires evidence. Every piece of evidence requires a source. Every conclusion must follow logically from its premises. She made me rebuild every paper I had ever written. She showed me how many of my most confident assertions dissolved the moment I tried to support them properly. By September I had produced one rigorously argued essay on a topic I had chosen myself." },
    { title:"The Speed of Stars", text:"When you look at the night sky and see a star, you are not seeing the star as it exists now. You are seeing light that left the star years, decades, centuries, or even millions of years ago, depending on the star's distance. The nearest star to our sun, Proxima Centauri, is so far away that its light takes four point two years to reach us. The stars in the Andromeda Galaxy, visible to the naked eye on a clear night, are so distant that the light reaching your eyes left them over two million years ago. Astronomy is, among other things, a form of time travel." },
    { title:"Three Winters", text:"My family spent three consecutive winters in a cabin without electricity in northern Quebec because my father was writing his doctoral thesis and believed he needed complete quiet and complete cold. We had oil lamps and a woodstove and a radio that picked up two stations. My mother heated water for washing. My sister and I did our schoolwork at the kitchen table and skated on the frozen river behind the property when the lessons were done. I resented it intensely at the time. But those three winters gave me something I cannot name precisely: a knowledge that I can do without things I thought I needed." },
  ],
  R: [
    { title:"Systemic Change", text:"The sociologist C. Wright Mills distinguished between 'personal troubles' and 'public issues.' When one person loses their job, that is a personal trouble. When millions lose their jobs simultaneously, it becomes a public issue requiring structural analysis. Mills argued that the capacity to see this connection, to understand how private experience is shaped by social forces, is the most valuable intellectual tool a citizen can possess. He called this the sociological imagination. It does not diminish individual responsibility or agency, but it insists on placing personal life within a larger framework of history, institutions, and power." },
    { title:"The Negotiator", text:"My aunt spent twenty years as a hostage negotiator for an international humanitarian organization. She was deployed to four continents and participated in over eighty negotiations. I once asked her what the most important thing she had learned was. She thought for a long time. Then she said: people who do terrible things are almost always convinced they have no other choice. The negotiator's job is to create the perception of a choice, to make visible an exit that the other person cannot see. She said the work had made her deeply uncomfortable with simple moral categories of good and evil." },
    { title:"The Fermentation of Ideas", text:"The historian of science Steven Shapin has written about the coffee houses of seventeenth century London as one of the most important institutions in the development of modern science. These public spaces, open to anyone who could pay for a cup, became informal exchanges where merchants, scholars, craftsmen, and gentlemen met to argue about the news, discuss experiments, and share the contents of recently arrived letters from correspondents across Europe. The Royal Society, founded in 1660, grew directly out of meetings that had taken place in coffee houses." },
    { title:"A Map of Scars", text:"At seventeen I had a surgery that left a long scar running along my left side. I was self conscious about it for years. I wore certain clothes, avoided certain situations, carried it as a kind of secret. Then in my twenties I met an older woman who had a very visible scar across her face from a car accident in her youth. I asked her how she had come to accept it. She said she had simply decided to stop apologizing for her own survival. The scar, she told me, was a record, not a flaw. It documented something she had been through and come out the other side of." },
    { title:"The Weight of a Library", text:"When the scholar Jorge Luis Borges was appointed director of the Argentine National Library in 1955, he was also going blind. He later wrote that God had given him eight hundred thousand books and darkness simultaneously. Borges spent the remaining years of his sight reading everything he could, building in his memory a library he could access without eyes. His stories and essays are saturated with the knowledge accumulated in those years. They are also saturated with a particular awareness of limitation, of the gap between what can be known and what any single mind can hold." },
  ],
  S: [
    { title:"Convergent Evolution", text:"Convergent evolution is the phenomenon by which unrelated species independently develop similar traits in response to similar environmental pressures. The eye, for example, evolved independently in vertebrates and cephalopods, yet both arrived at remarkably similar optical structures. Dolphins and sharks share a streamlined body shape despite one being a mammal and the other a fish. The marsupial wolf of Australia, now extinct, was strikingly similar in form and likely behavior to the placental wolves of other continents, despite having been separated for millions of years. Evolution does not follow a single path, but it keeps arriving at some of the same solutions." },
    { title:"The Promise of Infrastructure", text:"The historian Tony Judt argued that the gradual dismantling of public infrastructure, transit systems, libraries, parks, and schools, amounts to an erosion of the shared spaces through which strangers become fellow citizens. When public life is relegated to private substitutes, those who can afford the substitutes withdraw from common experience. The infrastructure that remains, underfunded and deteriorating, is used only by those who have no alternatives. The result is not merely inconvenience but the fragmentation of a society's capacity to experience itself as a community." },
    { title:"Fieldwork", text:"When I arrived at my field site in the highlands of Ethiopia for my doctoral research, I had three suitcases, a research design I had spent two years developing, and a set of assumptions about the community I intended to study that turned out to be almost entirely wrong. The first month was a process of methodical humiliation. Every interview I conducted revealed gaps in my understanding. Every observation I made had to be revised in light of context I had not known to look for. A colleague who had worked in the region for a decade told me this was normal, that the most important thing fieldwork teaches researchers is what their questions have left out." },
    { title:"The Pianist's Hands", text:"The concert pianist asked me, during a conversation I conducted for a music magazine, whether I had ever considered how much trust is involved in playing from memory before an audience. She explained. When you perform from memory, she said, you are trusting your body to know something your conscious mind cannot hold. You have practiced the piece so many thousands of times that it has moved below awareness, into muscle and reflex. If you try to think your way through a performance, you will almost certainly fail. What I do on stage, she said, is mostly listening. Listening to what my hands already know." },
    { title:"Civil Disobedience", text:"Henry David Thoreau spent one night in jail in 1846 for refusing to pay a tax he considered unjust, and from that experience produced one of the most influential political essays in American history. Thoreau argued that individuals have a moral obligation to refuse to cooperate with unjust laws, even at personal cost. The essay was read by Mahatma Gandhi, who developed from it a philosophy of nonviolent resistance that proved capable of challenging an empire. Gandhi's methods were later studied and adapted by Martin Luther King Jr. and the American civil rights movement." },
  ],
  T: [
    { title:"The Ship of Theseus", text:"The Ship of Theseus is one of philosophy's oldest thought experiments. According to Greek legend, the ship that carried the hero Theseus was preserved in Athens for centuries as a monument. As its planks rotted, they were replaced one by one with new wood. Eventually every original plank had been replaced. The question the Athenians debated was: is it still the same ship? Philosophers have extended the puzzle in various ways. Suppose someone had collected all the original planks and reassembled them. Which would be the real Ship of Theseus? The paradox remains genuinely unresolved and has implications for questions about personal identity, the continuity of nations, and the nature of cultural heritage." },
    { title:"Invisible Architectures", text:"Anthropologists who study urban environments have noted that cities contain two kinds of structure. The first is visible: the buildings, streets, parks, and infrastructure that can be seen and measured. The second is invisible: the unwritten conventions, social hierarchies, and shared assumptions that govern how people move through and use those physical spaces. These invisible architectures are often more powerful than the visible ones. Zoning laws can desegregate a neighborhood on paper while unwritten social rules maintain its character unchanged for generations." },
    { title:"The Archive", text:"For six months I worked as a volunteer in a regional historical archive, cataloguing letters and photographs donated by local families. Most of the material would interest no one but a specialist. But occasionally I would open a folder and find something that stopped me completely: a photograph of a street that had been demolished, with people in it who had no idea they were about to be historical; a letter written in 1943 by a young soldier to his mother, matter of fact and homesick; a child's drawing pinned to a page by someone who had thought it worth keeping." },
    { title:"Measuring Inequality", text:"Economists use a statistic called the Gini coefficient to measure income inequality within a country. A Gini coefficient of zero indicates perfect equality, in which every person earns the same income. A coefficient of one indicates maximum inequality, in which one person earns all income and everyone else earns nothing. Real countries fall somewhere between these extremes. The Gini coefficient is useful as a summary measure, but it conceals as much as it reveals. Two societies can have identical Gini coefficients while distributing inequality very differently across their populations." },
    { title:"The Apology", text:"My best friend and I did not speak for nearly two years after an argument that began over something trivial and escalated into an exchange of truths we had each been careful to avoid saying. When we finally met again, at a mutual friend's wedding, the two years sat between us at the table like a third guest. Neither of us mentioned it at first. We talked about everything else. Then, late in the evening, he said simply: 'I'm sorry I said what I said the way I said it.' Not: I'm sorry if you were hurt. Not: I'm sorry, but. Just the unqualified acknowledgment that he had caused harm." },
  ],
  U: [
    { title:"Epigenetics and Inheritance", text:"Classical genetics teaches that the characteristics we inherit from our parents are encoded in the DNA sequence of our chromosomes. Epigenetics studies a second layer of inheritance: modifications to the way genes are expressed that do not alter the underlying DNA sequence but can nevertheless be passed from one generation to the next. Research on populations that experienced severe famine has found that the effects can be measurable in the health profiles of grandchildren. Stress hormones experienced by pregnant women can alter gene expression patterns in their offspring. These findings require us to complicate the simple nature versus nurture framework." },
    { title:"The Architecture of Attention", text:"The philosopher Simone Weil wrote that attention is the rarest and purest form of generosity. She meant something precise by this: that to give another person your full, disinterested attention, without planning what you will say next or how the interaction will serve you, is an act of profound respect. Most of our attention is selective and self interested. We notice what confirms our expectations, what affects our interests, what entertains us. Weil's insight, grounded in her contemplative practice, was that genuine attention requires the suspension of the self. It is a discipline, she argued, not a capacity. It must be trained." },
    { title:"The River Engineers", text:"The Mississippi River has been so extensively engineered over the past century and a half that many hydrologists no longer consider it a natural system. A network of locks, dams, levees, and navigation channels constrains the river within banks that prevent it from following its natural tendency to meander and change course. These engineering works were built to protect farmland, facilitate barge traffic, and prevent flooding. But hydrologists have observed that preventing a river from flooding also prevents it from depositing the sediment that builds and maintains delta land. The Louisiana coast is losing land at a rate of a football field every hour." },
    { title:"The Translator's Dilemma", text:"Every translator faces a version of the same impossible choice: fidelity to the original text or fidelity to the experience the original text produces in its readers. A poem that achieves its effect through wordplay that exploits features unique to its source language cannot be rendered faithfully in another language while also preserving its effect. The translator must choose what to sacrifice. Gregory Rabassa, the American translator of Gabriel García Márquez, said that the author told him his Spanish original was simply a rough draft and that the English translation was the real book." },
    { title:"What the Glacier Remembers", text:"Glaciologists can extract ice cores from glaciers that contain atmospheric samples going back hundreds of thousands of years. Trapped air bubbles in the ice preserve samples of the atmosphere as it existed when the ice formed. By analyzing these bubbles, researchers can determine the concentration of greenhouse gases and even something about global temperatures at the time of formation. The ice cores from Antarctica have given scientists a detailed record of climate over the past eight hundred thousand years, covering eight complete glacial cycles. What that context reveals is that the rate of change we are currently observing is without precedent in the entire record the ice preserves." },

  V: [
    { title:"The Banality of Evil", text:"The philosopher Hannah Arendt attended the 1961 trial of Adolf Eichmann, one of the principal organizers of the Holocaust, and reported on it for The New Yorker. She expected to find a monster. What she found instead was, in her words, terrifyingly normal: a bureaucrat who had done his job with technical efficiency and who, in the dock, seemed incapable of independent thought or genuine moral reflection. Arendt coined the phrase 'the banality of evil' to describe this phenomenon: the capacity for enormous harm to be perpetuated by ordinary people who have subordinated their moral judgment to institutional loyalty and career advancement." },
    { title:"The Visible and Invisible Curriculum", text:"Educational theorists distinguish between the explicit curriculum, the subject matter and skills officially taught in schools, and the hidden curriculum, the attitudes, dispositions, and social relations that are transmitted implicitly through the organization of schooling itself. Students learn not only mathematics and reading but also how to relate to authority, when to speak and when to stay silent, how to compete and how to cooperate, and which kinds of knowledge count as valuable. Critics argue that the hidden curriculum in many school systems reproduces existing social hierarchies." },
    { title:"Returning", text:"After seven years working abroad, I returned to the city where I had grown up to find it recognizable in structure but alien in texture. The buildings were mostly the same but the businesses inside them had changed. The neighborhood I had lived in had gentrified beyond the economic reach of the people who had given it its character. Several friends had left. The ones who remained had been shaped by years of experience I had not shared. The philosopher Thomas Wolfe wrote that you can't go home again, meaning not that home disappears but that you do." },
    { title:"The Immune System", text:"The human immune system is among the most sophisticated biological systems known to science. It must distinguish, with high accuracy, between the body's own cells and foreign invaders, between harmless environmental particles and genuine pathogens, between cells that have become cancerous and those that are functioning normally. It does this through an extraordinarily complex communication network involving multiple types of specialized cells, chemical messengers called cytokines, and genetic processes that generate novel receptor proteins. When this system malfunctions, the consequences range from chronic infection to autoimmune disease." },
    { title:"The Philosopher and the Prisoner", text:"The Stoic philosopher Epictetus was born into slavery in the first century CE and spent his early years as the property of a freedman in the household of the Roman emperor Nero. His owner reportedly broke his leg as a demonstration of absolute power. Epictetus reportedly said, while it was being broken, 'You will break it.' And when it was broken, 'Did I not tell you that you would break it?' The Stoics argued that the only things truly within our control are our own judgments, desires, and responses to events. External circumstances can be endured with dignity if we refuse to locate our freedom in anything that can be taken away." },
